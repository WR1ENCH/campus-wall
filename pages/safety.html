<!-- 本片段保持占位以兼容 SPA 切页路径(index.html -> /safety.html) -->
<div class="safety-container" id="safetyContainer">
  <div class="loading">正在打开安全中心…</div>
  <script>
    (function(){
      try{
        if(window.parent&&window.parent!==window){
          window.parent.location.href='/safety.html';
        }else{
          window.location.href='/safety.html';
        }
      }catch(e){
        window.location.href='/safety.html';
      }
    })();
  </script>
</div>
