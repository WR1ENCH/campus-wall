<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>校园墙精选</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans SC', sans-serif;
      background-color: #c4a882;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 59px, rgba(0,0,0,0.12) 59px, rgba(0,0,0,0.12) 61px, transparent 61px, transparent 120px),
        repeating-linear-gradient(90deg, transparent, transparent 119px, rgba(0,0,0,0.12) 119px, rgba(0,0,0,0.12) 121px, transparent 121px, transparent 240px),
        repeating-linear-gradient(0deg, rgba(180,140,100,0.3) 0px, rgba(200,160,120,0.1) 30px, rgba(170,130,90,0.2) 60px, rgba(190,150,110,0.15) 90px, rgba(175,135,95,0.25) 120px);
      background-size: 240px 120px;
      min-height: 100vh;
      color: #5a3d00;
      position: relative;
      overflow-x: hidden;
    }
    body::after {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(0,0,0,0.05) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(255,255,255,0.05) 0%, transparent 40%),
        radial-gradient(ellipse at 50% 80%, rgba(0,0,0,0.08) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }
    .container {
      position: relative;
      z-index: 1;
      padding: 48px 16px;
      max-width: 600px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    h1 {
      text-align: center;
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 24px;
      color: #5a3d00;
    }

    /* 便利贴卡片 */
    .sticky-card {
      background: #fff9b1;
      border-radius: 0;
      padding: 32px 28px;
      width: 100%;
      box-shadow:
        0 2px 8px rgba(0,0,0,0.15),
        0 8px 32px rgba(0,0,0,0.1);
      position: relative;
      transform: rotate(-0.5deg);
      transition: transform 0.3s ease;
    }
    .sticky-card:hover {
      transform: rotate(0deg);
    }

    .back-link {
      display: inline-block;
      color: #5a3d00;
      text-decoration: none;
      font-size: 14px;
      margin-bottom: 16px;
    }
    .back-link:hover {
      text-decoration: underline;
    }

    .form-item {
      margin-bottom: 20px;
    }
    .form-label {
      display: block;
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 10px;
      color: #5a3d00;
    }
    .form-input {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      border: 2px solid #d4c4a0;
      border-radius: 4px;
      background: #fffdf5;
      color: #5a3d00;
      font-family: inherit;
    }
    .form-input:focus {
      outline: none;
      border-color: #c4a882;
    }

    /* 弹窗遮罩层 */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.5); z-index: 200;
      align-items: center; justify-content: center;
      backdrop-filter: blur(4px);
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: #fff; border-radius: 16px; width: 90%; max-width: 440px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .modal-header {
      padding: 16px 20px 0; font-size: 17px; font-weight: 600;
      display: flex; align-items: center; gap: 8px;
    }
    .modal-body { padding: 16px 20px 20px; }

    /* 滑块验证码弹窗动画 */
    @keyframes sliderFadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes sliderModalIn {
      from { opacity: 0; transform: scale(0.9) translateY(20px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* 滑块拼图块平滑跟随 */
    .sliderContainer .block { 
      transition: left 0.08s linear; 
    }
    .sliderContainer_active .block { 
      transition: left 0.03s linear; 
    }
    /* 滑块按钮跟随 */
    .sliderContainer .slider { 
      transition: left 0.08s linear, background 0.2s linear; 
    }
    .sliderContainer_active .slider { 
      transition: left 0.03s linear; 
    }
    /* 滑条遮罩跟随 */
    .sliderContainer .sliderMask { 
      transition: width 0.08s linear; 
    }
    .sliderContainer_active .sliderMask { 
      transition: width 0.03s linear; 
    }
    /* 失败时回弹动画 */
    .sliderContainer_fail .block,
    .sliderContainer_fail .slider,
    .sliderContainer_fail .sliderMask {
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) !important;
    }

    .sliderContainer .slider { transition: background 0.2s linear; }
    .sliderContainer_active .slider { transition: none; }
    .sliderContainer .block { transition: none; }
    .sliderContainer_active .block { transition: none; }
    .sliderContainer .sliderMask { transition: none; }
    .sliderContainer_active .sliderMask { transition: none; }


    .btn {
      width: 100%;
      padding: 16px;
      font-size: 17px;
      font-weight: 600;
      border: none;
      border-radius: 4px;
      background: linear-gradient(135deg, #8b7355, #6b5344);
      color: #fff;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(90,61,0,0.3);
      font-family: inherit;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .btn:hover {
      box-shadow: 0 6px 16px rgba(90,61,0,0.4);
    }
    .btn:active {
      transform: scale(0.98);
    }
    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* 二维码展示区域 */
    .qr-box {
      background: #fffdf5;
      border-radius: 4px;
      padding: 24px;
      text-align: center;
      margin-top: 20px;
      display: none;
      border: 2px dashed #d4c4a0;
    }
    .qr-box.show {
      display: block;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .qr-content {
      font-size: 14px;
      word-break: break-all;
      padding: 12px;
      background: #f5f5f5;
      border-radius: 4px;
      margin-bottom: 16px;
      font-family: monospace;
      color: #333;
    }

    /* 进度条 */
    .timer-bar {
      height: 10px;
      background: #e8e0cc;
      border-radius: 5px;
      overflow: hidden;
      margin-bottom: 10px;
    }
    .timer-progress {
      height: 100%;
      background: linear-gradient(90deg, #8b7355, #6b5344);
      border-radius: 5px;
      transition: width 1s linear;
      width: 100%;
    }
    .timer-text {
      font-size: 14px;
      color: #666;
      text-align: center;
      margin-bottom: 8px;
    }

    .tips {
      font-size: 13px;
      color: #888;
      margin-top: 12px;
      line-height: 1.6;
    }
  </style>
<link rel="stylesheet" href="slider-captcha/slidercaptcha.min.css">
</head>
<body>
  <div class="container">
    <h1>🏆 校园墙精选</h1>

    <!-- ===== 未登录提示 ===== -->
    <div class="sticky-card" id="loginPrompt" style="display:none;">
      <div style="text-align:center;padding:40px 20px;">
        <div style="font-size:48px;margin-bottom:16px;">🔒</div>
        <div style="font-size:18px;font-weight:700;margin-bottom:12px;">请先登录校园墙</div>
        <div style="font-size:14px;color:#8b7355;line-height:1.8;margin-bottom:20px;">
          使用扫码登录小程序前，请先在校园墙网页登录账号
        </div>
        <a href="index.html" style="display:inline-block;padding:12px 40px;background:linear-gradient(135deg,#c4a882,#a08060);color:#fff;border-radius:8px;text-decoration:none;font-size:16px;font-weight:600;">前往登录 →</a>
      </div>
    </div>

    <!-- ===== 已登录：主内容 ===== -->
    <div class="sticky-card" id="mainContent" style="display:none;">
      <a class="back-link" href="index.html">← 返回校园墙</a>

      <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;padding:12px;background:#fffdf5;border-radius:8px;" id="userInfoBar">
        <span id="userAvatar" style="font-size:32px;">🙋</span>
        <div>
          <div id="userNickname" style="font-size:15px;font-weight:600;color:#5a3d00;"></div>
          <div id="userAccount" style="font-size:12px;color:#8b7355;"></div>
        </div>
      </div>

      <div class="form-item">
        <label class="form-label">验证码</label>
              <div class="form-item">
        <label class="form-label">人机验证</label>
        <div id="qrSliderStatus" style="display:flex;align-items:center;gap:8px;padding:8px 12px;background:#f5f5f5;border-radius:8px;cursor:pointer;border:1px solid #e0d6c8;" onclick="showSliderCaptcha()">
          <span style="color:#999;font-size:13px;">🔒 点击完成人机验证</span>
          <span id="qrSliderBadge" style="display:none;color:#22c55e;font-size:13px;">✅ 已验证</span>
        </div>
      </div>
      </div>

      <button class="btn" id="generateBtn" onclick="generateQrCode()">生成登录二维码</button>

      <div class="qr-box" id="qrBox">
        <div id="qrCanvas"></div>
        <div class="qr-content" id="qrContent" style="display:none;"></div>
        <div class="timer-bar">
          <div class="timer-progress" id="timerProgress"></div>
        </div>
        <div class="timer-text" id="timerText">5:00 后过期</div>
        <div class="tips">
          请使用小程序扫码登录，二维码仅有效期5分钟
        </div>
      </div>
    </div>
  </div>

  <script>

    let qrToken = null;
    let timerInterval = null;
    let countdown = 300; // 5分钟
    var _sliderCaptchaToken = null;



    // 生成二维码
    async function generateQrCode() {
      if (!_sliderCaptchaToken) {
        alert('请先完成人机验证');
        return;
      }

      const btn = document.getElementById('generateBtn');
      btn.disabled = true;
      btn.textContent = '生成中...';

      try {
        // 从 localStorage 获取当前登录用户（校园墙网页端）
        let userToken = '';
        try {
          userToken = localStorage.getItem('campus_user_token') || '';
        } catch(e) {}

        let url = 'http://154.37.221.232/api/user/qrcode/generate?captchaId=' + encodeURIComponent(_sliderCaptchaToken) + '&captchaText=1';
        if (userToken) url += '&userToken=' + encodeURIComponent(userToken);

        const res = await fetch(url);
        const data = await res.json();

        if (!data.ok) {
          alert(data.msg || '验证码错误');
          _sliderCaptchaToken = null;
          var badge = document.getElementById('qrSliderBadge');
          if (badge) badge.style.display = 'none';
          var statusEl = document.getElementById('qrSliderStatus');
          if (statusEl) { statusEl.style.background = '#f5f5f5'; statusEl.style.cursor = 'pointer'; statusEl.onclick = function(){showSliderCaptcha();}; }
          btn.disabled = false;
          btn.textContent = '生成登录二维码';
          return;
        }

        qrToken = data.qrToken;
        countdown = 300;

        // 生成二维码图片
        document.getElementById('qrBox').classList.add('show');
        const SERVER_URL = 'http://154.37.221.232';
        const qrUrl = SERVER_URL + '/api/user/qrcode/scan?token=' + qrToken;
        const container = document.getElementById('qrCanvas');
        container.innerHTML = '';
        // 使用 qrcodejs 库生成二维码
        try {
          container.innerHTML = '';
          new QRCode(container, {
            text: qrUrl,
            width: 160,
            height: 160,
            colorDark: '#5a3e2b',
            colorLight: '#fffdf5'
          });
        } catch (e) {
          // 后备：显示文字链接
          container.innerHTML = '<div style="word-break:break-all;font-size:12px;color:#5a3e2b;padding:10px;">' + qrUrl + '</div>';
        }

        btn.disabled = false;
        btn.textContent = '生成登录二维码';

        // 启动倒计时
        startTimer();
      } catch (err) {
        alert('网络错误');
        btn.disabled = false;
        btn.textContent = '生成登录二维码';
      }
    }

    // 倒计时
    function startTimer() {
      if (timerInterval) clearInterval(timerInterval);

      timerInterval = setInterval(() => {
        countdown--;
        const mins = Math.floor(countdown / 60);
        const secs = countdown % 60;

        // 更新进度条
        const progress = (countdown / 300) * 100;
        document.getElementById('timerProgress').style.width = progress + '%';
        document.getElementById('timerText').textContent = mins + ':' + secs.toString().padStart(2, '0') + ' 后过期';

        if (countdown <= 0) {
          clearInterval(timerInterval);
          document.getElementById('qrBox').classList.remove('show');
          document.getElementById('timerText').textContent = '已过期';
        }
      }, 1000);
    }

    // 页面加载时检查登录状态
    (function() {
      const token = localStorage.getItem('campus_user_token');
      if (!token) {
        // 未登录：显示提示
        document.getElementById('loginPrompt').style.display = '';
        document.getElementById('mainContent').style.display = 'none';
        return;
      }
      // 已登录：显示主内容
      document.getElementById('loginPrompt').style.display = 'none';
      document.getElementById('mainContent').style.display = '';

      // 显示用户信息
      try {
        const userData = JSON.parse(localStorage.getItem('campus_wall_user') || '{}');
        if (userData.nickname) {
          document.getElementById('userNickname').textContent = userData.nickname;
          document.getElementById('userAccount').textContent = userData.username ? '账号: ' + userData.username : 'ID: ' + (userData.id || '');
          if (userData.avatar) document.getElementById('userAvatar').textContent = userData.avatar;
        }
      } catch(e) {}

      // 验证码已替换为滑块验证码，无需加载
    })();
  </script>

  <script>
    function showSliderCaptcha() {
      var overlay = document.getElementById('sliderCaptchaOverlay');
      overlay.style.display = 'flex';
      var el = document.getElementById('sharedSliderCaptcha');
      el.innerHTML = '';
      setTimeout(function() {
        try {
          var c = sliderCaptcha({
            id: 'sharedSliderCaptcha',
            width: 280, height: 155,
            offset: 10,
            setSrc: function() {
              return 'slider-captcha/images/Pic' + Math.round(Math.random() * 4) + '.jpg';
            },
            onSuccess: function() {
              console.log('[slider-featured] onSuccess');
              fetch('/api/slider-captcha/grant', { method: 'POST' })
                .then(function(r) { return r.json(); })
                .then(function(j) {
                  console.log('[slider-featured] grant:', j);
                  if (j.ok) {
                    _sliderCaptchaToken = j.data.token;
                    var badge = document.getElementById('qrSliderBadge');
                    if (badge) { badge.style.display = 'inline'; }
                    var statusEl = document.getElementById('qrSliderStatus');
                    if (statusEl) { statusEl.style.background = '#f0fdf4'; statusEl.style.cursor = 'default'; statusEl.onclick = null; }
                    overlay.style.display = 'none';
                  }
                }).catch(function(err) { console.error('[slider-featured] grant error:', err); });
            },
            onFail: function() { console.log('[slider-featured] onFail'); }
          });
        } catch(e) { console.error('slider captcha init error', e); }
      }, 100);
    }

    document.getElementById('sliderCaptchaOverlay').addEventListener('click', function(e) {
      if (e.target === this) this.style.display = 'none';
    });
  </script>
<div class="modal-overlay" id="sliderCaptchaOverlay" style="display:none;animation:sliderFadeIn 0.25s ease;z-index:99999;">
  <div class="modal" style="border:2px solid #fff;border-radius:18px;animation:sliderModalIn 0.3s cubic-bezier(0.34,1.56,0.64,1);max-width:360px;padding:20px;">
    <div class="modal-header" style="justify-content:center;"><svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-2px"><rect x="3" y="11" width="18" height="10" rx="2"/><circle cx="12" cy="5" r="2"/><path d="M12 7v4"/><line x1="8" y1="16" x2="8" y2="16"/><line x1="16" y1="16" x2="16" y2="16"/></svg> 人机验证</div>
    <div class="modal-body" style="padding:10px 0;">
      <div id="sharedSliderCaptcha" style="width:280px;margin:0 auto;"></div>
      <div style="margin-top:10px;font-size:12px;color:#999;text-align:center;">拖动滑块完成拼图验证</div>
    </div>
  </div>
</div>

<script src="slider-captcha/longbow.slidercaptcha.min.js"></script>
</body>
</html>
