<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📢 申请通知发布账号</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans SC', sans-serif;
      min-height: 100vh;
      background: #c4a882;
      position: relative;
      overflow-x: hidden;
    }

    /* 砖墙背景 */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        repeating-linear-gradient(0deg,
          transparent, transparent 59px,
          rgba(0,0,0,0.12) 59px, rgba(0,0,0,0.12) 61px,
          transparent 61px, transparent 120px
        ),
        repeating-linear-gradient(90deg,
          transparent, transparent 119px,
          rgba(0,0,0,0.12) 119px, rgba(0,0,0,0.12) 121px,
          transparent 121px, transparent 240px
        ),
        repeating-linear-gradient(0deg,
          rgba(180,140,100,0.3) 0px,
          rgba(200,160,120,0.1) 30px,
          rgba(170,130,90,0.2) 60px,
          rgba(190,150,110,0.15) 90px,
          rgba(175,135,95,0.25) 120px
        );
      background-size: 240px 120px;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(0,0,0,0.05) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(255,255,255,0.05) 0%, transparent 40%),
        radial-gradient(ellipse at 50% 80%, rgba(0,0,0,0.08) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      padding: 48px 16px;
      max-width: 600px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* 便利贴卡片 */
    .sticky-card {
      background: #fff9b1;
      border-radius: 0;
      padding: 32px 28px;
      width: 100%;
      box-shadow:
        0 2px 8px rgba(0,0,0,0.15),
        0 8px 32px rgba(0,0,0,0.1);
      position: relative;
      transform: rotate(-0.5deg);
      transition: transform 0.3s ease;
    }

    .sticky-card:hover {
      transform: rotate(0deg);
    }

    /* 便利贴折角 */
    .sticky-card::before {
      content: '';
      position: absolute;
      top: 0; right: 0;
      width: 0; height: 0;
      border-style: solid;
      border-width: 0 28px 28px 0;
      border-color: transparent #c4a882 transparent transparent;
      box-shadow: -2px 2px 4px rgba(0,0,0,0.1);
    }

    .card-header {
      text-align: center;
      margin-bottom: 28px;
    }

    .card-header h1 {
      font-size: 22px;
      font-weight: 700;
      color: #5a3e2b;
      position: relative;
      display: inline-block;
    }

    .card-header h1::after {
      content: '';
      display: block;
      width: 60%;
      height: 3px;
      background: #d4a373;
      margin: 8px auto 0;
      border-radius: 2px;
    }

    .card-header p {
      font-size: 13px;
      color: #8b7355;
      margin-top: 10px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #5a3e2b;
      margin-bottom: 6px;
    }

    .form-group label .required {
      color: #dc2626;
      margin-left: 2px;
    }

    .form-input {
      width: 100%;
      padding: 10px 14px;
      border: 2px solid #d4c5a9;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      background: rgba(255,255,255,0.7);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      box-sizing: border-box;
    }

    .form-input:focus {
      border-color: #c4a882;
      box-shadow: 0 0 0 3px rgba(196,168,130,0.25);
      background: #fff;
    }

    textarea.form-input {
      resize: vertical;
      min-height: 90px;
    }

    .submit-btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #d4a373;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.25s ease;
      letter-spacing: 0.03em;
    }

    .submit-btn:hover {
      background: #c4956a;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(212,163,115,0.4);
    }

    .submit-btn:active {
      transform: translateY(0);
    }

    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .form-error {
      font-size: 12px;
      color: #dc2626;
      margin-top: 4px;
      min-height: 18px;
    }

    /* 成功状态 */
    .success-state {
      display: none;
      text-align: center;
      padding: 20px 0;
    }
    .success-state .icon { font-size: 48px; margin-bottom: 12px; }
    .success-state h2 { font-size: 20px; color: #5a3e2b; margin-bottom: 8px; }
    .success-state p { font-size: 14px; color: #8b7355; line-height: 1.7; }

    /* 返回链接 */
    .back-link {
      display: inline-block;
      margin-top: 20px;
      color: #8b7355;
      text-decoration: none;
      font-size: 13px;
      transition: color 0.2s;
    }
    .back-link:hover { color: #5a3e2b; text-decoration: underline; }

    /* Toast */
    .toast {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      padding: 12px 24px; border-radius: 10px;
      font-size: 14px; font-weight: 500; z-index: 9999;
      animation: toastIn 0.35s ease;
      max-width: 90vw;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }
    .toast.success { background: #22c55e; color: #fff; }
    .toast.error { background: #ef4444; color: #fff; }
    .toast.info { background: #3b82f6; color: #fff; }
    @keyframes toastIn {
      from { opacity: 0; transform: translateX(-50%) translateY(-20px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.9) translateY(10px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    @media (max-width: 640px) {
      .container { padding: 24px 12px; }
      .sticky-card { padding: 24px 18px; }
      .card-header h1 { font-size: 19px; }
      .form-input { font-size: 13px; padding: 9px 12px; }
    }

    .modal-overlay { display: flex; }
  
    /* 滑块验证码弹窗动画 */
    @keyframes sliderFadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes sliderModalIn {
      from { opacity: 0; transform: scale(0.9) translateY(20px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* 滑块拼图块平滑跟随 */
    .sliderContainer .block { 
      transition: left 0.08s linear; 
    }
    .sliderContainer_active .block { 
      transition: left 0.03s linear; 
    }
    /* 滑块按钮跟随 */
    .sliderContainer .slider { 
      transition: left 0.08s linear, background 0.2s linear; 
    }
    .sliderContainer_active .slider { 
      transition: left 0.03s linear; 
    }
    /* 滑条遮罩跟随 */
    .sliderContainer .sliderMask { 
      transition: width 0.08s linear; 
    }
    .sliderContainer_active .sliderMask { 
      transition: width 0.03s linear; 
    }
    /* 失败时回弹动画 */
    .sliderContainer_fail .block,
    .sliderContainer_fail .slider,
    .sliderContainer_fail .sliderMask {
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) !important;
    }

    .sliderContainer .slider { transition: background 0.2s linear; }
    .sliderContainer_active .slider { transition: none; }
    .sliderContainer .block { transition: none; }
    .sliderContainer_active .block { transition: none; }
    .sliderContainer .sliderMask { transition: none; }
    .sliderContainer_active .sliderMask { transition: none; }

  </style>
<link rel="stylesheet" href="slider-captcha/slidercaptcha.min.css">
</head>
<body>
  <div class="container">
    <div class="sticky-card">
      <div class="card-header">
        <h1>📢 申请通知发布账号</h1>
        <p>填写信息申请校园通知发布权限</p>
      </div>

      <!-- 表单 -->
      <div id="applyForm">
        <div class="form-group">
          <label>申请人姓名 <span class="required">*</span></label>
          <input class="form-input" id="applyName" maxlength="20" placeholder="你的真实姓名">
        </div>
        <div class="form-group">
          <label>部门 / 组织 <span class="required">*</span></label>
          <input class="form-input" id="applyDept" maxlength="30" placeholder="例如：学生会宣传部、团委">
        </div>
        <div class="form-group">
          <label>联系方式 <span class="required">*</span></label>
          <input class="form-input" id="applyContact" maxlength="50" placeholder="手机号、邮箱或微信号">
        </div>
        <div class="form-group">
          <label>申请理由 <span class="required">*</span></label>
          <textarea class="form-input" id="applyReason" maxlength="500" placeholder="请说明你需要发布通知的原因和用途&#x2026;"></textarea>
        </div>
        <!-- 验证码 -->
        <div class="form-group">
          <label>人机验证 <span class="required">*</span></label>
          <div id="applySliderStatus" style="display:flex;align-items:center;gap:8px;padding:8px 12px;background:#f5f5f5;border-radius:8px;cursor:pointer;border:2px solid #d4c5a9;" onclick="showSliderCaptcha()">
            <span style="color:#999;font-size:13px;">🔒 点击完成人机验证</span>
            <span id="applySliderBadge" style="display:none;color:#22c55e;font-size:13px;">✅ 已验证</span>
          </div>
        </div>
        <div class="modal-overlay" id="sliderCaptchaOverlay" style="display:none;animation:sliderFadeIn 0.25s ease;z-index:99999;" onclick="if(event.target===this)this.style.display='none'">
          <div class="modal" style="border:2px solid #fff;border-radius:18px;animation:sliderModalIn 0.3s cubic-bezier(0.34,1.56,0.64,1);max-width:360px;padding:20px;">
            <div class="modal-header" style="justify-content:center;">人机验证</div>
            <div class="modal-body" style="padding:10px 0;">
              <div id="sharedSliderCaptcha" style="width:280px;margin:0 auto;"></div>
              <div style="margin-top:10px;font-size:12px;color:#999;text-align:center;">拖动滑块完成拼图验证</div>
            </div>
          </div>
        </div>
        <div class="form-error" id="applyError"></div>
        <button class="submit-btn" id="applyBtn" onclick="showPasskeyModal()">&#x1F4E8; 提交申请</button>
      </div>

      <!-- 成功状态 -->
      <div class="success-state" id="applySuccess">
        <div class="icon" id="applySuccessIcon">&#x2705;</div>
        <h2 id="applySuccessTitle">申请已提交</h2>
        <p id="applySuccessMsg">你的申请已发送给管理员审核，<br>审核通过后你将收到通知。<br>请耐心等待，谢谢！</p>
        <a class="back-link" href="javascript:void(0)" onclick="resetForm()">&#x1F504; 重新填写</a>
      </div>
    </div>

    <a class="back-link" href="http://154.37.221.232/">&#x2190; 返回校园墙</a>
  </div>

  <!-- Pass-key modal -->
  <div class="modal-overlay" id="passkeyModal" style="display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,0.45);align-items:center;justify-content:center;" onclick="if(event.target===this)closePasskeyModal()">
    <div style="background:#fff9b1;border-radius:12px;padding:28px 24px;max-width:380px;width:90vw;box-shadow:0 8px 40px rgba(0,0,0,0.25);position:relative;animation:modalIn 0.3s ease;">
      <div style="text-align:center;margin-bottom:20px;">
        <div style="font-size:32px;margin-bottom:8px;">&#x1F511;</div>
        <div style="font-size:17px;font-weight:700;color:#5a3e2b;">通行码（选填）</div>
        <div style="font-size:12px;color:#8b7355;margin-top:4px;">输入通行码可跳过审核直接获得权限，留空则等待管理员审核</div>
      </div>
      <input id="passkeyInput" maxlength="20" placeholder="输入通行码（选填）"
        style="width:100%;padding:10px 14px;border:2px solid #d4c5a9;border-radius:8px;font-size:16px;font-family:inherit;background:rgba(255,255,255,0.7);outline:none;box-sizing:border-box;text-align:center;letter-spacing:4px;text-transform:uppercase;"
        onkeydown="if(event.key==='Enter')submitWithPasskey()">
      <div id="passkeyError" style="font-size:12px;color:#dc2626;margin-top:6px;min-height:18px;text-align:center;"></div>
      <div style="display:flex;gap:10px;margin-top:16px;">
        <button onclick="submitWithPasskey(true)" style="flex:1;padding:10px;border:2px solid #d4c5a9;border-radius:8px;background:transparent;color:#8b7355;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;">&#x1F6AA; 跳过，直接提交</button>
        <button id="passkeySubmitBtn" onclick="submitWithPasskey()" style="flex:1;padding:10px;border:none;border-radius:8px;background:#d4a373;color:#fff;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;">&#x1F510; 验证并提交</button>
      </div>
    </div>
  </div>

  <script>
  // 检查登录状态
  var _userToken = localStorage.getItem('campus_user_token');
  var _userNickname = '';
  if (_userToken) {
    try {
      var payload = JSON.parse(atob(_userToken.split('.')[1]));
      _userNickname = payload.nickname || '';
      if (_userNickname) document.getElementById('applyName').value = _userNickname;
    } catch(e) {}
  }

  if (!_userToken) {
    document.getElementById('applyForm').innerHTML =
      '<div style="text-align:center;padding:40px 0;">' +
      '<div style="font-size:48px;margin-bottom:12px;">🔒</div>' +
      '<h2 style="font-size:18px;color:#5a3e2b;margin-bottom:8px;">请先登录校园墙</h2>' +
      '<p style="font-size:14px;color:#8b7355;margin-bottom:20px;">你需要先登录校园墙账号才能提交申请</p>' +
      '<a href="http://154.37.221.232/" class="submit-btn" style="display:inline-block;text-decoration:none;width:auto;padding:12px 32px;">前往登录</a>' +
      '</div>';
  }

  function showToast(msg, type) {
    var t = document.createElement('div');
    t.className = 'toast ' + type;
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(function() { t.remove(); }, 3000);
  }

  var _pendingFormData = null;
  var _sliderCaptchaToken = null;

  function showSliderCaptcha() {
    var overlay = document.getElementById('sliderCaptchaOverlay');
    overlay.style.display = 'flex';
    var el = document.getElementById('sharedSliderCaptcha');
    el.innerHTML = '';
    setTimeout(function() {
      try {
        sliderCaptcha({
          id: 'sharedSliderCaptcha',
          width: 280, height: 155,
          offset: 10,
          setSrc: function() { return 'slider-captcha/images/Pic' + Math.round(Math.random() * 4) + '.jpg'; },
          onSuccess: function() {
            console.log('[slider-apply] onSuccess');
            fetch('/api/slider-captcha/grant', { method: 'POST' })
              .then(function(r) { return r.json(); })
              .then(function(j) {
                console.log('[slider-apply] grant:', j);
                if (j.ok) {
                  _sliderCaptchaToken = j.data.token;
                  var badge = document.getElementById('applySliderBadge');
                  if (badge) { badge.style.display = 'inline'; }
                  var statusEl = document.getElementById('applySliderStatus');
                  if (statusEl) { statusEl.style.background = '#f0fdf4'; statusEl.style.cursor = 'default'; statusEl.onclick = null; }
                  overlay.style.display = 'none';
                }
              }).catch(function(err) { console.error('[slider-apply] grant error:', err); });
          },
          onFail: function() { console.log('[slider-apply] onFail'); }
        });
      } catch(e) {}
    }, 100);
  }
  document.getElementById('sliderCaptchaOverlay').addEventListener('click', function(e) {
    if (e.target === this) this.style.display = 'none';
  });

  // 先验证表单，再弹出通行码弹窗
  window.showPasskeyModal = function() {
    var name = document.getElementById('applyName').value.trim();
    var dept = document.getElementById('applyDept').value.trim();
    var contact = document.getElementById('applyContact').value.trim();
    var reason = document.getElementById('applyReason').value.trim();
    var errEl = document.getElementById('applyError');

    if (!name) { errEl.textContent = '请填写申请人姓名'; document.getElementById('applyName').focus(); return; }
    if (!dept) { errEl.textContent = '请填写部门/组织'; document.getElementById('applyDept').focus(); return; }
    if (!contact) { errEl.textContent = '请填写联系方式'; document.getElementById('applyContact').focus(); return; }
    if (!reason) { errEl.textContent = '请填写申请理由'; document.getElementById('applyReason').focus(); return; }
    if (!_sliderCaptchaToken) { errEl.textContent = '请先完成人机验证'; return; }
    errEl.textContent = '';

    _pendingFormData = { name: name, department: dept, contact: contact, reason: reason, captchaId: _sliderCaptchaToken, captchaText: '1' };

    // 显示弹窗
    document.getElementById('passkeyInput').value = '';
    document.getElementById('passkeyError').textContent = '';
    document.getElementById('passkeyModal').style.display = 'flex';
    setTimeout(function() { document.getElementById('passkeyInput').focus(); }, 100);
  };

  window.closePasskeyModal = function() {
    document.getElementById('passkeyModal').style.display = 'none';
    // 关闭后刷新验证码
  };

  window.submitWithPasskey = async function(skip) {
    var passkey = skip ? '' : document.getElementById('passkeyInput').value.trim();
    var errEl = document.getElementById('passkeyError');
    errEl.textContent = '';

    var btn = document.getElementById('passkeySubmitBtn');
    btn.disabled = true; btn.textContent = '提交中…';
    try {
      var res = await fetch('/api/notice-account/apply', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-user-token': _userToken },
        body: JSON.stringify({ name: _pendingFormData.name, department: _pendingFormData.department, contact: _pendingFormData.contact, reason: _pendingFormData.reason, passkey: passkey, captchaId: _pendingFormData.captchaId, captchaText: _pendingFormData.captchaText })
      });
      var json = await res.json();
      if (json.ok) {
        closePasskeyModal();
        document.getElementById('applyForm').style.display = 'none';
        document.getElementById('applySuccess').style.display = '';
        // 区分通行码自动通过和普通提交
        if (passkey) {
          document.getElementById('applySuccessTitle').textContent = '🎉 已获得发布权限';
          document.getElementById('applySuccessMsg').innerHTML = '通行码验证通过，你已获得通知发布权限！<br>现在你可以使用校园墙账号密码登录 <b>notice.html</b> 管理通知。';
          document.getElementById('applySuccessIcon').textContent = '🎉';
        } else {
          document.getElementById('applySuccessTitle').textContent = '申请已提交';
          document.getElementById('applySuccessMsg').innerHTML = '你的申请已发送给管理员审核，<br>审核通过后你将收到通知。<br>请耐心等待，谢谢！';
          document.getElementById('applySuccessIcon').textContent = '&#x2705;';
        }
        showToast(json.msg, 'success');
      } else {
        errEl.textContent = json.msg || '提交失败';
      }
    } catch(e) {
      errEl.textContent = '网络错误，请稍后重试';
    } finally {
      btn.disabled = false; btn.textContent = '🔐 验证并提交';
    }
  };

  function resetForm() {
    document.getElementById('applyForm').style.display = '';
    document.getElementById('applySuccess').style.display = 'none';
    document.getElementById('applyError').textContent = '';
    
  }

  // 页面加载时刷新验证码
  </script>
<script src="slider-captcha/longbow.slidercaptcha.min.js"></script>
</body>
</html>
