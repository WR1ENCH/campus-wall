<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔧 系统维护中</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: #fff;
    border-radius: 20px;
    padding: 50px 40px;
    max-width: 500px;
    width: 100%;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
  }
  .icon { font-size: 72px; margin-bottom: 20px; }
  h1 {
    font-size: 26px;
    color: #1f2937;
    margin-bottom: 12px;
    font-weight: 700;
  }
  p {
    font-size: 15px;
    color: #6b7280;
    line-height: 1.8;
    margin-bottom: 8px;
  }
  .divider {
    width: 60px;
    height: 4px;
    background: linear-gradient(90deg, #667eea, #764ba2);
    border-radius: 2px;
    margin: 20px auto 24px;
  }
  .status-badge {
    display: inline-block;
    background: #fef3c7;
    color: #d97706;
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 20px;
  }
  .footer {
    margin-top: 24px;
    font-size: 12px;
    color: #9ca3af;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="icon">🔧</div>
    <div class="status-badge">⏳ 维护中</div>
    <h1>系统维护中</h1>
    <div class="divider"></div>
    <p>校园墙当前正在进行系统维护升级，</p>
    <p>暂时无法访问，请稍后再试。</p>
    <p>给您带来的不便敬请谅解！</p>
    <div class="footer">
      Made with ❤️ · 校园墙团队
    </div>
  </div>
</body>
</html>
