<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>系统维护中 - 校园墙</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #f5f5f5; min-height: 100vh;
    display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  .wrap { max-width: 420px; width: 100%; text-align: center; }
  .icon { font-size: 48px; margin-bottom: 16px; }
  h1 { font-size: 22px; color: #333; margin-bottom: 8px; font-weight: 600; }
  .msg { font-size: 14px; color: #888; line-height: 1.8; }
  .notice {
    margin-top: 24px; padding: 14px 18px; background: #fff; border-radius: 8px;
    border: 1px solid #eee; font-size: 13px; color: #666; line-height: 1.7; text-align: left; display: none;
  }
  .notice-title { font-size: 12px; color: #999; margin-bottom: 4px; }
  .time { margin-top: 20px; font-size: 12px; color: #bbb; }
  .footer { margin-top: 32px; }
  .test-link {
    font-size: 13px; color: #999; cursor: pointer; border-bottom: 1px dashed #ccc;
    display: inline-block; transition: color 0.2s;
  }
  .test-link:hover { color: #666; }

  /* Modal */
  .overlay {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.4); display: none;
    align-items: center; justify-content: center; padding: 20px;
  }
  .overlay.active { display: flex; }
  .dialog {
    background: #fff; border-radius: 12px; padding: 32px 28px;
    max-width: 360px; width: 100%; box-shadow: 0 8px 30px rgba(0,0,0,0.12);
  }
  .dialog h3 { font-size: 16px; color: #333; margin-bottom: 4px; font-weight: 600; }
  .dialog .sub { font-size: 13px; color: #999; margin-bottom: 20px; }
  .dialog label { font-size: 12px; color: #999; display: block; margin-bottom: 4px; }
  .dialog input[type="text"] {
    width: 100%; padding: 9px 12px; border: 1px solid #ddd; border-radius: 6px;
    font-size: 14px; outline: none; margin-bottom: 14px; transition: border-color 0.2s;
  }
  .dialog input[type="text"]:focus { border-color: #666; }
  .captcha-row { display: flex; gap: 8px; align-items: center; margin-bottom: 14px; }
  .captcha-row input { flex: 1; margin-bottom: 0; }
  .captcha-img { height: 36px; border-radius: 4px; cursor: pointer; border: 1px solid #eee; }
  .dialog .btn {
    width: 100%; padding: 10px; border: none; border-radius: 6px;
    background: #333; color: #fff; font-size: 14px; cursor: pointer;
    font-family: inherit; transition: background 0.2s;
  }
  .dialog .btn:hover { background: #555; }
  .dialog .btn:disabled { background: #ccc; cursor: not-allowed; }
  .dialog .err { color: #e55; font-size: 12px; margin-top: 8px; min-height: 18px; text-align: center; }
  .dialog .close-btn {
    position: absolute; top: 12px; right: 14px; background: none; border: none;
    font-size: 18px; color: #ccc; cursor: pointer;
  }
  .dialog .close-btn:hover { color: #666; }
</style>
</head>
<body>
<div class="wrap">
  <div class="icon">🔧</div>
  <h1>系统维护中</h1>
  <p class="msg">校园墙正在进行维护升级<br>暂时无法访问，请稍后再试</p>
  <div class="notice" id="notice">
    <div class="notice-title">公告</div>
    <div id="noticeText"></div>
  </div>
  <div class="time" id="timeInfo"></div>
  <div class="footer">
    <span class="test-link" onclick="openModal()">测试人员入口</span>
  </div>
</div>

<div class="overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="dialog" style="position:relative;">
    <button class="close-btn" onclick="closeModal()">&times;</button>
    <h3>测试验证</h3>
    <div class="sub">请输入管理员提供的测试密钥</div>
    <label>密钥</label>
    <input type="text" id="keyInput" placeholder="TW-XXXXXXXX" maxlength="11" autocomplete="off">
    <label>验证码</label>
    <div class="captcha-row">
      <input type="text" id="capInput" placeholder="输入验证码" maxlength="6">
      <img class="captcha-img" id="capImg" onclick="loadCap()" alt="">
    </div>
    <button class="btn" id="submitBtn" onclick="submit()">进入</button>
    <div class="err" id="errMsg"></div>
  </div>
</div>

<script>
var cid = '';
function loadCap() {
  fetch('/api/captcha').then(function(r){return r.json()}).then(function(j){
    if(j.ok){ cid=j.data.id; document.getElementById('capImg').src='data:image/svg+xml;base64,'+btoa(j.data.svg); }
  });
}
function loadInfo() {
  fetch('/api/maintenance/info').then(function(r){return r.json()}).then(function(j){
    if(!j.ok||!j.data) return;
    if(j.data.message){ document.getElementById('notice').style.display='block'; document.getElementById('noticeText').textContent=j.data.message; }
    if(j.data.updatedAt){ document.getElementById('timeInfo').textContent='维护开始于 ' + new Date(j.data.updatedAt).toLocaleString('zh-CN'); }
    if(!j.data.enabled) location.href='/';
  });
}
function openModal() { document.getElementById('modal').classList.add('active'); if(!cid) loadCap(); document.getElementById('keyInput').focus(); }
function closeModal() { document.getElementById('modal').classList.remove('active'); document.getElementById('errMsg').textContent=''; document.getElementById('keyInput').value=''; document.getElementById('capInput').value=''; }
function submit() {
  var k=document.getElementById('keyInput').value.trim();
  var c=document.getElementById('capInput').value.trim();
  var e=document.getElementById('errMsg');
  var b=document.getElementById('submitBtn');
  e.textContent='';
  if(!k){e.textContent='请输入密钥';return;}
  if(!c){e.textContent='请输入验证码';return;}
  b.disabled=true;b.textContent='验证中...';
  fetch('/api/maintenance/verify',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({testKey:k,captchaId:cid,captchaText:c})})
  .then(function(r){return r.json()}).then(function(j){
    if(!j.ok){e.textContent=j.msg;loadCap();document.getElementById('capInput').value='';return;}
    document.cookie='maintenance_bypass='+j.data.token+';path=/;max-age='+(4*3600);
    location.href='/';
  }).catch(function(){e.textContent='网络错误';})
  .finally(function(){b.disabled=false;b.textContent='进入';});
}
loadInfo();
setInterval(loadInfo,30000);
</script>
</body>
</html>
