<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>系统维护中 - 校园墙</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #f5f5f5; min-height: 100vh;
    display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  .wrap { max-width: 420px; width: 100%; text-align: center; }
  .icon { font-size: 48px; margin-bottom: 16px; }
  h1 { font-size: 22px; color: #333; margin-bottom: 8px; font-weight: 600; }
  .msg { font-size: 14px; color: #888; line-height: 1.8; }
  .notice {
    margin-top: 24px; padding: 14px 18px; background: #fff; border-radius: 8px;
    border: 1px solid #eee; font-size: 13px; color: #666; line-height: 1.7; text-align: left; display: none;
  }
  .notice-title { font-size: 12px; color: #999; margin-bottom: 4px; }
  .time { margin-top: 20px; font-size: 12px; color: #bbb; }
  .footer { margin-top: 32px; }
  .test-link {
    font-size: 13px; color: #999; cursor: pointer; border-bottom: 1px dashed #ccc;
    display: inline-block; transition: color 0.2s;
  }
  .test-link:hover { color: #666; }
  .overlay {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.4); display: none;
    align-items: center; justify-content: center; padding: 20px;
  }
  .overlay.active { display: flex; }
  .dialog {
    background: #fff; border-radius: 12px; padding: 32px 28px;
    max-width: 360px; width: 100%; box-shadow: 0 8px 30px rgba(0,0,0,0.12);
    position: relative;
  }
  .dialog h3 { font-size: 16px; color: #333; margin-bottom: 4px; font-weight: 600; }
  .dialog .sub { font-size: 13px; color: #999; margin-bottom: 20px; }
  .dialog label { font-size: 12px; color: #999; display: block; margin-bottom: 4px; }
  .dialog input[type="text"] {
    width: 100%; padding: 9px 12px; border: 1px solid #ddd; border-radius: 6px;
    font-size: 14px; outline: none; margin-bottom: 14px; transition: border-color 0.2s;
  }
  .dialog input[type="text"]:focus { border-color: #666; }
  .captcha-row { display: flex; gap: 8px; align-items: center; margin-bottom: 14px; }
  .captcha-row input { flex: 1; margin-bottom: 0; }
  .captcha-img { height: 36px; border-radius: 4px; cursor: pointer; border: 1px solid #eee; }
  .dialog .btn {
    width: 100%; padding: 10px; border: none; border-radius: 6px;
    background: #333; color: #fff; font-size: 14px; cursor: pointer;
    font-family: inherit; transition: background 0.2s;
  }
  .dialog .btn:hover { background: #555; }
  .dialog .btn:disabled { background: #ccc; cursor: not-allowed; }
  .dialog .err { color: #e55; font-size: 12px; margin-top: 8px; min-height: 18px; text-align: center; }
  .dialog .close-btn {
    position: absolute; top: 12px; right: 14px; background: none; border: none;
    font-size: 18px; color: #ccc; cursor: pointer;
  }
  .dialog .close-btn:hover { color: #666; }

    /* 滑块验证码弹窗动画 */
    @keyframes sliderFadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes sliderModalIn {
      from { opacity: 0; transform: scale(0.9) translateY(20px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* 滑块拼图块平滑跟随 */
    .sliderContainer .block { 
      transition: left 0.08s linear; 
    }
    .sliderContainer_active .block { 
      transition: left 0.03s linear; 
    }
    /* 滑块按钮跟随 */
    .sliderContainer .slider { 
      transition: left 0.08s linear, background 0.2s linear; 
    }
    .sliderContainer_active .slider { 
      transition: left 0.03s linear; 
    }
    /* 滑条遮罩跟随 */
    .sliderContainer .sliderMask { 
      transition: width 0.08s linear; 
    }
    .sliderContainer_active .sliderMask { 
      transition: width 0.03s linear; 
    }
    /* 失败时回弹动画 */
    .sliderContainer_fail .block,
    .sliderContainer_fail .slider,
    .sliderContainer_fail .sliderMask {
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) !important;
    }

    .sliderContainer .slider { transition: background 0.2s linear; }
    .sliderContainer_active .slider { transition: none; }
    .sliderContainer .block { transition: none; }
    .sliderContainer_active .block { transition: none; }
    .sliderContainer .sliderMask { transition: none; }
    .sliderContainer_active .sliderMask { transition: none; }

  </style>
<link rel="stylesheet" href="slider-captcha/slidercaptcha.min.css">
</head>
<body>
<div class="wrap">
  <div class="icon">&#128295;</div>
  <h1>系统维护中</h1>
  <p class="msg">校园墙正在进行维护升级<br>暂时无法访问，请稍后再试</p>
  <div class="notice" id="notice">
    <div class="notice-title">公告</div>
    <div id="noticeText"></div>
  </div>
  <div class="time" id="timeInfo"></div>
  <div class="footer">
    <span class="test-link" onclick="openModal()">测试人员入口</span>
  </div>
</div>

<div class="overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="dialog">
    <button class="close-btn" onclick="closeModal()">&times;</button>
    <h3>测试验证</h3>
    <div class="sub">请输入管理员提供的测试密钥</div>
    <label>密钥</label>
    <input type="text" id="keyInput" placeholder="TW-XXXXXXXX" maxlength="11" autocomplete="off">
    <label>人机验证</label>
    <div id="maintenanceSliderStatus" style="display:flex;align-items:center;gap:8px;padding:8px 12px;background:#f5f5f5;border-radius:8px;cursor:pointer;border:1px solid #ddd;" onclick="showSliderCaptcha()">
      <span style="color:#999;font-size:13px;">🔒 点击完成人机验证</span>
      <span id="maintenanceSliderBadge" style="display:none;color:#22c55e;font-size:13px;">✅ 已验证</span>
    </div>
    <div id="sliderCaptchaOverlay" style="display:none;animation:sliderFadeIn 0.25s ease;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:99999;display:flex;align-items:center;justify-content:center;" onclick="if(event.target===this)this.style.display='none'">
      <div style="background:#fff;border-radius:18px;border:2px solid #fff;animation:sliderModalIn 0.3s cubic-bezier(0.34,1.56,0.64,1);padding:24px;max-width:360px;width:90%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.3);">
        <h3 style="margin-bottom:16px;">人机验证</h3>
        <div id="sharedSliderCaptcha" style="width:280px;margin:0 auto;"></div>
        <div style="margin-top:10px;font-size:12px;color:#999;">拖动滑块完成拼图验证</div>
      </div>
    </div>
    <button class="btn" id="submitBtn" onclick="submit()">进入</button>
    <div class="err" id="errMsg"></div>
  </div>
</div>

<script>
var _sliderCaptchaToken = null;
var _botTesting = false;

function showSliderCaptcha() {
  if (_botTesting) return;
  var overlay = document.getElementById('sliderCaptchaOverlay');
  overlay.style.display = 'flex';
  var el = document.getElementById('sharedSliderCaptcha');
  el.innerHTML = '';
  setTimeout(function() {
    try {
      sliderCaptcha({
        id: 'sharedSliderCaptcha',
        width: 280, height: 155,
        offset: 10,
        setSrc: function() { return 'slider-captcha/images/Pic' + Math.round(Math.random() * 4) + '.jpg'; },
        onSuccess: function() {
          console.log('[slider-maint] onSuccess');
          fetch('/api/slider-captcha/grant', { method: 'POST' })
            .then(function(r) { return r.json(); })
            .then(function(j) {
              console.log('[slider-maint] grant:', j);
              if (j.ok) {
                _sliderCaptchaToken = j.data.token;
                var badge = document.getElementById('maintenanceSliderBadge');
                if (badge) { badge.style.display = 'inline'; }
                var statusEl = document.getElementById('maintenanceSliderStatus');
                if (statusEl) { statusEl.style.background = '#f0fdf4'; statusEl.style.cursor = 'default'; statusEl.onclick = null; }
                overlay.style.display = 'none';
              }
            }).catch(function(err) { console.error('[slider-maint] grant error:', err); });
        },
        onFail: function() { console.log('[slider-maint] onFail'); }
      });
    } catch(e) {}
  }, 100);
}

function updateSliderUI() {
  var sliderStatus = document.getElementById('maintenanceSliderStatus');
  var sliderLabel = sliderStatus ? sliderStatus.previousElementSibling : null;
  if (_botTesting) {
    if (sliderStatus) {
      sliderStatus.style.display = 'none';
    }
    if (sliderLabel && sliderLabel.textContent === '人机验证') {
      sliderLabel.style.display = 'none';
    }
    _sliderCaptchaToken = 'bot-testing-bypass';
  } else {
    if (sliderStatus) {
      sliderStatus.style.display = 'flex';
    }
    if (sliderLabel && sliderLabel.textContent === '人机验证') {
      sliderLabel.style.display = 'block';
    }
  }
}

function loadInfo() {
  fetch('/api/maintenance/info').then(function(r){return r.json()}).then(function(j){
    if(!j.ok||!j.data) return;
    if(j.data.message){ document.getElementById('notice').style.display='block'; document.getElementById('noticeText').textContent=j.data.message; }
    if(j.data.updatedAt){ document.getElementById('timeInfo').textContent='维护开始于 ' + new Date(j.data.updatedAt).toLocaleString('zh-CN'); }
    if(!j.data.enabled) location.href='/';
    // 获取 botTesting 状态
    fetch('/api/admin/maintenance/status', { headers: { 'x-admin-token': localStorage.getItem('adminToken') || '' } })
      .then(function(r) { return r.json(); })
      .then(function(j) {
        if (j.ok && j.data) {
          _botTesting = j.data.botTesting === true || j.data.botTesting === 'true';
          updateSliderUI();
        }
      }).catch(function() {});
  });
}
function openModal() { document.getElementById('modal').classList.add('active');  document.getElementById('keyInput').focus(); }
function closeModal() { document.getElementById('modal').classList.remove('active'); document.getElementById('errMsg').textContent=''; document.getElementById('keyInput').value=''; document.getElementById('capInput').value=''; }
function submit() {
  var k=document.getElementById('keyInput').value.trim();
  var e=document.getElementById('errMsg');
  var b=document.getElementById('submitBtn');
  e.textContent='';
  if(!k){e.textContent='请输入密钥';return;}
  if(!_botTesting && !_sliderCaptchaToken){e.textContent='请先完成人机验证';return;}
  b.disabled=true;b.textContent='验证中...';
  fetch('/api/maintenance/verify',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({testKey:k,captchaId:_sliderCaptchaToken,captchaText:'1'})})
  .then(function(r){return r.json()}).then(function(j){
    if(!j.ok){e.textContent=j.msg;loadCap();document.getElementById('capInput').value='';return;}
    document.cookie='maintenance_bypass='+j.data.token+';path=/;max-age='+(4*3600);
    location.href='/';
  }).catch(function(){e.textContent='网络错误';})
  .finally(function(){b.disabled=false;b.textContent='进入';});
}
loadInfo();
setInterval(loadInfo,30000);
</script>
<script src="slider-captcha/longbow.slidercaptcha.min.js"></script>
</body>
</html>
