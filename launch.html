<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>校园墙</title>
<style>
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --bg: #ffffff;
  --text: #000000;
  --text-secondary: #6e6e73;
  --text-tertiary: #86868b;
  --accent: #000000;
  --button-bg: #000000;
  --button-text: #ffffff;
}

html {
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  scroll-behavior: smooth;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", "PingFang SC", "Noto Sans SC", sans-serif;
  font-weight: 400;
  line-height: 1.47059;
  letter-spacing: -0.022em;
  min-height: 100vh;
  overflow-x: hidden;
}

.hero {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 52px 24px 80px;
  text-align: center;
  position: relative;
}

.hero-content {
  position: relative;
  z-index: 2;
  transform: translateY(-60px);
}

.hero-title {
  font-size: clamp(120px, 20vw, 260px);
  font-weight: 600;
  letter-spacing: 0em;
  line-height: 1.0;
  margin-bottom: 8px;
  opacity: 0;
  animation: titleReveal 1.3s 0.1s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
}

.hero-subtitle {
  font-size: clamp(21px, 3vw, 28px);
  font-weight: 400;
  letter-spacing: 0.05em;
  color: var(--text-secondary);
  margin-bottom: 8px;
  opacity: 0;
  animation: fadeIn 1s 0.75s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
}

.hero-cta {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 14px 32px;
  border-radius: 980px;
  background: var(--button-bg);
  color: var(--button-text);
  font-size: 17px;
  font-weight: 500;
  letter-spacing: -0.01em;
  text-decoration: none;
  border: none;
  cursor: pointer;
  transition: all 0.28s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  opacity: 0;
  animation: fadeIn 1s 1.1s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
}

.hero-cta:hover {
  background: #333333;
  transform: translateY(-1px);
}

.hero-cta:active {
  transform: scale(0.97);
}

.cta-arrow {
  display: inline-block;
  font-size: 17px;
  transition: transform 0.28s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}

.hero-cta:hover .cta-arrow {
  transform: translateX(3px);
}

.background-dot {
  position: absolute;
  border-radius: 50%;
  background: rgba(0, 0, 0, 0.03);
  pointer-events: none;
}

.dot-1 {
  width: 600px;
  height: 600px;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  animation: breathe 6s ease-in-out infinite;
}

.dot-2 {
  width: 300px;
  height: 300px;
  top: 40%;
  left: 30%;
  transform: translate(-50%, -50%);
  animation: breathe 8s ease-in-out 1s infinite;
}

.dot-3 {
  width: 200px;
  height: 200px;
  top: 60%;
  right: 25%;
  transform: translate(50%, -50%);
  animation: breathe 7s ease-in-out 2s infinite;
}

/* ---- typing bar ---- */
.typing-bar {
  display: flex;
  justify-content: center;
  align-items: center;
  margin-bottom: 48px;
  opacity: 0;
  animation: fadeIn 1s 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
  min-height: 28px;
}

.typing-wrapper {
  display: inline-flex;
  align-items: baseline;
}

#typingText {
  font-size: 15px;
  font-weight: 400;
  letter-spacing: 0.03em;
  color: var(--text-secondary);
  font-family: "SF Mono", "Fira Code", "PingFang SC", monospace;
  white-space: nowrap;
}

.cursor {
  display: inline-block;
  width: 2px;
  height: 1em;
  background: var(--text-secondary);
  margin-left: 3px;
  vertical-align: text-bottom;
  animation: blink 1s step-end infinite;
}

.cursor.hidden {
  display: none;
}

@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes titleReveal {
  0% {
    opacity: 0;
    letter-spacing: 0em;
  }
  40% {
    opacity: 1;
  }
  100% {
    opacity: 1;
    letter-spacing: 0.08em;
  }
}

@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}

@keyframes breathe {
  0%, 100% {
    transform: translate(-50%, -50%) scale(1);
    opacity: 0.6;
  }
  50% {
    transform: translate(-50%, -50%) scale(1.08);
    opacity: 1;
  }
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0; }
}

@media (max-width: 734px) {
  .hero-title {
    font-size: clamp(80px, 14vw, 120px);
  }
  .hero-subtitle {
    font-size: 19px;
  }
}
</style>
</head>
<body>

<section class="hero">
  <div class="background-dot dot-1"></div>
  <div class="background-dot dot-2"></div>
  <div class="background-dot dot-3"></div>

  <div class="hero-content">
    <h1 class="hero-title">校园墙</h1>
    <p class="hero-subtitle">现已推出</p>
    <div class="typing-bar">
      <span class="typing-wrapper">
        <span id="typingText"></span>
        <span class="cursor"></span>
      </span>
    </div>
    <a href="http://154.37.221.232/" class="hero-cta">
      立即访问
      <span class="cta-arrow">→</span>
    </a>
  </div>
</section>

<script>
const texts = ["powered by wr1Ench", "由wr1Ench技术驱动"];
let t = 0, charI = 0, deleting = false;
const el = document.getElementById("typingText");
const cursor = document.querySelector(".cursor");

function tick() {
  const cur = texts[t];
  if (!deleting) {
    el.textContent = cur.slice(0, charI + 1);
    charI++;
    if (charI === 1) cursor.classList.remove("hidden");
    if (charI === cur.length) { deleting = true; return setTimeout(tick, 2000); }
    return setTimeout(tick, 100);
  } else {
    cursor.classList.add("hidden");
    el.textContent = cur.slice(0, charI - 1);
    charI--;
    if (charI === 0) { deleting = false; t = (t + 1) % texts.length; return setTimeout(tick, 600); }
    return setTimeout(tick, 50);
  }
}
setTimeout(tick, 1600);
</script>

</body>
</html>
