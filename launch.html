<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>校园墙</title>
<style>
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --bg: #0a0a0f;
  --cyan-light: #00ffd5;
  --cyan-mid: #00d4aa;
  --cyan-dark: #00a88c;
  --glow: rgba(0, 255, 213, 0.15);
  --button-bg: linear-gradient(135deg, #00d4aa, #00a88c);
  --button-text: #0a0a0f;
}

html {
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  background: var(--bg);
  color: #e0e0e0;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", "PingFang SC", "Noto Sans SC", sans-serif;
  font-weight: 400;
  line-height: 1.47059;
  letter-spacing: -0.022em;
  min-height: 100vh;
  overflow-x: hidden;
}

.hero {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 52px 24px 80px;
  text-align: center;
  position: relative;
}

.hero-content {
  position: relative;
  z-index: 2;
  transform: translateY(-60px);
}

/* 主打字区域：大字号 */
.hero-typing {
  display: flex;
  justify-content: center;
  align-items: center;
  margin-bottom: 48px;
  min-height: clamp(120px, 20vw, 260px);
}

#heroTypingText {
  display: inline-block;
  font-size: clamp(120px, 20vw, 260px);
  font-weight: 600;
  letter-spacing: 0.08em;
  line-height: 1.0;
  background: linear-gradient(135deg, var(--cyan-light), var(--cyan-mid), var(--cyan-dark));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  white-space: nowrap;
}

/* 副打字区域：powered by */
.sub-typing {
  display: flex;
  justify-content: center;
  align-items: center;
  margin-bottom: 48px;
  min-height: 28px;
}

#subTypingText {
  display: inline-block;
  font-size: 15px;
  font-weight: 400;
  letter-spacing: 0.04em;
  color: var(--cyan-mid);
  white-space: nowrap;
}

.typing-wrapper {
  display: inline-flex;
  align-items: baseline;
}

.cursor {
  display: inline-block;
  width: 3px;
  height: 1em;
  background: var(--cyan-light);
  margin-left: 4px;
  vertical-align: text-bottom;
  animation: blink 1s step-end infinite;
}

.cursor.large {
  width: 5px;
  height: 0.85em;
  background: var(--cyan-light);
  margin-left: 8px;
  box-shadow: 0 0 12px var(--cyan-light), 0 0 24px var(--glow);
}

.hero-cta {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 14px 32px;
  border-radius: 980px;
  background: var(--button-bg);
  color: var(--button-text);
  font-size: 17px;
  font-weight: 600;
  letter-spacing: -0.01em;
  text-decoration: none;
  border: 1px solid rgba(0, 255, 213, 0.3);
  cursor: pointer;
  transition: all 0.28s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  opacity: 0;
  animation: fadeIn 1s 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
}

.hero-cta:hover {
  background: linear-gradient(135deg, var(--cyan-light), var(--cyan-mid));
  transform: translateY(-1px);
  box-shadow: 0 4px 24px var(--glow), 0 0 48px rgba(0, 255, 213, 0.08);
}

.hero-cta:active {
  transform: scale(0.97);
}

.cta-arrow {
  display: inline-block;
  font-size: 17px;
  transition: transform 0.28s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}

.hero-cta:hover .cta-arrow {
  transform: translateX(3px);
}

.background-dot {
  position: absolute;
  border-radius: 50%;
  pointer-events: none;
}

.dot-1 {
  width: 600px; height: 600px;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  background: radial-gradient(circle, rgba(0, 255, 213, 0.08) 0%, transparent 70%);
  animation: breathe 6s ease-in-out infinite;
}

.dot-2 {
  width: 300px; height: 300px;
  top: 40%; left: 30%;
  transform: translate(-50%, -50%);
  background: radial-gradient(circle, rgba(0, 212, 170, 0.06) 0%, transparent 70%);
  animation: breathe 8s ease-in-out 1s infinite;
}

.dot-3 {
  width: 200px; height: 200px;
  top: 60%; right: 25%;
  transform: translate(50%, -50%);
  background: radial-gradient(circle, rgba(0, 168, 140, 0.05) 0%, transparent 70%);
  animation: breathe 7s ease-in-out 2s infinite;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}

@keyframes breathe {
  0%, 100% {
    transform: translate(-50%, -50%) scale(1);
    opacity: 0.5;
  }
  50% {
    transform: translate(-50%, -50%) scale(1.15);
    opacity: 1;
  }
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0; }
}

@media (max-width: 734px) {
  #heroTypingText {
    font-size: clamp(80px, 14vw, 120px);
  }
}
</style>
</head>
<body>

<section class="hero">
  <div class="background-dot dot-1"></div>
  <div class="background-dot dot-2"></div>
  <div class="background-dot dot-3"></div>

  <div class="hero-content">
    <!-- 大字打字：现已推出 ↔ 校园墙 -->
    <div class="hero-typing">
      <span class="typing-wrapper">
        <span id="heroTypingText"></span>
        <span class="cursor large"></span>
      </span>
    </div>
    <!-- 小字打字：powered by wr1Ench ↔ 由wr1Ench技术驱动 -->
    <div class="sub-typing">
      <span class="typing-wrapper">
        <span id="subTypingText"></span>
        <span class="cursor"></span>
      </span>
    </div>
    <a href="http://154.37.221.232/" class="hero-cta">
      立即访问
      <span class="cta-arrow">→</span>
    </a>
  </div>
</section>

<script>
(function() {
  // 大字交替：先"现已推出"，再"校园墙"
  var heroTexts = ["现已推出", "校园墙"];
  var ht = 0, hCharI = 0, hDeleting = false;
  var hEl = document.getElementById("heroTypingText");
  var hCursor = document.querySelector(".cursor.large");

  // 小字交替
  var subTexts = ["powered by wr1Ench", "由wr1Ench技术驱动"];
  var st = 0, sCharI = 0, sDeleting = false;
  var sEl = document.getElementById("subTypingText");
  var sCursor = document.querySelector(".cursor:not(.large)");

  if (!hEl || !hCursor || !sEl || !sCursor) return;

  // 大字打字机
  function heroTick() {
    var cur = heroTexts[ht];
    if (!hDeleting) {
      hEl.textContent = cur.slice(0, hCharI + 1);
      hCharI++;
      if (hCharI === cur.length) { hDeleting = true; setTimeout(heroTick, 2200); return; }
      setTimeout(heroTick, 150);
    } else {
      hEl.textContent = cur.slice(0, hCharI - 1);
      hCharI--;
      if (hCharI === 0) { hDeleting = false; ht = (ht + 1) % heroTexts.length; setTimeout(heroTick, 800); return; }
      setTimeout(heroTick, 70);
    }
  }

  // 小字打字机
  function subTick() {
    var cur = subTexts[st];
    if (!sDeleting) {
      sEl.textContent = cur.slice(0, sCharI + 1);
      sCharI++;
      if (sCharI === 1) sCursor.style.display = "";
      if (sCharI === cur.length) { sDeleting = true; setTimeout(subTick, 2000); return; }
      setTimeout(subTick, 100);
    } else {
      sCursor.style.display = "none";
      sEl.textContent = cur.slice(0, sCharI - 1);
      sCharI--;
      if (sCharI === 0) { sDeleting = false; st = (st + 1) % subTexts.length; sCursor.style.display = ""; setTimeout(subTick, 600); return; }
      setTimeout(subTick, 50);
    }
  }

  window.addEventListener("load", function() {
    setTimeout(heroTick, 300);     // 大字几乎立刻开始
    setTimeout(subTick, 2500);     // 小字等大字第一轮打完再开始
  });
})();
</script>

</body>
</html>
