<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>用户 · 校园墙</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="slider-captcha/slidercaptcha.min.css">
  <style>
    :root {
      --bg: #F6F5F3;
      --surface: #FFFFFF;
      --border: #E8E6E4;
      --text-primary: #1C1B1A;
      --text-secondary: #8C8A88;
      --text-muted: #B8B6B4;
      --accent: #8B6F5E;
      --accent-light: rgba(139,111,94,0.08);
      --accent-hover: rgba(139,111,94,0.15);
      --danger: #DC4A3D;
      --danger-light: #FDEBEC;
      --success: #346538;
      --success-light: #EDF3EC;
      --warning: #956400;
      --warning-light: #FBF3DB;
      --radius: 8px;
      --radius-sm: 6px;
      --font: 'Noto Sans SC', -apple-system, 'PingFang SC', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ===== Top Bar ===== */
    .top-bar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(246,245,243,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }

    .top-bar-inner {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .top-bar-brand {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-primary);
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      letter-spacing: 0.02em;
    }

    .top-bar-brand svg {
      width: 18px;
      height: 18px;
      color: var(--accent);
      flex-shrink: 0;
    }

    .top-bar-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text-secondary);
      font-size: 13px;
      font-family: var(--font);
      cursor: pointer;
      text-decoration: none;
      transition: all 0.15s ease;
    }

    .top-bar-back:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .top-bar-back svg {
      width: 14px;
      height: 14px;
    }

    /* ===== Container ===== */
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* ===== Profile Section ===== */
    .profile {
      padding: 48px 0 40px;
    }

    .profile-inner {
      display: flex;
      align-items: flex-start;
      gap: 32px;
    }

    .profile-avatar {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      background: var(--accent-light);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      color: var(--accent);
      overflow: hidden;
      flex-shrink: 0;
    }

    .profile-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .profile-info {
      flex: 1;
      min-width: 0;
    }

    .profile-name-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 4px;
      flex-wrap: wrap;
    }

    .profile-name {
      font-size: 24px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.01em;
    }

    .profile-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.03em;
    }

    .profile-badge.super {
      background: rgba(220,74,61,0.1);
      color: var(--danger);
    }

    .profile-badge.admin {
      background: var(--warning-light);
      color: var(--warning);
    }

    .profile-meta {
      display: flex;
      align-items: center;
      gap: 16px;
      color: var(--text-secondary);
      font-size: 14px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .profile-meta span {
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .profile-meta svg {
      width: 14px;
      height: 14px;
      color: var(--text-muted);
    }

    .profile-uid {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      color: var(--text-muted);
      font-size: 13px;
      margin-bottom: 20px;
    }

    .profile-uid svg {
      width: 14px;
      height: 14px;
    }

    .profile-stats {
      display: flex;
      gap: 32px;
      margin-bottom: 24px;
    }

    .profile-stat {
      text-align: left;
    }

    .profile-stat-value {
      font-size: 22px;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.2;
    }

    .profile-stat-label {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    .profile-actions {
      display: flex;
      gap: 8px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 18px;
      border-radius: var(--radius);
      font-family: var(--font);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
      border: none;
      text-decoration: none;
    }

    .btn svg {
      width: 14px;
      height: 14px;
    }

    .btn-ghost {
      background: var(--accent-light);
      color: var(--accent);
      border: 1px solid transparent;
    }

    .btn-ghost:hover {
      background: var(--accent-hover);
    }

    .btn-ghost:active {
      transform: scale(0.97);
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-primary:hover {
      background: #7A5F4E;
    }

    .btn-primary:active {
      transform: scale(0.97);
    }

    .btn-cert {
      background: var(--success-light);
      color: var(--success);
      border: 1px solid transparent;
    }

    .btn-cert:hover {
      background: #DCEADC;
    }

    .btn-credit {
      background: linear-gradient(135deg, #f5c518, #e0a800);
      color: #5a3d00;
      border: 1px solid transparent;
      font-weight: 600;
      box-shadow: 0 2px 8px rgba(224,168,0,0.18);
    }

    .btn-credit:hover {
      filter: brightness(1.04);
    }

    .btn-credit:active {
      transform: scale(0.97);
    }

    .btn-outline {
      background: transparent;
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }

    .btn-outline:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .btn-danger-ghost {
      background: var(--danger-light);
      color: var(--danger);
    }

    .btn-danger-ghost:hover {
      background: #FAD5D5;
    }

    /* ===== Certification Info ===== */
    .cert-info {
      margin-top: 16px;
      padding: 14px 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: none;
    }

    .cert-info-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .cert-info-header svg {
      width: 16px;
      height: 16px;
      color: var(--success);
    }

    .cert-info-header span {
      font-size: 14px;
      font-weight: 500;
    }

    .cert-badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
    }

    .cert-edit-area {
      margin-top: 8px;
      text-align: left;
    }

    /* ===== Divider ===== */
    .section-divider {
      height: 1px;
      background: var(--border);
      margin-bottom: 32px;
    }

    /* ===== Posts ===== */
    .posts-section {
      padding-bottom: 64px;
    }

    .posts-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 24px;
    }

    .posts-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .posts-count {
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 400;
    }

    .posts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }

    .post-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      flex-direction: column;
    }

    .post-card:hover {
      border-color: #D4D2D0;
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
    }

    .post-card:active {
      transform: scale(0.99);
    }

    .post-type {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.02em;
      margin-bottom: 10px;
      align-self: flex-start;
    }

    .post-type.daily {
      background: var(--warning-light);
      color: var(--warning);
    }

    .post-type.love {
      background: var(--danger-light);
      color: var(--danger);
    }

    .post-type.tree {
      background: var(--success-light);
      color: var(--success);
    }

    .post-type.lost {
      background: #E1F3FE;
      color: #1F6C9F;
    }

    .post-type.event {
      background: #FDF0E6;
      color: #8D6E4E;
    }

    .post-type.default {
      background: #F0EEF0;
      color: #6B5E6B;
    }

    .post-content {
      font-size: 15px;
      line-height: 1.7;
      color: var(--text-primary);
      flex: 1;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      margin-bottom: 14px;
    }

    .post-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 12px;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
      padding-top: 12px;
    }

    .post-author {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .post-author-avatar {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--accent-light);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      color: var(--accent);
      overflow: hidden;
      flex-shrink: 0;
    }

    .post-author-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .post-author-name {
      color: var(--text-secondary);
    }

    .post-stats {
      display: flex;
      gap: 14px;
    }

    .post-stats span {
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .post-stats svg {
      width: 13px;
      height: 13px;
    }

    .post-time {
      font-size: 12px;
      color: var(--text-muted);
    }

    /* ===== States ===== */
    .loading-state {
      text-align: center;
      padding: 60px 0;
      color: var(--text-muted);
      font-size: 14px;
    }

    .error-state {
      text-align: center;
      padding: 24px 20px;
      background: var(--danger-light);
      border: 1px solid #F5C6C6;
      border-radius: var(--radius);
      color: var(--danger);
      font-size: 14px;
      margin: 24px 0;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
      font-size: 14px;
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      background: var(--surface);
    }

    .empty-state svg {
      width: 32px;
      height: 32px;
      margin-bottom: 12px;
      color: var(--text-muted);
    }

    /* ===== Modal ===== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(28,27,26,0.4);
      backdrop-filter: blur(4px);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.25s ease, visibility 0.25s ease;
    }

    .modal-overlay.show {
      opacity: 1;
      visibility: visible;
    }

    .modal {
      background: var(--surface);
      border-radius: 12px;
      padding: 28px 24px 24px;
      width: 90%;
      max-width: 480px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.12);
      max-height: 85vh;
      overflow-y: auto;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .modal-title {
      font-size: 17px;
      font-weight: 600;
    }

    .modal-close {
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      border: none;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
    }

    .modal-close:hover {
      background: var(--accent-light);
      color: var(--text-primary);
    }

    .modal-close svg {
      width: 16px;
      height: 16px;
    }

    .modal-body {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
    }

    .form-input {
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-family: var(--font);
      font-size: 14px;
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.15s;
      background: var(--surface);
    }

    .form-input:focus {
      border-color: var(--accent);
    }

    .form-input::placeholder {
      color: var(--text-muted);
    }

    textarea.form-input {
      resize: vertical;
      min-height: 80px;
      line-height: 1.5;
    }

    .form-hint {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.4;
    }

    .form-status {
      text-align: center;
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 500;
      display: none;
    }

    .form-status.show {
      display: block;
    }

    .form-status.success {
      background: var(--success-light);
      color: var(--success);
    }

    .form-status.error {
      background: var(--danger-light);
      color: var(--danger);
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 4px;
    }

    .modal-actions .btn {
      flex: 1;
      justify-content: center;
      padding: 10px 18px;
    }

    /* ===== Avatar Upload ===== */
    .avatar-upload {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .avatar-preview {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: var(--accent-light);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      color: var(--accent);
      overflow: hidden;
    }

    .avatar-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .file-input-label {
      display: inline-block;
      padding: 8px 18px;
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      font-size: 13px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.15s;
    }

    .file-input-label:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .file-input {
      display: none;
    }

    .file-hint {
      font-size: 12px;
      color: var(--text-muted);
      text-align: center;
    }

    /* ===== Cert Tab ===== */
    .cert-tabs {
      display: flex;
      gap: 0;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 18px;
    }

    .cert-tab {
      flex: 1;
      padding: 9px 0;
      font-size: 13px;
      font-weight: 500;
      border: none;
      cursor: pointer;
      transition: all 0.15s;
      font-family: var(--font);
    }

    .cert-tab.active {
      background: var(--success);
      color: #fff;
    }

    .cert-tab:not(.active) {
      background: var(--bg);
      color: var(--text-secondary);
    }

    .cert-tab:not(.active):hover {
      background: #ECEBE8;
    }

    .cert-panel {
      display: none;
    }

    .cert-panel.active {
      display: block;
    }

    .cert-notice {
      font-size: 12px;
      padding: 12px 14px;
      border-radius: var(--radius-sm);
      margin-bottom: 14px;
      line-height: 1.6;
      text-align: center;
    }

    .cert-notice.info {
      background: var(--success-light);
      color: var(--success);
    }

    .cert-notice.warning {
      background: var(--warning-light);
      color: var(--warning);
      border: 1px solid rgba(149,100,0,0.15);
    }

    .cert-notice a {
      color: inherit;
      text-decoration: underline;
      cursor: pointer;
      font-weight: 600;
    }

    .manual-images-preview {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .manual-image-item {
      position: relative;
      width: 72px;
      height: 72px;
    }

    .manual-image-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
    }

    .manual-image-remove {
      position: absolute;
      top: -6px;
      right: -6px;
      background: var(--danger);
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 18px;
      height: 18px;
      cursor: pointer;
      font-size: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .manual-image-add {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px;
      border: 1px dashed var(--border);
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 13px;
      color: var(--text-secondary);
      transition: all 0.15s;
    }

    .manual-image-add:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ===== Flow Popup ===== */
    .flow-overlay {
      position: fixed;
      inset: 0;
      z-index: 300;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(28,27,26,0.5);
      backdrop-filter: blur(4px);
    }

    .flow-box {
      background: var(--surface);
      border-radius: 12px;
      padding: 28px 24px;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.15);
    }

    .flow-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 20px;
      text-align: center;
    }

    .flow-steps {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .flow-step {
      background: var(--success);
      color: #fff;
      padding: 10px 18px;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 500;
      text-align: center;
      min-width: 200px;
      line-height: 1.5;
    }

    .flow-arrow {
      color: var(--success);
      font-size: 16px;
      font-weight: 600;
      padding: 2px 0;
    }

    .flow-footer {
      text-align: center;
      margin-top: 20px;
    }

    .flow-btn {
      padding: 8px 32px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      font-family: var(--font);
      transition: background 0.15s;
    }

    .flow-btn:hover {
      background: #7A5F4E;
    }

    /* ===== Certification Section ===== */
    .cert-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 24px;
      display: none;
    }

    .cert-section-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .cert-title-apply-btn {
      margin-left: auto;
      font-size: 12px;
      padding: 3px 12px;
      border: 1px solid var(--accent);
      border-radius: 20px;
      background: transparent;
      color: var(--accent);
      cursor: pointer;
      font-weight: 500;
      transition: all .2s;
    }

    .cert-title-apply-btn:hover {
      background: var(--accent);
      color: #fff;
    }

    .cert-items {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .cert-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 14px;

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const userId = urlParams.get('id');
    if (!userId) {
      document.body.innerHTML = '<div class="error-state" style="display:block;margin:40px auto;max-width:400px;">无效的用户 ID</div>';
      throw new Error('Missing user ID');
    }

    const API_BASE = '/api';

    async function fetchUserInfo() {
      try {
        const resp = await fetch(API_BASE + '/users/' + userId);
        const data = await resp.json();
        if (!data.ok) throw new Error(data.msg || '获取用户信息失败');
        return data.data;
      } catch (err) {
        console.error(err);
        showError('用户信息', err.message);
        return null;
      }
    }

    async function fetchUserPosts() {
      try {
        const resp = await fetch(API_BASE + '/users/' + userId + '/posts');
        const data = await resp.json();
        if (!data.ok) throw new Error(data.msg || '获取帖子失败');
        return data.data;
      } catch (err) {
        console.error(err);
        showError('帖子列表', err.message);
        return [];
      }
    }

    function showError(context, msg) {
      const errorEl = document.getElementById('postsError');
      errorEl.textContent = '加载' + context + '失败：' + msg;
      errorEl.style.display = 'block';
    }

    function renderUser(user) {
      if (!user) return;
      document.getElementById('userNickname').textContent = user.nickname || '匿名';
      document.getElementById('userUsername').textContent = '@' + (user.username || '--');
      const joinDate = new Date(user.createdAt).toLocaleDateString('zh-CN');
      document.getElementById('userJoinDate').querySelector('span').textContent = '加入于 ' + joinDate;
      document.getElementById('postCount').textContent = user.postCount || 0;

      const avatarEl = document.getElementById('userAvatar');
      if (user.avatar && user.avatar.trim()) {
        if (user.avatar.startsWith('data:image')) {
          avatarEl.innerHTML = '<img src="' + user.avatar + '" alt="头像">';
        } else {
          avatarEl.textContent = (user.avatar && user.avatar.length <= 4) ? user.avatar : (user.nickname ? user.nickname.charAt(0) : '');
        }
      } else {
        avatarEl.textContent = user.nickname ? user.nickname.charAt(0) : '';
      }

      const badge = document.getElementById('adminBadge');
      if (user.bindAdminRole === 'super') {
        badge.textContent = '超管';
        badge.className = 'profile-badge super';
        badge.style.display = '';
      } else if (user.bindAdminRole === 'admin') {
        badge.textContent = '普管';
        badge.className = 'profile-badge admin';
        badge.style.display = '';
      } else {
        badge.style.display = 'none';
      }

      const uidEl = document.getElementById('profileUid');
      if (uidEl) {
        uidEl.querySelector('span').textContent = 'UID: ' + user.id;
      }

      const creditInline = document.getElementById('userCreditInline');
      if (creditInline) {
        if (currentLoggedInUser && currentLoggedInUser.id === user.id) {
          creditInline.textContent = (currentLoggedInUser.credit || 0);
        } else {
          creditInline.textContent = (user.credit || 0);
        }
      }
    }

    function calculateStats(posts) {
      let totalLikes = 0;
      let totalComments = 0;
      if (posts) {
        posts.forEach(function(post) {
          totalLikes += post.likes || 0;
          totalComments += post.commentsCount || 0;
        });
      }
      document.getElementById('postCount').textContent = posts ? posts.length : 0;
      document.getElementById('likeCount').textContent = totalLikes;
      document.getElementById('commentCount').textContent = totalComments;
    }

    function renderPosts(posts) {
      const grid = document.getElementById('postsGrid');
      const loading = document.getElementById('postsLoading');
      const empty = document.getElementById('emptyPosts');

    function getCertStatusText(status) {
      var map = { pending: '待审核', approved: '已认证', rejected: '已拒绝', pending_confirm: '待确认' };
      return map[status] || '未认证';
    }

    function getCertStatusTag(status) {
      var map = { pending: 'pending', approved: 'approved', rejected: 'rejected', pending_confirm: 'pending' };
      return map[status] || '';
    }

    async function renderCertSection(viewedUser) {
      var section = document.getElementById('certSection');
      var schoolStatus = document.getElementById('schoolCertStatus');
      var schoolActions = document.getElementById('schoolCertActions');
      var adminStatus = document.getElementById('adminCertStatus');
      var adminActions = document.getElementById('adminCertActions');
      var isSelf = !viewedUser || (currentLoggedInUser && currentLoggedInUser.id === userId);

      var schoolStatusText = '未认证';
      var schoolStatusRaw = null;
      var adminStatusText = '未认证';

      if (isSelf) {
        // 自己主页：调 API 获取详细状态
        var token = localStorage.getItem('campus_user_token');
        if (!token) return;
        try {
          var resp = await fetch('/api/user/me/zhixue-info', {
            headers: { 'x-user-token': token }
          });
          var data = await resp.json();
          if (data.ok && data.data) {
            var info = data.data;
            schoolStatusRaw = info.status;
            schoolStatusText = getCertStatusText(info.status);
            _pendingEditData = info.editData || null;
          }
        } catch (e) { console.error('加载认证信息失败', e); }
        try {
          var meResp = await fetch('/api/user/me', {
            headers: { 'x-user-token': token }
          });
          var meData = await meResp.json();
          if (meData.ok && meData.data) {
            if (meData.data.bindAdminRole === 'super') {
              adminStatusText = '已认证 · ' + (meData.data.bindAdminId || '超管');
            } else if (meData.data.bindAdminRole === 'admin') {
              adminStatusText = '已绑定管理员';
            }
          }
        } catch (e) { console.error('加载用户信息失败', e); }
      } else {
        // 他人主页：直接用 viewedUser 数据，只显示 approved
        schoolStatusRaw = viewedUser.zhixueStatus || null;
        if (schoolStatusRaw !== 'approved') {
          schoolStatusRaw = null;
        } else {
          schoolStatusText = '已认证';
        }
        if (viewedUser.bindAdminRole === 'super') {
          adminStatusText = '已认证 · ' + (viewedUser.bindAdminId || '超管');
        } else if (viewedUser.bindAdminRole === 'admin') {
          adminStatusText = '已绑定管理员';
        } else {
          adminStatusText = '未认证';
        }
      }

      // 渲染同学认证行
      var schoolTag = getCertStatusTag(schoolStatusRaw);
      schoolStatus.innerHTML = schoolStatusText + (schoolTag ? ' <span class="tag ' + schoolTag + '">' + getCertStatusText(schoolStatusRaw) + '</span>' : '');
      schoolActions.innerHTML = '';
      if (isSelf) {
        if (!schoolStatusRaw || schoolStatusRaw === 'rejected' || schoolStatusRaw === 'none') {
          var btn = document.createElement('button');
          btn.className = 'btn-sm primary';
          btn.textContent = '申请认证';
          btn.onclick = function() { openCertChoiceModal(); };
          schoolActions.appendChild(btn);
        } else if (schoolStatusRaw === 'pending' || schoolStatusRaw === 'pending_confirm') {
          var editBtn = document.createElement('button');
          editBtn.className = 'btn-sm';
          editBtn.textContent = '修改';
          editBtn.onclick = function() { openSchoolCertModal(); };
          schoolActions.appendChild(editBtn);
        }
      }

      // 渲染超管认证行
      var isAdminBound = adminStatusText !== '未认证';
      adminStatus.textContent = adminStatusText;
      adminActions.innerHTML = '';
      if (!isAdminBound && isSelf) {
        var adminBtn = document.createElement('button');
        adminBtn.className = 'btn-sm primary';
        adminBtn.textContent = '申请认证';
        adminBtn.onclick = function() { openAdminCert(); };
        adminActions.appendChild(adminBtn);
      }

      // 判断是否需要隐藏整个认证区域
      var hasApproved = schoolStatusRaw === 'approved' || isAdminBound;
      if (!isSelf && !hasApproved) {
        section.style.display = 'none';
        return;
      }

      section.style.display = 'block';

      var applyTitleBtn = document.querySelector('.cert-title-apply-btn');
      if (applyTitleBtn) {
        if (isSelf) {
          var canShow = !schoolStatusRaw || schoolStatusRaw === 'rejected' || schoolStatusRaw === 'none';
          applyTitleBtn.style.display = canShow ? '' : 'none';
        } else {
          applyTitleBtn.style.display = 'none';
        }
      }
    }

        _zhixueUniqueAvailable = true;
        return;

      _zhixueUniqueTimer = setTimeout(async function() {
        var token = localStorage.getItem('campus_user_token');
        try {
          var resp = await fetch('/api/user/check-zhixue-unique', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'x-user-token': token || '' },
            body: JSON.stringify({ zhixueUsername: username })
          });
          var data = await resp.json();
          var errEl = document.getElementById('zhixueUniqueError');
          if (data.ok && data.data) {
            _zhixueUniqueAvailable = data.data.available;
            if (!data.data.available) {
              if (errEl) { errEl.textContent = '此智学网账号已被绑定'; errEl.style.display = ''; }
            } else {
              if (errEl) errEl.style.display = 'none';
            }
          }
        } catch (e) { console.error('唯一性检查失败', e); }
      }, 500);
    }

    var manualImages = [];

    function handleManualImages(event) {
      var errEl = document.getElementById('manualImageError');
      var preview = document.getElementById('manualImagesPreview');
      errEl.style.display = 'none';
      var files = Array.from(event.target.files);

      if (manualImages.length + files.length > 3) {
        errEl.textContent = '最多上传3张图片';
        errEl.style.display = '';
        event.target.value = '';
        return;
      }

      files.forEach(function(file) {
        if (!file.type.startsWith('image/')) {
          errEl.textContent = '只允许上传图片文件（' + file.name + '）';
          errEl.style.display = '';
          return;
        }
        if (file.size > 10 * 1024 * 1024) {
          errEl.textContent = '图片大小不能超过 10MB（' + file.name + '）';
          errEl.style.display = '';
          return;
        }
        var reader = new FileReader();
        reader.onload = function(e) {
          manualImages.push(e.target.result);
          var idx = manualImages.length - 1;
          var img = document.createElement('div');
          img.className = 'manual-image-item';
          img.innerHTML =
            '<img src="' + e.target.result + '">' +
            '<button class="manual-image-remove" onclick="removeManualImage(' + idx + ')">\u2715</button>';
          preview.appendChild(img);
        };
        reader.readAsDataURL(file);
      });
      event.target.value = '';
    }

    function removeManualImage(idx) {
      manualImages.splice(idx, 1);
      var preview = document.getElementById('manualImagesPreview');
      preview.innerHTML = '';
      manualImages.forEach(function(src, i) {
        var img = document.createElement('div');
        img.className = 'manual-image-item';
        img.innerHTML =
          '<img src="' + src + '">' +
          '<button class="manual-image-remove" onclick="removeManualImage(' + i + ')">\u2715</button>';
        preview.appendChild(img);
      });
    }

      btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-2px;margin-right:4px;"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> 人机验证';
      btn.onclick = function() {
        showSliderCaptcha('admin', function() {
          _adminCaptchaToken = _certCaptchaToken;
          var badge = document.createElement('span');
          badge.style.cssText = 'display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:999px;background:rgba(76,175,80,0.15);color:#388e3c;font-size:12px;font-weight:600;';
          badge.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg> 已验证';
          captchaArea.innerHTML = '';
          captchaArea.appendChild(badge);
        });
      };
      captchaArea.appendChild(btn);
      document.getElementById('adminAuthModal').classList.add('show');
    }

    function closeAdminAuthModal() {
      document.getElementById('adminAuthModal').classList.remove('show');
      _adminCaptchaToken = null;
    }

    async function doAdminAuth() {
      var adminId = document.getElementById('adminAuthId').value.trim();
      var adminPwd = document.getElementById('adminAuthPwd').value;
      var statusEl = document.getElementById('adminAuthStatus');

      if (!adminId) { showAdminAuthStatus('请输入管理员账号', 'error'); return; }
      if (!adminPwd) { showAdminAuthStatus('请输入管理员密码', 'error'); return; }
      if (!_adminCaptchaToken) { showAdminAuthStatus('请先完成人机验证', 'error'); return; }

      document.getElementById('adminAuthSubmitBtn').disabled = true;
      document.getElementById('adminAuthSubmitBtn').textContent = '验证中...';
      statusEl.className = 'form-status show';
      statusEl.textContent = '正在验证...';

      try {
        var token = localStorage.getItem('campus_user_token');
        // 先获取当前用户信息以获取用户密码
        var meResp = await fetch('/api/user/me', {
          headers: { 'x-user-token': token || '' }
        });
        var meData = await meResp.json();
        if (!meData.ok) { showAdminAuthStatus('请先登录', 'error'); return; }

        // 用户需要在输入框输入自己的密码进行授权
        // 简单提示用户需要先在校验弹窗输入自己的密码
        showAdminAuthStatus('请输入你的校园墙账号密码进行授权', 'error');
        // 弹窗让用户输入自己的密码
        var userPwd = prompt('请输入你的校园墙账号密码以授权绑定超管身份：');
        if (!userPwd) { showAdminAuthStatus('已取消', 'error'); return; }

        var resp = await fetch('/api/user/bind-admin', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'x-user-token': token || '' },
          body: JSON.stringify({ password: userPwd, adminId: adminId, adminPassword: adminPwd })
        });
        var data = await resp.json();
        if (data.ok) {
          showAdminAuthStatus('🎉 超管认证成功！', 'success');
          document.getElementById('adminAuthSubmitBtn').textContent = '已完成';
          setTimeout(function() {
            closeAdminAuthModal();
            renderCertSection();
          }, 1500);
        } else {
          showAdminAuthStatus(data.msg || '认证失败', 'error');
          document.getElementById('adminAuthSubmitBtn').disabled = false;
          document.getElementById('adminAuthSubmitBtn').textContent = '立即认证';
        }
      } catch (e) {
        showAdminAuthStatus('网络错误：' + e.message, 'error');
        document.getElementById('adminAuthSubmitBtn').disabled = false;
        document.getElementById('adminAuthSubmitBtn').textContent = '立即认证';
      }
    }

    function showAdminAuthStatus(msg, type) {
      var el = document.getElementById('adminAuthStatus');
      el.textContent = msg;
      el.className = 'form-status show ' + (type || '');
    }

    async function doBindZhixue() {
      var statusEl = document.getElementById('bindZhixueStatus');
      var isZhixueTab = document.getElementById('certPanelZhixue').classList.contains('active');

      function showErr(msg) {
        statusEl.textContent = msg;
        statusEl.className = 'form-status show error';
      }

      // 滑块验证检查
      if (!_certCaptchaToken) { showErr('请先完成人机验证'); return; }

      var body;
      if (isZhixueTab) {
        var username = document.getElementById('zhixueInputUsername').value.trim();
        var password = document.getElementById('zhixueInputPassword').value;
        if (!username) { showErr('请填写智学网账号'); return; }
        if (!password) { showErr('请填写智学网密码'); return; }
        if (!_zhixueUniqueAvailable) { showErr('此智学网账号已被绑定，请更换'); return; }
        body = { type: 'zhixue', zhixueUsername: username, zhixuePassword: password, captchaId: _certCaptchaToken, captchaText: '1' };
      } else {
        var name = document.getElementById('manualName').value.trim();
        var email = document.getElementById('manualEmail').value.trim();
        var note = document.getElementById('manualNote').value.trim();
        if (!name) { showErr('请填写姓名'); return; }
        if (!email) { showErr('请填写邮箱'); return; }
        if (!note) { showErr('请填写认证说明'); return; }
        if (manualImages.length === 0) { showErr('请至少上传一张证明图片'); return; }
        body = { type: 'manual', manualName: name, manualEmail: email, manualNote: note, manualImages: manualImages.slice(), captchaId: _certCaptchaToken, captchaText: '1' };
      }

      statusEl.textContent = '正在提交...';
      statusEl.className = 'form-status show success';

      try {
        var token = localStorage.getItem('campus_user_token');
        var resp = await fetch('/api/user/bind-zhixue', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'x-user-token': token },
          body: JSON.stringify(body)
        });
        var data = await resp.json();
        if (data.ok) {
          statusEl.textContent = data.msg;
          statusEl.className = 'form-status show success';
          setTimeout(function() {
            closeBindZhixueModal();
            renderCertSection();
          }, 1500);
        } else {
          throw new Error(data.msg || '提交失败');
        }
      } catch (e) {
        statusEl.textContent = e.message;
        statusEl.className = 'form-status show error';
      }
    }

    // ===== Edit Profile =====
    var currentLoggedInUser = null;

    async function checkCurrentUser() {
      var token = localStorage.getItem('campus_user_token');
      if (!token) return;
      try {
        var resp = await fetch('/api/user/me', {
          headers: { 'x-user-token': token }
        });
        var data = await resp.json();
        if (data.ok) {
          currentLoggedInUser = data.data;
          if (currentLoggedInUser.id === userId) {
            document.getElementById('editProfileBtn').style.display = '';
            renderCertSection();
          }
        }
      } catch (err) {
        console.error('获取当前用户失败', err);
      }
    }

    function openEditModal() {
      if (!currentLoggedInUser) return;
      document.getElementById('editNickname').value = currentLoggedInUser.nickname || '';
      var avatarPreview = document.getElementById('avatarPreview');
      if (currentLoggedInUser.avatar && currentLoggedInUser.avatar.startsWith('data:image')) {
        avatarPreview.innerHTML = '<img src="' + currentLoggedInUser.avatar + '" alt="头像">';
        avatarPreview.dataset.base64 = currentLoggedInUser.avatar;
      } else {
        avatarPreview.textContent = currentLoggedInUser.avatar || (currentLoggedInUser.nickname ? currentLoggedInUser.nickname.charAt(0) : '');
        avatarPreview.dataset.base64 = '';
      }
      document.getElementById('editAvatarFile').value = '';
      document.getElementById('editProfileModal').classList.add('show');
    }

    function closeEditModal() {
      document.getElementById('editProfileModal').classList.remove('show');
    }

    function handleAvatarFileSelect(event) {
      var file = event.target.files[0];
      if (!file) return;
      var isImage = file.type.startsWith('image/');
      var hasJpgExt = file.name.match(/\.jpe?g$/i);
      if (!isImage || !hasJpgExt) {
        alert('请选择 JPG 格式的图片');
        event.target.value = '';
        return;
      }
      if (file.size > 500 * 1024) {
        alert('图片大小不能超过 500KB');
        event.target.value = '';
        return;
      }
      var reader = new FileReader();
      reader.onload = function(e) {
        var avatarPreview = document.getElementById('avatarPreview');
        avatarPreview.innerHTML = '<img src="' + e.target.result + '" alt="头像">';
        avatarPreview.dataset.base64 = e.target.result;
      };
      reader.readAsDataURL(file);
    }

    async function saveProfile() {
      var nickname = document.getElementById('editNickname').value.trim();
      var avatarPreview = document.getElementById('avatarPreview');
      var avatarBase64 = avatarPreview.dataset.base64;
      var currentAvatar = currentLoggedInUser.avatar;

      if (nickname.length < 2 || nickname.length > 12) {
        alert('昵称需 2-12 个字符');
        return;
      }

      var updateData = {};
      if (nickname !== currentLoggedInUser.nickname) {
        updateData.nickname = nickname;
      }
      if (avatarBase64 && avatarBase64 !== currentAvatar) {
        updateData.avatar = avatarBase64;
      }

      if (Object.keys(updateData).length === 0) {
        closeEditModal();
        return;
      }

      var token = localStorage.getItem('campus_user_token');
      if (!token) {
        alert('登录已过期，请重新登录');
        return;
      }

      try {
        var resp = await fetch('/api/user/me', {
          method: 'PATCH',
          headers: {
            'Content-Type': 'application/json',
            'x-user-token': token
          },
          body: JSON.stringify(updateData)
        });
        var data = await resp.json();
        if (!data.ok) throw new Error(data.msg || '更新失败');
        if (updateData.nickname) currentLoggedInUser.nickname = updateData.nickname;
        if (updateData.avatar) currentLoggedInUser.avatar = updateData.avatar;
        renderUser(currentLoggedInUser);
        closeEditModal();
        alert('资料更新成功！');
      } catch (err) {
        console.error('保存失败', err);
        alert('保存失败：' + err.message);
      }
    }

    // ===== Init =====
    function initEventListeners() {
      document.getElementById('editProfileBtn').addEventListener('click', openEditModal);
      document.getElementById('cancelEditBtn').addEventListener('click', closeEditModal);
      document.getElementById('saveEditBtn').addEventListener('click', saveProfile);
      document.getElementById('editAvatarFile').addEventListener('change', handleAvatarFileSelect);
      document.getElementById('editProfileModal').addEventListener('click', function(event) {
        if (event.target === this) closeEditModal();
      });
    }

    async function init() {
      initEventListeners();
      await checkCurrentUser();
      var results = await Promise.all([fetchUserInfo(), fetchUserPosts()]);
      var user = results[0];
      var posts = results[1];
      if (user) {
        renderUser(user);
        calculateStats(posts);
        if (!currentLoggedInUser || currentLoggedInUser.id !== userId) {
          renderCertSection(user);
        }
      }
      if (posts) {
        renderPosts(posts);
      }
    }

    init();
  </script>
  <script src="slider-captcha/longbow.slidercaptcha.min.js"></script>
</body>
