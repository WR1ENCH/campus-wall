<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📌 用户主页 · 校园墙</title>
  <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Ma+Shan+Zheng&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --note-yellow: #fff9b1;
      --note-pink: #ffc9de;
      --note-green: #b5f5c5;
      --note-blue: #bde0fe;
      --note-orange: #ffd6a5;
      --note-purple: #d5b8ff;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans SC', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ===== 砖墙背景 ===== */
    .wall {
      min-height: 100vh;
      background-color: #c4a882;
      background-image:
        repeating-linear-gradient(
          0deg,
          transparent, transparent 59px,
          rgba(0,0,0,0.12) 59px, rgba(0,0,0,0.12) 61px,
          transparent 61px, transparent 120px
        ),
        repeating-linear-gradient(
          90deg,
          transparent, transparent 119px,
          rgba(0,0,0,0.12) 119px, rgba(0,0,0,0.12) 121px,
          transparent 121px, transparent 240px
        ),
        repeating-linear-gradient(
          0deg,
          rgba(180,140,100,0.3) 0px,
          rgba(200,160,120,0.1) 30px,
          rgba(170,130,90,0.2) 60px,
          rgba(190,150,110,0.15) 90px,
          rgba(175,135,95,0.25) 120px
        );
      background-size: 240px 120px;
      position: relative;
      padding-bottom: 80px;
    }

    .wall::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(0,0,0,0.05) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(255,255,255,0.05) 0%, transparent 40%),
        radial-gradient(ellipse at 50% 80%, rgba(0,0,0,0.08) 0%, transparent 50%);
      pointer-events: none; z-index: 0;
    }

    .wall::after {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(circle at 15% 30%, rgba(139,111,94,0.15) 0%, transparent 8%),
        radial-gradient(circle at 75% 65%, rgba(139,111,94,0.1) 0%, transparent 6%),
        radial-gradient(circle at 45% 15%, rgba(0,0,0,0.03) 0%, transparent 10%),
        radial-gradient(circle at 85% 85%, rgba(139,111,94,0.12) 0%, transparent 7%);
      pointer-events: none; z-index: 0;
    }

    /* ===== 顶部栏 ===== */
    .top-bar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(139,111,94,0.92);
      backdrop-filter: blur(12px);
      padding: 14px 24px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 3px solid rgba(0,0,0,0.15);
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }

    .wall-title {
      display: flex; align-items: center; gap: 10px;
      color: #fff;
      font-family: 'ZCOOL KuaiLe', cursive;
      font-size: 24px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }

    .back-btn {
      background: rgba(255,255,255,0.15);
      border: 2px solid rgba(255,255,255,0.3);
      color: white;
      padding: 8px 16px;
      border-radius: 12px;
      font-family: 'Noto Sans SC', sans-serif;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      display: inline-block;
    }
    .back-btn:hover {
      background: rgba(255,255,255,0.25);
      border-color: rgba(255,255,255,0.5);
    }

    /* ===== 用户信息卡片 ===== */
    .user-card {
      max-width: 800px;
      margin: 40px auto 20px;
      background: rgba(255,255,255,0.92);
      border-radius: 24px;
      padding: 30px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.15);
      border: 3px solid rgba(139,111,94,0.4);
      position: relative;
      z-index: 1;
    }

    .user-header {
      display: flex;
      align-items: center;
      gap: 24px;
      margin-bottom: 24px;
    }

    .user-avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 4px solid rgba(139,111,94,0.5);
      background: #e0d3c6;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      color: #8b6f5e;
      overflow: hidden;
    }
    .user-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .user-info h1 {
      font-family: 'Ma Shan Zheng', cursive;
      font-size: 36px;
      color: #5a4638;
      margin-bottom: 8px;
    }

    .user-meta {
      color: #7a6656;
      font-size: 15px;
      display: flex;
      gap: 20px;
      margin-bottom: 12px;
    }

    .user-stats {
      display: flex;
      gap: 30px;
      margin-top: 20px;
    }

    .stat {
      text-align: center;
    }
    .stat-value {
      font-size: 28px;
      font-weight: bold;
      color: #8b6f5e;
    }
    .stat-label {
      font-size: 14px;
      color: #9c8a7a;
    }

    /* ===== 帖子区域 ===== */
    .posts-container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 0 20px;
      position: relative;
      z-index: 2;
    }

    .section-title {
      font-family: 'Ma Shan Zheng', cursive;
      font-size: 28px;
      color: #5a4638;
      margin: 40px 0 20px;
      text-align: center;
      position: relative;
    }
    .section-title::after {
      content: '';
      display: block;
      width: 60px;
      height: 4px;
      background: #8b6f5e;
      margin: 8px auto;
      border-radius: 2px;
    }

    .posts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 24px;
      margin-bottom: 60px;
    }

    /* 便利贴样式（复用 index.html 的样式） */
    .note {
      position: relative;
      padding: 20px;
      border-radius: 4px;
      box-shadow: 3px 3px 12px rgba(0,0,0,0.2);
      transform: rotate(var(--rotate));
      transition: transform 0.3s, box-shadow 0.3s;
      cursor: pointer;
      z-index: var(--zIndex);
      min-height: 180px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .note:hover {
      transform: rotate(0deg) scale(1.02);
      box-shadow: 5px 5px 20px rgba(0,0,0,0.25);
      z-index: 100;
    }

    .note-content {
      font-size: 15px;
      line-height: 1.5;
      margin-bottom: 12px;
      flex-grow: 1;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
    }

    .note-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      color: rgba(0,0,0,0.6);
    }

    .note-author {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .note-avatar {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #ccc;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
    }

    .note-stats {
      display: flex;
      gap: 10px;
    }

    .note-stats span {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .note-type {
      position: absolute;
      top: -8px;
      right: 12px;
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 12px;
    }

    .empty-posts {
      text-align: center;
      padding: 60px;
      background: rgba(255,255,255,0.8);
      border-radius: 20px;
      border: 2px dashed rgba(139,111,94,0.4);
      color: #7a6656;
      font-size: 18px;
    }

    /* ===== 加载指示器 ===== */
    .loading {
      text-align: center;
      padding: 40px;
      color: #8b6f5e;
      font-size: 18px;
    }

    .error {
      text-align: center;
      padding: 40px;
      background: rgba(255,200,200,0.8);
      border-radius: 20px;
      border: 2px solid #ff6b6b;
      color: #c44545;
      font-size: 16px;
      margin: 40px auto;
      max-width: 600px;
    }

    /* ===== 响应式 ===== */
    @media (max-width: 768px) {
      .user-header {
        flex-direction: column;
        text-align: center;
      }
      .user-stats {
        justify-content: center;
      }
      .posts-grid {
        grid-template-columns: 1fr;
      }
    }

    /* ===== 编辑资料模态框 ===== */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s, visibility 0.3s;
      pointer-events: none;
    }
    .modal-overlay.show {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }
    .modal-overlay.show {
      opacity: 1;
      visibility: visible;
    }
    .modal {
      background: rgba(255,255,255,0.95);
      border-radius: 24px;
      padding: 30px;
      width: 90%;
      max-width: 500px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      border: 3px solid rgba(139,111,94,0.5);
      position: relative;
    }
    .modal-header {
      font-family: 'Ma Shan Zheng', cursive;
      font-size: 28px;
      color: #5a4638;
      margin-bottom: 24px;
      text-align: center;
    }
    .modal-body {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .form-label {
      font-weight: bold;
      color: #7a6656;
    }
    .form-input {
      padding: 12px 16px;
      border: 2px solid rgba(139,111,94,0.3);
      border-radius: 12px;
      font-family: 'Noto Sans SC', sans-serif;
      font-size: 16px;
      transition: border 0.2s;
    }
    .form-input:focus {
      outline: none;
      border-color: #8b6f5e;
    }
    .avatar-preview {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 4px solid rgba(139,111,94,0.5);
      background: #e0d3c6;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      color: #8b6f5e;
      overflow: hidden;
    }
    .avatar-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .file-input-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    .file-input-label {
      background: rgba(139,111,94,0.1);
      border: 2px dashed rgba(139,111,94,0.4);
      border-radius: 12px;
      padding: 12px 20px;
      text-align: center;
      cursor: pointer;
      color: #7a6656;
      transition: all 0.2s;
    }
    .file-input-label:hover {
      background: rgba(139,111,94,0.2);
      border-color: #8b6f5e;
    }
    .file-input {
      display: none;
    }
    .file-hint {
      font-size: 13px;
      color: #9c8a7a;
      text-align: center;
    }
    .modal-actions {
      display: flex;
      gap: 16px;
      margin-top: 30px;
    }
    .modal-btn {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-family: 'Noto Sans SC', sans-serif;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .modal-btn-primary {
      background: #8b6f5e;
      color: white;
    }
    .modal-btn-primary:hover {
      background: #7a5f4e;
    }
    .modal-btn-secondary {
      background: rgba(139,111,94,0.1);
      color: #7a6656;
    }
    .modal-btn-secondary:hover {
      background: rgba(139,111,94,0.2);
    }
    .edit-btn {
      background: rgba(139,111,94,0.15);
      border: 2px solid rgba(139,111,94,0.3);
      color: #5a4638;
      padding: 10px 24px;
      border-radius: 12px;
      font-family: 'Noto Sans SC', sans-serif;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
    }
    .edit-btn:hover {
      background: rgba(139,111,94,0.25);
      border-color: rgba(139,111,94,0.5);
    }
    /* 同学认证绿色按钮 */
    .bind-zhixue-btn {
      background: #22c55e;
      color: white;
      border: none;
      font-weight: bold;
    }
    .bind-zhixue-btn:hover {
      background: #16a34a;
    }
    /* 流程导图样式 */
    .flow-node {
      background: #22c55e; color: white; padding: 10px 18px;
      border-radius: 10px; font-size: 13px; font-weight: 600;
      text-align: center; box-shadow: 0 3px 10px rgba(34,197,94,0.25);
      min-width: 200px; line-height: 1.5;
    }
    .flow-arrow {
      font-size: 20px; color: #22c55e; padding: 4px 0;
      font-weight: bold; line-height: 1;
    }
  </style>
</head>
<body>
  <div class="wall">
    <!-- 顶部栏 -->
    <div class="top-bar">
      <div class="wall-title">
        📌 校园墙 · 用户主页
      </div>
      <a href="index.html" class="back-btn">返回首页</a>
    </div>

    <!-- 用户信息卡片 -->
    <div class="user-card">
      <div class="user-header">
        <div class="user-avatar" id="userAvatar">👤</div>
        <div class="user-info">
          <h1 id="userNickname">加载中...</h1>
          <div class="user-meta">
            <span id="adminBadge" style="display:none; font-size:16px; vertical-align:middle;"></span>
            <span id="userUsername">@username</span>
            <span id="userJoinDate">加入日期：--</span>
            <span id="bindAdminTag" style="display:none; cursor:pointer; text-decoration:underline;" onclick="openBindAdminModal()"></span>
            <span id="unbindAdminTag" style="display:none; cursor:pointer; color:#c44545; text-decoration:underline; margin-left:8px;">解除绑定</span>
          </div>
          <div class="user-stats">
            <div class="stat">
              <div class="stat-value" id="postCount">0</div>
              <div class="stat-label">帖子</div>
            </div>
            <div class="stat">
              <div class="stat-value" id="likeCount">0</div>
              <div class="stat-label">获赞</div>
            </div>
            <div class="stat">
              <div class="stat-value" id="commentCount">0</div>
              <div class="stat-label">评论</div>
            </div>
          </div>
          <div style="margin-top: 20px; text-align: center; display:flex; gap:10px; justify-content:center; flex-wrap:wrap;">
            <button id="editProfileBtn" class="edit-btn" style="display:none;">📝 编辑资料</button>
            <button id="bindZhixueBtn" class="edit-btn bind-zhixue-btn" style="display:none;">🎓 同学认证</button>
          </div>
          <!-- 同学认证信息展示 -->
          <div id="zhixueInfo" style="margin-top:16px; padding:10px 16px; background:var(--bg-main); border-radius:12px; font-size:13px; color:var(--text-sub); display:none;">
            <div style="display:flex; align-items:center; justify-content:center; gap:10px;">
              <span style="font-weight:600; color:var(--text-main);">🎓 同学认证</span>
              <span id="zhixueStatusBadge" style="padding:2px 10px; border-radius:10px; font-size:12px; font-weight:bold;"></span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 帖子区域 -->
    <div class="posts-container">
      <div class="section-title">发布的帖子</div>
      <div id="postsLoading" class="loading">正在加载帖子...</div>
      <div id="postsError" class="error" style="display:none"></div>
      <div id="postsGrid" class="posts-grid" style="display:none"></div>
      <div id="emptyPosts" class="empty-posts" style="display:none">该用户还没有发布过帖子~</div>
    </div>

    <!-- 编辑资料模态框 -->
    <div id="editProfileModal" class="modal-overlay">
      <div class="modal">
        <div class="modal-header">📝 编辑资料</div>
        <div class="modal-body">
          <div class="form-group">
            <label class="form-label">昵称</label>
            <input type="text" id="editNickname" class="form-input" placeholder="2-12个字符" maxlength="12">
          </div>
          <div class="form-group">
            <label class="form-label">头像</label>
            <div class="file-input-wrapper">
              <div class="avatar-preview" id="avatarPreview">
                <!-- 预览图片或emoji -->
              </div>
              <label class="file-input-label">
                📁 选择 JPG 图片
                <input type="file" id="editAvatarFile" class="file-input" accept=".jpg,.jpeg" />
              </label>
              <div class="file-hint">仅支持 JPG 格式，大小不超过 500KB</div>
            </div>
          </div>
          <div class="modal-actions">
            <button class="modal-btn modal-btn-secondary" id="cancelEditBtn">取消</button>
            <button class="modal-btn modal-btn-primary" id="saveEditBtn">保存更改</button>
          </div>
        </div>
      </div>
    </div>

    <!-- 绑定管理员模态框 -->
    <div id="bindAdminModal" class="modal-overlay">
      <div class="modal">
        <div class="modal-header">🔗 绑定管理员账号</div>
        <div class="modal-body">
          <div id="bindAdminStatus" style="text-align:center; padding:10px; border-radius:12px; margin-bottom:16px; font-weight:bold; display:none;"></div>
          <div class="form-group">
            <label class="form-label">你的账号密码</label>
            <input type="password" id="bindUserPwd" class="form-input" placeholder="输入你的账号密码以验证身份">
          </div>
          <div class="form-group">
            <label class="form-label">管理员账号</label>
            <input type="text" id="bindAdminId" class="form-input" placeholder="管理员账号">
          </div>
          <div class="form-group">
            <label class="form-label">管理员密码</label>
            <input type="password" id="bindAdminPwd" class="form-input" placeholder="管理员密码">
          </div>
          <div class="modal-actions">
            <button class="modal-btn modal-btn-secondary" id="cancelBindBtn">取消</button>
            <button class="modal-btn modal-btn-primary" id="confirmBindBtn">确认绑定</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // 从 URL 参数获取用户 ID
    const urlParams = new URLSearchParams(window.location.search);
    const userId = urlParams.get('id');
    if (!userId) {
      document.body.innerHTML = `<div class="error">无效的用户 ID</div>`;
      throw new Error('Missing user ID');
    }

    // API 基地址
    const API_BASE = '/api';

    // 获取用户信息
    async function fetchUserInfo() {
      try {
        const resp = await fetch(`${API_BASE}/users/${userId}`);
        const data = await resp.json();
        if (!data.ok) {
          throw new Error(data.msg || '获取用户信息失败');
        }
        return data.data;
      } catch (err) {
        console.error(err);
        showError('用户信息', err.message);
        return null;
      }
    }

    // 获取用户帖子
    async function fetchUserPosts() {
      try {
        const resp = await fetch(`${API_BASE}/users/${userId}/posts`);
        const data = await resp.json();
        if (!data.ok) {
          throw new Error(data.msg || '获取帖子失败');
        }
        return data.data;
      } catch (err) {
        console.error(err);
        showError('帖子列表', err.message);
        return [];
      }
    }

    // 显示错误
    function showError(context, msg) {
      const errorEl = document.getElementById('postsError');
      errorEl.textContent = `加载${context}失败：${msg}`;
      errorEl.style.display = 'block';
    }

    // 渲染用户信息
    function renderUser(user) {
      if (!user) return;
      document.getElementById('userNickname').textContent = user.nickname || '匿名';
      document.getElementById('userUsername').textContent = `@${user.username}`;
      const joinDate = new Date(user.createdAt).toLocaleDateString('zh-CN');
      document.getElementById('userJoinDate').textContent = `加入日期：${joinDate}`;
      document.getElementById('postCount').textContent = user.postCount || 0;
      // 头像：如果有 avatar 字段且是 data URL，用 <img> 显示；如果是 emoji，直接显示；否则用昵称首字母
      const avatarEl = document.getElementById('userAvatar');
      if (user.avatar && user.avatar.trim()) {
        if (user.avatar.startsWith('data:image')) {
          avatarEl.innerHTML = `<img src="${user.avatar}" alt="头像">`;
        } else {
          avatarEl.textContent = (user.avatar && user.avatar.length <= 4) ? user.avatar : user.nickname.charAt(0) || '👤';
        }
      } else {
        avatarEl.textContent = user.nickname.charAt(0) || '👤';
      }
      // 管理员认证标识
      const badge = document.getElementById('adminBadge');
      const bindTag = document.getElementById('bindAdminTag');
      const unbindTag = document.getElementById('unbindAdminTag');
      if (user.bindAdminRole === 'super') {
        badge.textContent = '🔴 超管认证';
        badge.style.display = '';
      } else if (user.bindAdminRole === 'admin') {
        badge.textContent = '🟡 普管认证';
        badge.style.display = '';
      } else {
        badge.style.display = 'none';
      }
      // 绑定/解绑入口：仅当前登录用户查看自己的主页时显示

    // 处理手动认证图片选择
    const manualImages = []; // 存储 base64
    function handleManualImages(event) {
      const errEl = document.getElementById('manualImageError');
      const preview = document.getElementById('manualImagesPreview');
      errEl.style.display = 'none';
      const files = Array.from(event.target.files);

      if (manualImages.length + files.length > 3) {
        errEl.textContent = '❌ 最多上传3张图片';
        errEl.style.display = '';
        event.target.value = '';
        return;
      }

      files.forEach(file => {
        // 同时校验后缀名和 MIME 类型，更健壮
        if (!file.type.startsWith('image/')) {
          errEl.textContent = '❌ 只允许上传图片文件（' + file.name + '）';
          errEl.style.display = '';
          return;
        }
        if (file.size > 10 * 1024 * 1024) {
          errEl.textContent = '❌ 图片大小不能超过 10MB（' + file.name + '）';
          errEl.style.display = '';
          return;
        }
        const reader = new FileReader();
        reader.onload = (e) => {
      


          manualImages.push(e.target.result);
          // 添加预览
          const img = document.createElement('div');
          const idx = manualImages.length - 1;
          img.style.cssText = 'position:relative; width:72px; height:72px;';
          img.innerHTML = `
            <img src="${e.target.result}" style="width:72px;height:72px;object-fit:cover;border-radius:8px;border:2px solid var(--border);">
            <button onclick="removeManualImage(${idx})" style="position:absolute;top:-6px;right:-6px;background:var(--danger);color:#fff;border:none;border-radius:50%;width:18px;height:18px;cursor:pointer;font-size:11px;line-height:1;">✕</button>
          `;
          preview.appendChild(img);
        };
        reader.readAsDataURL(file);
      });
      event.target.value = '';
    }

    function removeManualImage(idx) {
      manualImages.splice(idx, 1);
      // 重新渲染预览
      const preview = document.getElementById('manualImagesPreview');
      preview.innerHTML = '';
      manualImages.forEach((src, i) => {
        const img = document.createElement('div');
        img.style.cssText = 'position:relative; width:72px; height:72px;';

    async function doBindZhixue() {
      const statusEl = document.getElementById('bindZhixueStatus');
      // 判断当前 Tab
      const isZhixueTab = document.getElementById('certPanelZhixue').style.display !== 'none';

      function showErr(msg) {
        statusEl.textContent = msg;
        statusEl.style.display = '';
        statusEl.style.background = 'rgba(255,68,68,0.1)';
        statusEl.style.color = 'var(--danger)';
      }

      let body;
      if (isZhixueTab) {
        // 智学认证
        const username = document.getElementById('zhixueInputUsername').value.trim();
        const password = document.getElementById('zhixueInputPassword').value;
        if (!username) { showErr('❌ 请填写智学网账号'); return; }
        if (!password) { showErr('❌ 请填写智学网密码'); return; }
        body = { type: 'zhixue', zhixueUsername: username, zhixuePassword: password };
      } else {
        // 手动认证
        const name = document.getElementById('manualName').value.trim();
        const email = document.getElementById('manualEmail').value.trim();
        const note = document.getElementById('manualNote').value.trim();
        if (!name) { showErr('❌ 请填写姓名'); return; }
        if (!email) { showErr('❌ 请填写邮箱'); return; }
        if (!note) { showErr('❌ 请填写认证说明'); return; }
        if (manualImages.length === 0) { showErr('❌ 请至少上传一张证明图片'); return; }
        body = { type: 'manual', manualName: name, manualEmail: email, manualNote: note, manualImages: [...manualImages] };
      }

      statusEl.textContent = '⏳ 正在提交...';
      statusEl.style.display = '';
      statusEl.style.background = 'rgba(76,175,80,0.1)';
      statusEl.style.color = 'var(--success)';

      try {
        const token = localStorage.getItem('campus_user_token');
        const resp = await fetch('/api/user/bind-zhixue', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'x-user-token': token },
          body: JSON.stringify(body)
        });
        const data = await resp.json();
        if (data.ok) {
          statusEl.textContent = '✅ ' + data.msg;
          statusEl.style.background = 'rgba(76,175,80,0.1)';
          statusEl.style.color = 'var(--success)';
          setTimeout(() => {
            closeBindZhixueModal();
            loadZhixueInfo();
          }, 1500);
        } else {
          throw new Error(data.msg || '提交失败');
        }
      } catch (e) {
        statusEl.textContent = '❌ ' + e.message;
        statusEl.style.background = 'rgba(255,68,68,0.1)';
        statusEl.style.color = 'var(--danger)';
      }
    }

    // 处理头像文件选择
    function handleAvatarFileSelect(event) {
      const file = event.target.files[0];
      if (!file) return;
      // 验证文件类型（只要求文件是图片且后缀为 jpg/jpeg）
      const isImage = file.type.startsWith('image/');
      const hasJpgExt = file.name.match(/\.jpe?g$/i);
      if (!isImage || !hasJpgExt) {
        alert('请选择 JPG 格式的图片');
        event.target.value = '';
        return;
      }
      // 验证文件大小（500KB）
      if (file.size > 500 * 1024) {
        alert('图片大小不能超过 500KB');
        event.target.value = '';
        return;
      }
      // 预览图片
      const reader = new FileReader();
      reader.onload = function(e) {
        const avatarPreview = document.getElementById('avatarPreview');
        avatarPreview.innerHTML = `<img src="${e.target.result}" alt="头像">`;
        // 存储 base64 数据，稍后用于上传
        avatarPreview.dataset.base64 = e.target.result;
      };
      reader.readAsDataURL(file);
    }

    // 保存资料
    async function saveProfile() {
      const nickname = document.getElementById('editNickname').value.trim();
      const avatarPreview = document.getElementById('avatarPreview');
      const avatarBase64 = avatarPreview.dataset.base64; // 新选择的头像 base64
      const currentAvatar = currentLoggedInUser.avatar; // 原有头像

      // 验证昵称
      if (nickname.length < 2 || nickname.length > 12) {
        alert('昵称需 2-12 个字符');
        return;
      }

      const updateData = {};
      if (nickname !== currentLoggedInUser.nickname) {
        updateData.nickname = nickname;
      }
      // 处理头像更新：仅当 avatarBase64 存在且与当前头像不同时才更新
      if (avatarBase64 && avatarBase64 !== currentAvatar) {
        updateData.avatar = avatarBase64;
      }

      // 如果没有更改，直接关闭
      if (Object.keys(updateData).length === 0) {
        closeEditModal();
        return;
      }

      const token = localStorage.getItem('campus_user_token');
      if (!token) {
        alert('登录已过期，请重新登录');
        return;
      }

      try {
        const resp = await fetch('/api/user/me', {
          method: 'PATCH',
          headers: {
            'Content-Type': 'application/json',
            'x-user-token': token
          },
          body: JSON.stringify(updateData)
        });
        const data = await resp.json();
        if (!data.ok) {
          throw new Error(data.msg || '更新失败');
        }
        // 更新本地当前用户信息
        if (updateData.nickname) currentLoggedInUser.nickname = updateData.nickname;
        if (updateData.avatar) currentLoggedInUser.avatar = updateData.avatar;
        // 重新渲染用户信息
        renderUser(currentLoggedInUser);
        // 关闭模态框
        closeEditModal();
        alert('资料更新成功！');
      } catch (err) {
        console.error('保存失败', err);
        alert('保存失败：' + err.message);
      }
    }

    // 打开绑定管理员模态框
    function openBindAdminModal() {
      document.getElementById('bindUserPwd').value = '';
      document.getElementById('bindAdminId').value = '';
      document.getElementById('bindAdminPwd').value = '';
      document.getElementById('bindAdminStatus').style.display = 'none';
      document.getElementById('bindAdminModal').classList.add('show');
    }

    // 关闭绑定管理员模态框
    function closeBindAdminModal() {
      document.getElementById('bindAdminModal').classList.remove('show');
    }

    // 确认绑定管理员
    async function doBindAdmin() {
      const password = document.getElementById('bindUserPwd').value.trim();
      const adminId = document.getElementById('bindAdminId').value.trim();
      const adminPassword = document.getElementById('bindAdminPwd').value;
      if (!password || !adminId || !adminPassword) {
        alert('请填写完整信息');
        return;
      }
      const token = localStorage.getItem('campus_user_token');
      if (!token) {
        alert('登录已过期，请重新登录');
        return;
      }
      try {
        const resp = await fetch('/api/user/bind-admin', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-user-token': token
          },
          body: JSON.stringify({ password, adminId, adminPassword })
        });
        const data = await resp.json();
        if (!data.ok) {
          throw new Error(data.msg || '绑定失败');
        }
        // 更新当前用户信息
        currentLoggedInUser.bindAdminId = data.data.bindAdminId;
        currentLoggedInUser.bindAdminRole = data.data.bindAdminRole;
        // 重新渲染（user 对象来自 currentLoggedInUser）
        renderUser(currentLoggedInUser);
        closeBindAdminModal();
        alert('绑定成功！');
      } catch (err) {
        alert('绑定失败：' + err.message);
      }
    }

    // 解除绑定
    async function doUnbindAdmin() {
      if (!confirm('确定要解除管理员绑定吗？')) return;
      const token = localStorage.getItem('campus_user_token');
      if (!token) {
        alert('登录已过期，请重新登录');
        return;
      }
      try {
        const resp = await fetch('/api/user/bind-admin', {
          method: 'DELETE',
          headers: { 'x-user-token': token }
        });
        const data = await resp.json();
        if (!data.ok) throw new Error(data.msg || '解除绑定失败');
        currentLoggedInUser.bindAdminId = null;
        currentLoggedInUser.bindAdminRole = null;
        renderUser(currentLoggedInUser);
        alert('已解除绑定');
      } catch (err) {
        alert('解除绑定失败：' + err.message);
      }
    }

    // 初始化事件监听器
    function initEventListeners() {
      // 编辑按钮
      document.getElementById('editProfileBtn').addEventListener('click', openEditModal);
      // 取消按钮
      document.getElementById('cancelEditBtn').addEventListener('click', closeEditModal);
      // 保存按钮
      document.getElementById('saveEditBtn').addEventListener('click', saveProfile);
      // 头像文件选择
      document.getElementById('editAvatarFile').addEventListener('change', handleAvatarFileSelect);
      // 点击模态框外部关闭
      document.getElementById('editProfileModal').addEventListener('click', function(event) {
        if (event.target === this) closeEditModal();
      });
      // 绑定管理员模态框
      document.getElementById('cancelBindBtn').addEventListener('click', closeBindAdminModal);
      document.getElementById('confirmBindBtn').addEventListener('click', doBindAdmin);
      document.getElementById('bindAdminModal').addEventListener('click', function(event) {
        if (event.target === this) closeBindAdminModal();
      });
    }

    // 初始化
    async function init() {
      // 初始化事件监听器
      initEventListeners();
      // 检查当前登录用户
      await checkCurrentUser();
      // 加载用户信息和帖子
      const [user, posts] = await Promise.all([fetchUserInfo(), fetchUserPosts()]);
      if (user) {
        renderUser(user);
        calculateStats(posts);
      }
      if (posts) {
        renderPosts(posts);
      }
    }

    init();
  </script>
<script src="pow-interceptor.js"></script>
