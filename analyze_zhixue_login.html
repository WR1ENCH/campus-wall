<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智学网登录分析工具</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      max-width: 800px;
      width: 100%;
      overflow: hidden;
    }
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 30px;
      text-align: center;
    }
    .header h1 { font-size: 28px; margin-bottom: 10px; }
    .header p { opacity: 0.9; }
    .content { padding: 30px; }
    .step {
      background: #f8f9fa;
      border-left: 4px solid #667eea;
      padding: 15px;
      margin-bottom: 20px;
      border-radius: 8px;
    }
    .step h3 { color: #667eea; margin-bottom: 10px; }
    .btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 12px 30px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
      margin: 5px;
      transition: transform 0.2s;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(102,126,234,0.4); }
    .btn:active { transform: translateY(0); }
    .btn-secondary { background: #6c757d; }
    .log {
      background: #1e1e1e;
      color: #d4d4d4;
      padding: 15px;
      border-radius: 8px;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 13px;
      max-height: 400px;
      overflow-y: auto;
      margin-top: 20px;
    }
    .log-line { margin: 5px 0; }
    .log-success { color: #4ec9b0; }
    .log-error { color: #f48771; }
    .log-info { color: #9cdcfe; }
    iframe {
      width: 100%;
      height: 600px;
      border: 2px solid #ddd;
      border-radius: 8px;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🔍 智学网登录分析工具</h1>
      <p>抓包分析登录API，找到纯HTTP登录方法</p>
    </div>
    
    <div class="content">
      <div class="step">
        <h3>步骤 1：打开智学网登录页</h3>
        <p>点击下方按钮，在iframe中打开智学网登录页</p>
        <button class="btn" onclick="openZhixue()">打开智学网</button>
      </div>
      
      <div class="step">
        <h3>步骤 2：手动登录并抓包</h3>
        <p>在iframe中输入账号密码，完成登录。工具会自动记录所有HTTP请求。</p>
        <button class="btn btn-secondary" onclick="startCapture()">开始抓包</button>
        <button class="btn btn-secondary" onclick="stopCapture()">停止抓包</button>
      </div>
      
      <div class="step">
        <h3>步骤 3：分析登录API</h3>
        <p>查看抓到的HTTP请求，找到登录API的URL、参数、headers</p>
        <button class="btn" onclick="analyzeRequests()">分析请求</button>
        <button class="btn btn-secondary" onclick="exportLog()">导出日志</button>
      </div>
      
      <div id="iframeContainer" style="display:none;">
        <iframe id="zhixueFrame"></iframe>
      </div>
      
      <div id="logContainer" style="display:none;">
        <h3>📝 抓包日志</h3>
        <div class="log" id="logContent"></div>
      </div>
    </div>
  </div>
  
  <script>
    let capturedRequests = [];
    let isCapturing = false;
    
    function log(message, type = 'info') {
      const logContent = document.getElementById('logContent');
      const line = document.createElement('div');
      line.className = `log-line log-${type}`;
      line.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
      logContent.appendChild(line);
      logContent.parentElement.scrollTop = logContent.parentElement.scrollHeight;
    }
    
    function openZhixue() {
      document.getElementById('iframeContainer').style.display = 'block';
      document.getElementById('zhixueFrame').src = 'https://www.zhixue.com/';
      log('打开智学网首页');
    }
    
    function startCapture() {
      if (isCapturing) {
        log('已经在抓包中...', 'info');
        return;
      }
      
      isCapturing = true;
      document.getElementById('logContainer').style.display = 'block';
      log('开始抓包...', 'info');
      log('请在iframe中完成登录操作', 'info');
      
      // 使用 PerformanceObserver 或重写 fetch/XHR 来捕获请求
      // 由于iframe跨域限制，我们无法直接访问其内容
      // 所以我们需要用户在**同一个页面**中操作
      
      log('⚠️ 由于浏览器跨域限制，无法直接在iframe中抓包', 'error');
      log('请使用浏览器开发者工具（F12）→ Network 标签手动查看', 'info');
      log('过滤关键词：login, auth, login, signin', 'info');
    }
    
    function stopCapture() {
      isCapturing = false;
      log('停止抓包', 'info');
    }
    
    function analyzeRequests() {
      log('分析功能开发中...', 'info');
      log('建议手动查看浏览器开发者工具 → Network', 'info');
    }
    
    function exportLog() {
      const logContent = document.getElementById('logContent').textContent;
      const blob = new Blob([logContent], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'zhixue_capture_log.txt';
      a.click();
      URL.revokeObjectURL(url);
      log('日志已导出', 'success');
    }
  </script>
</body>
</html>
