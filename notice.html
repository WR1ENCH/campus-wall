<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>学生会 · 通知公告</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #f0ebe3;
  --card: #ffffff;
  --text: #2d2a24;
  --text-sub: #8a8580;
  --accent: #b8860b;
  --accent-light: #daa520;
  --border: #e0dad0;
  --shadow: 0 2px 12px rgba(0,0,0,0.06);
  --radius: 12px;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, "Noto Sans SC", "PingFang SC", sans-serif;
  line-height: 1.7;
  min-height: 100vh;
}

/* ===== Login Screen ===== */
.login-screen {
  display: none;
  position: fixed; inset: 0; z-index: 100;
  background: linear-gradient(135deg, #2d2a24, #4a443c);
  align-items: center; justify-content: center;
}

.login-screen.show { display: flex; }

.login-box {
  background: var(--card); border-radius: 16px;
  width: min(90vw, 400px); padding: 36px 32px 32px;
  box-shadow: 0 12px 48px rgba(0,0,0,0.3);
  animation: fadeUp 0.4s ease;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.login-box h2 {
  text-align: center; font-size: 22px; font-weight: 700;
  margin-bottom: 4px; color: var(--text);
}

.login-box .login-sub {
  text-align: center; font-size: 13px; color: var(--text-sub);
  margin-bottom: 28px;
}

.login-field { margin-bottom: 16px; }

.login-field label {
  display: block; font-size: 13px; font-weight: 600;
  color: var(--text); margin-bottom: 6px;
}

.login-field input {
  width: 100%; padding: 10px 14px; border: 1.5px solid var(--border);
  border-radius: 8px; font-size: 14px; font-family: inherit;
  outline: none; transition: border-color 0.2s;
  box-sizing: border-box;
}

.login-field input:focus { border-color: var(--accent); }

.login-error {
  color: #dc2626; font-size: 13px; text-align: center;
  margin-bottom: 12px; min-height: 20px;
}

.login-btn {
  width: 100%; padding: 11px; border: none; border-radius: 8px;
  background: var(--accent); color: #fff;
  font-size: 15px; font-weight: 600; cursor: pointer;
  font-family: inherit; transition: background 0.2s;
}

.login-btn:hover { background: var(--accent-light); }
.login-btn:disabled { opacity: 0.6; cursor: not-allowed; }

/* ===== Main App ===== */
.main-app {
  display: none;
}

.main-app.show { display: block; }

/* ===== Header ===== */
.header {
  background: linear-gradient(135deg, #2d2a24, #4a443c);
  color: #f0ebe3;
  padding: 40px 24px 36px;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.header::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 4px;
  background: linear-gradient(90deg, var(--accent-light), var(--accent), var(--accent-light));
}

.header h1 { font-size: 26px; font-weight: 700; letter-spacing: 0.05em; margin-bottom: 6px; }
.header p { font-size: 14px; color: rgba(240,235,227,0.7); }
.header .subtitle { font-size: 12px; color: rgba(240,235,227,0.5); margin-top: 8px; letter-spacing: 0.08em; }

/* ===== Layout ===== */
.container { max-width: 800px; margin: 0 auto; padding: 24px 16px 60px; }

/* ===== Publish Bar ===== */
.publish-bar {
  display: flex; justify-content: flex-end; margin-bottom: 20px; gap: 10px;
}

.user-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 14px; background: var(--card); border-radius: 8px;
  font-size: 13px; color: var(--text-sub); box-shadow: var(--shadow);
}

.user-badge .logout-link {
  color: var(--accent); cursor: pointer; font-weight: 600;
  margin-left: 4px;
}
.user-badge .logout-link:hover { text-decoration: underline; }

.btn-publish {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 10px 20px; border: none; border-radius: 8px;
  background: var(--accent); color: #fff;
  font-size: 14px; font-weight: 600; cursor: pointer;
  font-family: inherit; transition: all 0.2s;
}

.btn-publish:hover { background: var(--accent-light); transform: translateY(-1px); }
.btn-publish:active { transform: scale(0.97); }

/* ===== Notice Card ===== */
.notice-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 24px;
  margin-bottom: 16px;
  box-shadow: var(--shadow);
  border-left: 4px solid var(--accent-light);
  transition: transform 0.2s;
}

.notice-card:hover { transform: translateY(-1px); }

.notice-card .notice-title {
  font-size: 18px; font-weight: 600; color: var(--text);
  margin-bottom: 10px; line-height: 1.4;
}

.notice-card .notice-content {
  font-size: 14px; color: var(--text);
  line-height: 1.8;
  margin-bottom: 14px;
}
.notice-card .notice-content p { margin: 6px 0; }
.notice-card .notice-content ul, .notice-card .notice-content ol { padding-left: 20px; margin: 6px 0; }
.notice-card .notice-content li { margin: 2px 0; }
.notice-card .notice-content code { background: #f3f4f6; padding: 1px 5px; border-radius: 4px; font-size: 13px; font-family: monospace; }
.notice-card .notice-content blockquote {
  margin: 8px 0; padding: 8px 14px; border-left: 3px solid var(--accent);
  background: rgba(0,0,0,0.02); border-radius: 0 6px 6px 0; color: var(--text-sub);
}
.notice-card .notice-content a { color: var(--accent); }
.notice-card .notice-content img { max-width: 100%; border-radius: 8px; margin: 6px 0; }
.notice-card .notice-content hr { border: none; border-top: 1px solid var(--border); margin: 12px 0; }
.notice-card .notice-content h1, .notice-card .notice-content h2, .notice-card .notice-content h3 { margin: 12px 0 6px; font-weight: 600; color: var(--text); }

.notice-card .notice-meta {
  display: flex; gap: 16px; font-size: 12px; color: var(--text-sub);
  padding-top: 12px; border-top: 1px solid var(--border);
}

.empty-tip {
  text-align: center; padding: 60px 20px;
  color: var(--text-sub); font-size: 15px;
}

.loading {
  text-align: center; padding: 40px; color: var(--text-sub);
}

/* Markdown 预览 */
.md-preview {
  background: var(--card-bg); border: 1.5px solid var(--border);
  border-radius: 8px; padding: 14px 16px; font-size: 14px;
  line-height: 1.8; color: var(--text); min-height: 80px;
  white-space: normal;
}
.md-preview strong { font-weight: 700; }
.md-preview em { font-style: italic; }
.md-preview code { background: #f3f4f6; padding: 2px 6px; border-radius: 4px; font-size: 13px; font-family: monospace; }
.md-preview a { color: var(--accent); }
.md-preview blockquote {
  margin: 10px 0; padding: 10px 14px; border-left: 3px solid var(--accent);
  background: rgba(0,0,0,0.02); border-radius: 0 6px 6px 0; color: var(--text-sub);
}
.md-preview ul, .md-preview ol { padding-left: 20px; margin: 8px 0; }
.md-preview hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
.md-preview h1, .md-preview h2, .md-preview h3 { margin: 14px 0 8px; font-weight: 600; color: var(--text); }

/* ===== Publish Modal ===== */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.4); z-index: 200;
  align-items: center; justify-content: center;
  backdrop-filter: blur(4px);
}

.modal { /* same as above but reusing */ }

.modal-overlay.show { display: flex; }

.modal-box {
  background: var(--card); border-radius: 16px;
  width: min(92vw, 520px); max-height: 90vh;
  box-shadow: 0 8px 40px rgba(0,0,0,0.15);
  animation: modalIn 0.3s ease;
  display: flex; flex-direction: column;
  overflow: hidden;
}

@keyframes modalIn {
  from { opacity: 0; transform: scale(0.95) translateY(10px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}

.modal-header { display: flex; align-items: center; justify-content: space-between; padding: 18px 24px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.modal-header h3 { font-size: 17px; font-weight: 600; }
.modal-close { background: none; border: none; font-size: 22px; cursor: pointer; color: var(--text-sub); padding: 0; line-height: 1; }
.modal-close:hover { color: var(--text); }
.modal-body { padding: 20px 24px; overflow-y: auto; flex: 1; min-height: 0; }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
.form-input { width: 100%; padding: 10px 14px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 14px; font-family: inherit; outline: none; transition: border-color 0.2s; box-sizing: border-box; }
.form-input:focus { border-color: var(--accent); }
.form-textarea { min-height: 120px; resize: vertical; }
.form-error { color: #dc2626; font-size: 13px; margin-top: 4px; }
.form-actions { display: flex; gap: 10px; justify-content: flex-end; padding: 14px 24px; border-top: 1px solid var(--border); background: var(--card); flex-shrink: 0; }
.btn-cancel { padding: 9px 18px; border: 1px solid var(--border); border-radius: 8px; background: transparent; color: var(--text-sub); font-size: 14px; cursor: pointer; font-family: inherit; }
.btn-submit { padding: 9px 20px; border: none; border-radius: 8px; background: var(--accent); color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; }
.btn-submit:hover { background: var(--accent-light); }
.btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }
/* 移动端：发布/取消按钮全宽，更易点击；弹窗全屏 */
@media (max-width: 600px) {
  .modal-overlay.show { align-items: stretch; padding: 0; }
  .modal-overlay.show .modal-box {
    width: 100vw !important; max-height: 100vh; height: 100vh;
    border-radius: 0;
  }
  .form-actions { padding: 12px 16px; gap: 8px; }
  .form-actions .btn-cancel,
  .form-actions .btn-submit { flex: 1; text-align: center; padding: 11px 10px; font-size: 15px; }
  .modal-header { padding: 14px 16px; }
  .modal-header h3 { font-size: 16px; }
  .modal-body { padding: 16px; }
  /* 编辑弹窗底部按钮栏移动端适配 */
  .edit-footer {
    flex-wrap: wrap; gap: 8px; padding: 10px 14px;
  }
  .edit-footer > div:first-child {
    order: 2; width: 100%; justify-content: center;
  }
  .edit-footer > div:last-child {
    order: 1; width: 100%; justify-content: center;
  }
  .edit-footer button { font-size: 13px; padding: 8px 12px; }
}

/* ===== Toast ===== */
.toast {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
  padding: 10px 24px; border-radius: 8px; color: #fff;
  font-size: 14px; font-weight: 500; z-index: 999;
  animation: toastIn 0.3s ease;
  pointer-events: none;
}
.toast.success { background: #16a34a; }
.toast.error { background: #dc2626; }
@keyframes toastIn {
  from { opacity: 0; transform: translateX(-50%) translateY(-10px); }
  to { opacity: 1; transform: translateX(-50%) translateY(0); }
}

/* ===== 投票卡片 ===== */
.vote-card {
  background: #fff;
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  border: 1.5px solid #bae6fd;
}
.vote-card-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 12px;
}
.vote-card-title {
  font-size: 16px;
  font-weight: 600;
  color: #0c4a6e;
  line-height: 1.4;
}
.vote-card-meta {
  font-size: 12px;
  color: #6b7280;
  display: flex;
  gap: 12px;
  margin-top: 8px;
  flex-wrap: wrap;
}
.vote-card-options {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.vote-option {
  display: flex;
  align-items: center;
  padding: 10px 12px;
  background: #f0f9ff;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s;
  border: 1.5px solid transparent;
}
.vote-option:hover {
  background: #e0f2fe;
  border-color: #7dd3fc;
}
.vote-option.selected {
  background: #bae6fd;
  border-color: #0c4a6e;
}
.vote-option input[type="checkbox"],
.vote-option input[type="radio"] {
  margin-right: 10px;
  width: 16px;
  height: 16px;
}
.vote-option-text {
  flex: 1;
  font-size: 14px;
  color: #374151;
}
.vote-option-percent {
  font-size: 13px;
  color: #0c4a6e;
  font-weight: 600;
}
.vote-option-bar {
  height: 6px;
  background: #e0f2fe;
  border-radius: 3px;
  overflow: hidden;
  margin-top: 6px;
}
.vote-option-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, #0c4a6e, #22d3ee);
  border-radius: 3px;
  transition: width 0.5s ease;
}
.vote-custom-option {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 0;
  border-top: 1.5px dashed #cbd5e1;
  margin-top: 6px;
}

.vote-option-custom {
  background: #f0f9ff;
  border: 1.5px dashed #64748b !important;
  padding: 10px 12px;
}

.vote-option-custom input[type="text"]:focus {
  outline: none;
  border-color: #0284c7 !important;
  background: #fff !important;
}
.vote-card-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 14px;
  padding-top: 12px;
  border-top: 1px solid #e5e7eb;
}
.vote-card-btn {
  padding: 8px 20px;
  background: #0c4a6e;
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
.vote-card-btn:hover { background: #075985; }
.vote-card-btn:disabled {
  background: #9ca3af;
  cursor: not-allowed;
}
.vote-status {
  font-size: 12px;
  padding: 2px 8px;
  border-radius: 10px;
  font-weight: 500;
  flex-shrink: 0;
}
.vote-status-active {
  background: #dcfce7;
  color: #16a34a;
}
.vote-status-ended {
  background: #fef3c7;
  color: #d97706;
}
.vote-participants {
  font-size: 13px;
  color: #6b7280;
}

@media (max-width: 600px) {
  .header { padding: 28px 16px 24px; }
  .header h1 { font-size: 22px; }
  .notice-card { padding: 18px; }
  .notice-card .notice-title { font-size: 16px; }
  .modal-box { width: 96vw; }
  .modal-body { padding: 16px; }
  .login-box { padding: 28px 20px; }
}

    /* 滑块验证码弹窗动画 */
    @keyframes sliderFadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes sliderModalIn {
      from { opacity: 0; transform: scale(0.9) translateY(20px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* 滑块拼图块平滑跟随 */
    .sliderContainer .block { 
      transition: left 0.08s linear; 
    }
    .sliderContainer_active .block { 
      transition: left 0.03s linear; 
    }
    /* 滑块按钮跟随 */
    .sliderContainer .slider { 
      transition: left 0.08s linear, background 0.2s linear; 
    }
    .sliderContainer_active .slider { 
      transition: left 0.03s linear; 
    }
    /* 滑条遮罩跟随 */
    .sliderContainer .sliderMask { 
      transition: width 0.08s linear; 
    }
    .sliderContainer_active .sliderMask { 
      transition: width 0.03s linear; 
    }
    /* 失败时回弹动画 */
    .sliderContainer_fail .block,
    .sliderContainer_fail .slider,
    .sliderContainer_fail .sliderMask {
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) !important;
    }

    .sliderContainer .slider { transition: background 0.2s linear; }
    .sliderContainer_active .slider { transition: none; }
    .sliderContainer .block { transition: none; }
    .sliderContainer_active .block { transition: none; }
    .sliderContainer .sliderMask { transition: none; }
    .sliderContainer_active .sliderMask { transition: none; }

  </style>
<link rel="stylesheet" href="slider-captcha/slidercaptcha.min.css">

</head>
<body>

<!-- ===== Login Screen ===== -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <h2 id="loginTitle">&#x1F4E2; 学生会登录</h2>
    <div class="login-sub" id="loginSub">登录后即可发布通知</div>
    <div class="login-error" id="loginError"></div>

    <!-- Init form (首次设置) -->
    <div id="initForm">
      <div class="login-field">
        <label for="initId">账号</label>
        <input id="initId" maxlength="20" placeholder="3-20位字母、数字、下划线">
      </div>
      <div class="login-field">
        <label for="initName">名称</label>
        <input id="initName" maxlength="20" placeholder="例如：学生会宣传部">
      </div>
      <div class="login-field">
        <label for="initPwd">密码</label>
        <input id="initPwd" type="password" maxlength="50" placeholder="至少6位">
      </div>
      <div class="login-field">
        <label for="initPwd2">确认密码</label>
        <input id="initPwd2" type="password" maxlength="50" placeholder="再次输入密码">
      </div>
      <button class="login-btn" id="initBtn" onclick="doInit()">&#x1F4E2; 创建账号</button>
    </div>

    <!-- Login form -->
    <div id="loginForm" style="display:none;">
      <div class="login-field">
        <label for="loginId">昵称 / 账号</label>
        <input id="loginId" maxlength="20" placeholder="校园墙昵称或学生会账号">
      </div>
      <div class="login-field">
        <label for="loginPwd">密码</label>
        <input id="loginPwd" type="password" maxlength="50" placeholder="输入密码"
               onkeydown="if(event.key==='Enter') doLogin()">
      </div>
      <!-- 验证码 -->
      <div class="login-field">
        <label>验证码</label>
        <div id="loginSliderStatus" style="display:flex;align-items:center;gap:8px;padding:8px 12px;background:#f5f5f5;border-radius:8px;cursor:pointer;border:1.5px solid var(--border);" onclick="showSliderCaptcha()">
          <span style="color:#999;font-size:13px;">🔒 点击完成人机验证</span>
          <span id="loginSliderBadge" style="display:none;color:#22c55e;font-size:13px;">✅ 已验证</span>
        </div>
      </div>
      <!-- 滑块验证码弹窗 -->
      <div class="overlay" id="sliderCaptchaOverlay" style="position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,0.45);animation:sliderFadeIn 0.25s ease;z-index:99999;" onclick="if(event.target===this)this.style.display='none'">
        <div class="dialog" style="background:#fff;padding:28px 24px 20px;border-radius:18px;animation:sliderModalIn 0.3s cubic-bezier(0.34,1.56,0.64,1);max-width:360px;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,0.2);">
          <button class="close-btn" onclick="document.getElementById('sliderCaptchaOverlay').style.display='none'" style="position:absolute;top:8px;right:12px;background:none;border:none;font-size:24px;cursor:pointer;color:#999;line-height:1;">&times;</button>
          <h3 style="margin:0 0 12px;font-size:16px;font-weight:600;color:#333;">人机验证</h3>
          <div id="sharedSliderCaptcha" style="width:280px;margin:0 auto;"></div>
          <div style="font-size:12px;color:#999;margin-top:10px;">拖动滑块完成拼图验证</div>
        </div>
      </div>
        <div style="font-size:11px;color:var(--text-sub);margin-top:4px;">&#x1F4A1; 点击图片刷新验证码</div>
      </div>
      <button class="login-btn" id="loginBtn" onclick="doLogin()">登 录</button>
    </div>
  </div>
</div>

<!-- ===== Main App ===== -->
<div class="main-app" id="mainApp">
  <div class="header">
    <h1>&#x1F4E2; 校园通知发布</h1>
    <p>Campus Announcements</p>
  </div>

  <div class="container">
    <div class="publish-bar">
      <div class="user-badge" id="userBadge" style="display:none;">
        &#x1F464; <span id="userName"></span>
        <span class="logout-link" onclick="openSettingsModal()" style="margin-left:2px;">&#x2699;&#xFE0F;</span>
        <span class="logout-link" onclick="doLogout()">退出</span>
      </div>
      <button class="btn-publish" onclick="checkAndPublish()">&#x270F;&#xFE0F; 发布通知</button>
      <button class="btn-publish" onclick="checkAndCreateDiscussion()" style="margin-left:8px;background:linear-gradient(135deg,#8b5cf6,#6d28d9);">&#x1F4AC; 发起话题</button>
      <button class="btn-publish" onclick="checkAndCreateVote()" style="margin-left:8px;background:linear-gradient(135deg,#0c4a6e,#0369a1);">🗳️ 发起投票</button>
    </div>
    <div id="noticeList">
      <div class="loading">加载中&#x2026;</div>
    </div>
    <!-- 讨论话题列表 -->
    <div id="discussionSection" style="margin-top:24px;border-top:2px solid var(--border);padding-top:16px;">

  var _selectedNotifLevel = 'T1';

// ===== Markdown 工具 =====
  function renderMarkdown(text) {
    if (!text) return '';
    var html = text
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      // 删除线 ~~text~~
      .replace(/~~([^~]+)~~/g, '<del>$1</del>')
      // 下划线 __text__（不能包含空格，避免与加粗混淆）
      .replace(/__([^_]+)__/g, '<u>$1</u>')
      // 加粗 **text**
      .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
      // 斜体 *text*
      .replace(/\*([^*]+)\*/g, '<em>$1</em>')
      // 上标 ^text^
      .replace(/\^([^^]+)\^/g, '<sup>$1</sup>')
      // 下标 ~text~
      .replace(/~([^~]+)~/g, '<sub>$1</sub>')
      // 列表项
      .replace(/^[\*\-\+] (.+)$/gm, '<li>$1</li>')
      .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')
      // 标题
      .replace(/^### (.+)$/gm, '<h3>$1</h3>')
      .replace(/^## (.+)$/gm, '<h2>$1</h2>')
      .replace(/^# (.+)$/gm, '<h1>$1</h1>')
      // 分隔线
      .replace(/^---+\s*$/gm, '<hr>')
      // 引用
      .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
      // 代码
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      // 表格
      .replace(/^\|(.+)\|$/gm, function(m, content) {
        var cells = content.split('|').map(function(c) { return c.trim(); });
        // 如果是分隔行（|---|），跳过
        if (cells.length > 0 && /^[-:\s]+$/.test(cells[0])) return '';
        return '<tr><td>' + cells.join('</td><td>') + '</td></tr>';
      })
      // 将连续的 <tr> 包裹在 <table> 中
      .replace(/((?:<tr>.*?<\/tr>\s*)+)/g, '<table style="border-collapse:collapse;width:100%;margin:8px 0;"><tbody>$1</tbody></table>')
      // 给 <td> 加边框
      .replace(/<td>/g, '<td style="border:1px solid var(--border);padding:8px 10px;">')
      // 图片和链接
      .replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1" style="max-width:100%;border-radius:8px;margin:6px 0;">')
      .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="nofollow">$1</a>')
      // 换行
      .replace(/\n\n/g, '</p><p>')
      .replace(/\n/g, '<br>');
    // Wrap consecutive <li> in <ul>
    html = html.replace(/((?:<li>.*?<\/li>)+)/g, '<ul>$1</ul>');
    // Wrap standalone <blockquote> in proper block
    html = html.replace(/<blockquote>/g, '<blockquote style="margin:10px 0;padding:10px 14px;border-left:3px solid var(--accent);background:rgba(0,0,0,0.02);border-radius:0 6px 6px 0;color:var(--text-sub);">');
    return '<p>' + html + '</p>';
  }
  window.insertMd = function(textareaId, before, after) {
    var ta = document.getElementById(textareaId);
    var start = ta.selectionStart, end = ta.selectionEnd;
    var text = ta.value;
    ta.value = text.substring(0, start) + before + text.substring(start, end) + after + text.substring(end);
    ta.focus();
    ta.selectionStart = start + before.length;
    ta.selectionEnd = start + before.length + (end - start);
  };

  window.togglePreview = function(textareaId) {

    if (preview.style.display === 'none') {
      preview.innerHTML = renderMarkdown(ta.value);
      preview.style.display = '';
      ta.style.display = 'none';
      btn.textContent = '✏️ 编辑';
    } else {
      preview.style.display = 'none';
      ta.style.display = '';
      btn.textContent = '👁️ 预览';
    }
  };

  // ===== 图片上传工具 =====
  var _uploadImageTarget = null;
  window.uploadImage = function(textareaId) {
    _uploadImageTarget = textareaId;
    var input = document.getElementById('imageUploadInput');
    input.value = '';
    input.click();
  };
  window.handleToolbarImage = function(input) {
    var file = input.files[0];
    if (!file || !_uploadImageTarget) return;
    if (file.size > 10 * 1024 * 1024) {
      showToast('❌ ' + file.name + ' 超过10MB', 'error');
      return;
    }
    var reader = new FileReader();
    reader.onload = function(e) {
      var ta = document.getElementById(_uploadImageTarget);
      var start = ta.selectionStart, end = ta.selectionEnd;
      var imgMarkdown = '\n![](' + e.target.result + ')\n';
      ta.value = ta.value.substring(0, start) + imgMarkdown + ta.value.substring(end);
      ta.focus();
      ta.selectionStart = ta.selectionEnd = start + imgMarkdown.length;
      showToast('✅ 图片已插入', 'success');
      _uploadImageTarget = null;
    };
    reader.readAsDataURL(file);
  };

  var _importMdTarget = null;
  window.importMdFile = function(textareaId) {
    _importMdTarget = textareaId;
    var input = document.getElementById('mdFileInput');
    input.value = '';
    input.click();
  };
  window.handleMdFile = function(input) {
    var file = input.files[0];
    if (!file || !_importMdTarget) return;

    // === 安全检查 1：文件大小限制 ===
    if (file.size > 1024 * 1024) {
      showToast('❌ ' + file.name + ' 超过1MB', 'error');
      return;
    }
    if (file.size === 0) {
      showToast('❌ 文件为空', 'error');
      return;
    }

    // === 安全检查 2：文件类型白名单 ===
    var allowedExts = ['.md', '.markdown', '.txt', '.mdown', '.mkd', '.mkdn'];
    var ext = file.name.substring(file.name.lastIndexOf('.')).toLowerCase();
    if (allowedExts.indexOf(ext) === -1 && ext.indexOf('.') === 0) {
      showToast('❌ 不支持的文件类型：' + ext + '，仅支持 .md / .markdown / .txt', 'error');
      return;
    }

    // === 安全检查 3：仅读取前 2KB 做内容校验 ===
    var safetyBlob = file.slice(0, 2048);
    var safetyReader = new FileReader();
    safetyReader.onload = function(safetyEvent) {
      var head = safetyEvent.target.result;

      // 检查是否为二进制文件（包含大量 null 字节或非文本字符）
      var binaryScore = 0;
      for (var i = 0; i < head.length; i++) {
        var cc = head.charCodeAt(i);
        if (cc === 0 || (cc < 8 && cc > 0)) { binaryScore += 3; }
        else if (cc < 32 && cc !== 9 && cc !== 10 && cc !== 13) { binaryScore += 1; }
      }
      if (binaryScore > 10) {
        showToast('❌ 文件包含非文本内容，请选择纯文本 Markdown 文件', 'error');
        return;
      }

      // === 安全检查 4：检查完整内容中的注入风险 ===
      var fullReader = new FileReader();
      fullReader.onload = function(e) {
        var rawContent = e.target.result;

        // 检查是否包含 HTML 标签（XSS 防护）
        var suspiciousTags = rawContent.match(/<(\/?)(script|iframe|embed|object|applet|meta|link|style|form|input|button|textarea|select|option|on\w+\s*=|javascript:|data:\s*text\/html|vbscript:|expression\s*\(|alert\s*\(|document\.|window\.|eval\s*\(|setTimeout|setInterval|new\s+Function|fetch\s*\(|XMLHttpRequest)/gi);
        if (suspiciousTags && suspiciousTags.length > 0) {
          showToast('⚠️ 文件包含可疑内容（' + suspiciousTags.length + ' 处），已自动过滤', 'warning');
        }

        // === 安全处理：剥离注入内容 ===
        var content = rawContent
          // 剥离 script 标签及内容
          .replace(/<script[^>]*>[\s\S]*?<\/script>/gi, '')
          // 剥离 iframe/embed/object
          .replace(/<(iframe|embed|object|applet)[^>]*>[\s\S]*?<\/\1>/gi, '')
          .replace(/<(\/?)iframe[^>]*>/gi, '')
          .replace(/<(\/?)embed[^>]*>/gi, '')
          .replace(/<(\/?)object[^>]*>/gi, '')
          // 剥离事件处理器 onclick= onload= 等
          .replace(/\s+on\w+\s*=\s*(?:"[^"]*"|'[^']*'|[^\s>]+)/gi, '')
          // 剥离 javascript: / data: URI
          .replace(/\s*(?:href|src|action)\s*=\s*(?:"|')\s*(?:javascript|data|vbscript)\s*:/gi, ' $1=')
          // 剥离 style/link/meta 危险标签
          .replace(/<(link|meta|style)[^>]*>/gi, '')
          // 剥离表达注入
          .replace(/(?:expression|eval|alert|prompt)\s*\(/gi, '')
          // 剥离 base64 中嵌入的 HTML
          .replace(/data\s*:\s*text\/html/i, 'data: text/plain');

        // === Markdown 格式校验 ===
        var totalLines = content.split('\n').length;
        var mdLineCount = 0;
        var mdPatterns = [
          /^#{1,6}\s+/m, /^\*{2}[^*]+\*{2}/m, /^\[([^\]]+)\]\(([^)]+)\)/m,
          /^>\s+/m, /^[-*+]\s+/m, /^\d+\.\s+/m, /^`{1,3}/m,
          /^\|.+\|/m, /^!\[([^\]]*)\]\(([^)]+)\)/m, /^---+\s*$/m,
          /\*\*[^*]+\*\*/g, /~~[^~]+~~/g, /__[^_]+__/g
        ];
        for (var pi = 0; pi < mdPatterns.length; pi++) {
          var matches = content.match(mdPatterns[pi]);
          if (matches) mdLineCount += matches.length;
        }

        // 空文件或有大量二进制残留
        if (totalLines > 2 && mdLineCount === 0 && content.replace(/\s/g, '').length > 20) {
          // 可能是纯文本，仍然允许导入，但给出提示
        }

        // === 安全检查 5：最大行数和字符限制 ===
        var MAX_LINES = 500;
        var MAX_CHARS = 50000;
        if (totalLines > MAX_LINES) {
          var lines = content.split('\n');
          content = lines.slice(0, MAX_LINES).join('\n');
          showToast('⚠️ 行数超过 ' + MAX_LINES + ' 行，已截断', 'warning');
        }
        if (content.length > MAX_CHARS) {
          content = content.substring(0, MAX_CHARS);
          showToast('⚠️ 内容超过 ' + MAX_CHARS + ' 字符，已截断', 'warning');
        }

        // === 正常导入流程 ===
        var ta = document.getElementById(_importMdTarget);
        var start = ta.selectionStart, end = ta.selectionEnd;

        // 从文件名提取标题
        var fileName = file.name.replace(/\.(md|markdown|txt|mdown|mkd|mkdn)$/i, '').replace(/^\d+[\s\.\-_]*/, '');
        // 从内容提取 h1 标题
        var titleMatch = content.match(/^#\s+(.+)$/m);
        var title = titleMatch ? titleMatch[1].trim().substring(0, 100) : fileName.substring(0, 100);

        // 插入内容
        ta.value = ta.value.substring(0, start) + '\n' + content + '\n' + ta.value.substring(end);
        ta.focus();

        // 自动填充标题
        var titleInputId = _importMdTarget === 'notifContent' ? 'notifTitle' : 'editTitle';
        var titleInput = document.getElementById(titleInputId);
        if (titleInput && !titleInput.value.trim()) {
          titleInput.value = title;
        }

        showToast('✅ 已导入 ' + file.name + '（' + totalLines + ' 行）', 'success');
        _importMdTarget = null;
      };
      fullReader.readAsText(file);
    };
    safetyReader.readAsBinaryString ? safetyReader.readAsBinaryString(safetyBlob) : safetyReader.readAsText(safetyBlob);
  };

  window.selectNotifLevel = function(level) {

  window.handlePublishImages = function(input) {
    var files = input.files;
    var maxBytes = 10 * 1024 * 1024;
    for (var i = 0; i < files.length; i++) {
      if (files[i].size > maxBytes) {
        showToast('\u274C ' + files[i].name + ' \u8D85\u8FC710MB', 'error');
        continue;
      }
      (function(file) {
        var reader = new FileReader();
        reader.onload = function(e) {
          _publishImages.push(e.target.result);
          renderPublishPreview();
        };
        reader.readAsDataURL(file);
      })(files[i]);
    }
    input.value = '';
  };

  // ===== 加载通知列表 =====
  async function loadNotices() {

        list.innerHTML = '<div class="empty-tip">\u6682\u65E0\u901A\u77E5</div>';
        return;
      }
      var html = '';
      data.forEach(function(n) {
        var time = n.createdAt ? new Date(n.createdAt).toLocaleString('zh-CN', {
          year: 'numeric', month: 'long', day: 'numeric',
          hour: '2-digit', minute: '2-digit'
        }) : '';
        html += '<div class="notice-card">' +
          '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;">' +
          '<div style="flex:1;">' +
          '<div class="notice-title">' + escHtml(n.title) + '</div>' +
          '<div class="notice-content">' + renderMarkdown(n.content) + '</div>' +
          (n.images && n.images.length > 0 ? '<div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;margin-bottom:4px;">' +
            n.images.map(function(src) {
              return '<img src="' + src + '" style="max-width:100%;max-height:300px;border-radius:8px;border:1px solid var(--border);object-fit:contain;cursor:pointer;" onclick="window.open(this.src)" onerror="this.style.display=\'none\'">';
            }).join('') +
          '</div>' : '') +
          '</div>' +
          (currentUser ? '<div style="display:flex;gap:2px;flex-shrink:0;">' +
            '<button onclick="openEditModal(\'' + n.id + '\')" style="background:none;border:none;cursor:pointer;font-size:14px;color:#9ca3af;padding:2px 5px;line-height:1;border-radius:4px;" title="修改通知" onmouseover="this.style.background=\'#dbeafe\';this.style.color=\'#2563eb\'" onmouseout="this.style.background=\'transparent\';this.style.color=\'#9ca3af\'">✏️</button>' +
            '<button onclick="deleteNotice(\'' + n.id + '\')" style="background:none;border:none;cursor:pointer;font-size:16px;color:#9ca3af;padding:2px 4px;line-height:1;border-radius:4px;" title="删除通知" onmouseover="this.style.background=\'#fee2e2\';this.style.color=\'#dc2626\'" onmouseout="this.style.background=\'transparent\';this.style.color=\'#9ca3af\'">✕</button>' +
            '</div>' : '') +
          '</div>' +
          '<div class="notice-meta">' +
          '<span>\uD83D\uDC64 ' + escHtml(n.author || '\u5B66\u751F\u4F1A') + '</span>' +
          '<span>\uD83D\uDCC5 ' + time + '</span>' +
          '</div></div>';
      });
      list.innerHTML = html;
    } catch(e) {
      document.getElementById('noticeList').innerHTML = '<div class="empty-tip">\u7F51\u7EDC\u9519\u8BEF</div>';
    }
  }

  window.openEditNoticeVote = function(voteId) {
    var vote = null;
    if (window._votes && window._votes.length > 0) {
      for (var i = 0; i < window._votes.length; i++) {
        if (window._votes[i].id === voteId) { vote = window._votes[i]; break; }
      }
    }
    if (!vote) { showToast('未找到投票数据', 'error'); return; }

    window._editingNoticeVoteId = voteId;
    document.getElementById('voteModalTitle').innerHTML = '&#x270F;&#xFE0F; 编辑投票';
    document.getElementById('voteSubmitBtn').innerHTML = '&#x1F4BE; 保存修改';
    document.getElementById('voteOverlay').style.display = 'flex';
    document.getElementById('voteError').textContent = '';

    // 填充表单
    document.getElementById('voteTitle').value = vote.title || '';
    document.getElementById('voteMultiple').checked = !!vote.multiple;
    document.getElementById('voteAllowCustom').checked = !!vote.allowCustom;

    if (vote.endTime) {
      try {
        var d = new Date(vote.endTime);
        var pad = function(n) { return n < 10 ? '0' + n : '' + n; };
        document.getElementById('voteEndTime').value =
          d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate()) + 'T' +
          pad(d.getHours()) + ':' + pad(d.getMinutes());
      } catch(e) {
        document.getElementById('voteEndTime').value = '';
      }
    } else {
      document.getElementById('voteEndTime').value = '';
    }

    // 重建选项
    var container = document.getElementById('noticeVoteOptions');
    var oldRows = container.querySelectorAll('.notice-vote-opt-row');
    oldRows.forEach(function(r) { r.remove(); });

    var voteOptions = vote.options || [];
    var renderCount = Math.max(2, voteOptions.length);
    for (var i = 0; i < renderCount; i++) {
      var opt = voteOptions[i];
      var row = document.createElement('div');
      row.className = 'notice-vote-opt-row';
      row.style.cssText = 'display:flex;gap:6px;align-items:center;margin-bottom:6px;';
      var hasImg = opt && opt.image;
      var imgHtml = hasImg
        ? ('<span class="notice-vote-img-preview" style="display:block;width:28px;height:28px;border-radius:4px;overflow:hidden;flex-shrink:0;border:1px solid var(--border);"><img src="' + opt.image + '" style="width:100%;height:100%;object-fit:cover;"></span>')
        : '<span class="notice-vote-img-preview" style="display:none;width:28px;height:28px;border-radius:4px;overflow:hidden;flex-shrink:0;border:1px solid var(--border);"><img style="width:100%;height:100%;object-fit:cover;"></span>';
      var btnHtml = i === 0
        ? '<button type="button" class="notice-vote-add" onclick="addNoticeVoteOpt(this)" style="padding:4px 10px;border:1px dashed var(--accent);border-radius:4px;background:var(--bg);color:var(--accent);cursor:pointer;">+</button>'
        : '<button type="button" onclick="removeNoticeVoteOpt(this)" style="padding:4px 10px;border:1px solid #ff6b6b;border-radius:4px;background:var(--bg);color:#ff6b6b;cursor:pointer;">−</button>';
      row.innerHTML =
        '<input type="text" class="notice-vote-opt-input" value="' +
        ((opt && opt.text) || '').replace(/"/g, '&quot;') +
        '" placeholder="选项 ' + (i + 1) + '" style="flex:1;padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;">' +
        '<input type="file" accept="image/*" style="display:none;" onchange="handleNoticeVoteImg(this)">' +
        '<button type="button" onclick="this.previousElementSibling.click()" style="padding:4px 8px;border:1px solid var(--border);border-radius:4px;background:var(--bg);cursor:pointer;">🖼️</button>' +
        imgHtml +
        btnHtml;
      container.appendChild(row);
    }
  };

  window.doUpdateVote = async function() {
    var voteId = window._editingNoticeVoteId;
    if (!voteId) return;

    var title = document.getElementById('voteTitle').value.trim();
    var multiple = document.getElementById('voteMultiple').checked;
    var allowCustom = document.getElementById('voteAllowCustom').checked;
    var endTime = document.getElementById('voteEndTime').value || null;
    var errEl = document.getElementById('voteError');

    if (!title) { errEl.textContent = '请输⼊投票标题'; return; }
    if (title.length > 100) { errEl.textContent = '标题最多100字'; return; }

    var rows = document.querySelectorAll('#noticeVoteOptions .notice-vote-opt-row');
    var options = [];
    var optionImages = [];
    rows.forEach(function(row) {
      var input = row.querySelector('.notice-vote-opt-input');
      var text = input ? input.value.trim() : '';
      if (text) {
        options.push(text);
        var preview = row.querySelector('.notice-vote-img-preview');
        var img = preview ? preview.querySelector('img') : null;
        optionImages.push(img && img.src ? img.src : null);
      }
    });
    if (options.length < 2) { errEl.textContent = '至少需要2个选项'; return; }
    if (options.length > 20) { errEl.textContent = '最多20个选项'; return; }

    errEl.textContent = '';
    var btn = document.getElementById('voteSubmitBtn');
    var originalText = btn.textContent;
    btn.disabled = true; btn.textContent = '\u66F4\u65B0\u4E2D\u2026';

    try {
      var token = localStorage.getItem(SC_TOKEN_KEY);
      var res = await fetch('/api/notice/votes/' + encodeURIComponent(voteId), {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'x-sc-token': token || '' },
        body: JSON.stringify({
          title: title,
          options: options.map(function(t, i) { return { text: t, image: optionImages[i] }; }),
          multiple: multiple,
          allowCustom: allowCustom,
          endTime: endTime ? new Date(endTime).toISOString() : null
        })
      });
      var json = await res.json();
      if (json.ok) {
        window._editingNoticeVoteId = null;
        closeVoteModal();
        loadVoteList();
        showToast('\u6295\u7968\u4FEE\u6539\u6210\u529F', 'success');
      } else {
        errEl.textContent = json.msg || json.warningMsg || '\u4FEE\u6539\u5931\u8D25';
        btn.disabled = false; btn.textContent = originalText;
      }
    } catch (e) {
      errEl.textContent = '\u7F51\u7EDC\u9519\u8BEF';
      btn.disabled = false; btn.textContent = originalText;
    }
  };

    if (!title) { errEl.textContent = '请输⼊投票标题'; return; }

    var rows = document.querySelectorAll('#noticeVoteOptions .notice-vote-opt-row');
    var options = [];
    var optionImages = [];
    rows.forEach(function(row) {
      var input = row.querySelector('.notice-vote-opt-input');
      var text = input ? input.value.trim() : '';
      if (text) {
        options.push(text);
        var preview = row.querySelector('.notice-vote-img-preview');
        var img = preview ? preview.querySelector('img') : null;
        optionImages.push(img && img.src && img.src.startsWith('data:') ? img.src : null);
      }
    });
    if (options.length < 2) { errEl.textContent = '至少需要2个选项'; return; }
    if (options.length > 20) { errEl.textContent = '最多20个选项'; return; }

    errEl.textContent = '';
    var btn = document.getElementById('voteSubmitBtn');
    btn.disabled = true; btn.textContent = '\u53D1\u5E03\u4E2D\u2026';

    try {
      var res = await fetch('/api/notice/votes', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-sc-token': localStorage.getItem(SC_TOKEN_KEY) || '' },
        body: JSON.stringify({
          title: title,
          options: options.map(function(t, i) { return { text: t, image: optionImages[i] }; }),
          multiple: multiple,
          allowCustom: allowCustom,
          endTime: endTime ? new Date(endTime).toISOString() : null
        })
      });
      var json = await res.json();
      if (json.ok) {
        closeVoteModal();
        loadVoteList();
        showToast('\u6295\u7968\u53D1\u5E03\u6210\u529F\uFF01', 'success');
      } else {
        errEl.textContent = json.msg || json.warningMsg || '\u53D1\u5E03\u5931\u8D25';
        btn.disabled = false; btn.textContent = '\u2705 \u53D1\u5E03\u6295\u7968';
      }
    } catch (e) {
      errEl.textContent = '\u7F51\u7EDC\u9519\u8BEF\uFF0C\u8BF7\u7A0D\u540E\u91CD\u8BD5';
      btn.disabled = false; btn.textContent = '\u2705 \u53D1\u5E03\u6295\u7968';
    }
  };

  // 投票选项辅助函数
  window.addNoticeVoteOpt = function(btn) {
    var row = btn.closest('.notice-vote-opt-row');
    var newRow = row.cloneNode(true);
    newRow.querySelector('.notice-vote-opt-input').value = '';
    var prev = newRow.querySelector('.notice-vote-img-preview');
    if (prev) { prev.style.display = 'none'; prev.querySelector('img').src = ''; }
    var addBtn = newRow.querySelector('.notice-vote-add');
    if (addBtn) addBtn.outerHTML = '<button type="button" class="notice-vote-add" onclick="addNoticeVoteOpt(this)" style="padding:4px 10px;border:1px dashed var(--accent);border-radius:4px;background:var(--bg);color:var(--accent);cursor:pointer;">+</button>';
    row.parentNode.insertBefore(newRow, row.nextSibling);
    updateNoticeVotePlh();
  };
  window.removeNoticeVoteOpt = function(btn) {
    var rows = document.querySelectorAll('#noticeVoteOptions .notice-vote-opt-row');
    if (rows.length <= 2) { showToast('至少需要2个选项', 'error'); return; }
    btn.closest('.notice-vote-opt-row').remove();
    updateNoticeVotePlh();
  };
  function updateNoticeVotePlh() {
    document.querySelectorAll('#noticeVoteOptions .notice-vote-opt-row').forEach(function(r,i){
      var inp = r.querySelector('.notice-vote-opt-input');
      if (inp && !inp.value) inp.placeholder = '选项 ' + (i+1);
    });
  }
  window.handleNoticeVoteImg = function(input) {
    var file = input.files[0];
    if (!file) return;
    if (!file.type.startsWith('image/')) { showToast('请选择图片文件', 'error'); input.value = ''; return; }
    if (file.size > 10 * 1024 * 1024) { showToast('图片不能超过10MB', 'error'); input.value = ''; return; }
    var reader = new FileReader();
    reader.onload = function(e) {
      var row = input.closest('.notice-vote-opt-row');
      var prev = row.querySelector('.notice-vote-img-preview');
      if (prev) { prev.style.display = 'block'; prev.querySelector('img').src = e.target.result; }
    };
    reader.readAsDataURL(file);
  };

  // ===== 讨论话题 =====
  window.checkAndCreateDiscussion = function() {
    if (!currentUser) {
      showToast('\u8BF7\u5148\u767B\u5F55', 'error');
      return;
    }
    openDiscussionModal();
  };

  window.openDiscussionModal = function() {
    document.getElementById('discussionOverlay').style.display = 'flex';
    document.getElementById('discussionError').textContent = '';
    document.getElementById('discussionTitle').value = '';
    document.getElementById('discussionExpires').value = '';
  };

  window.closeDiscussionModal = function() {
    document.getElementById('discussionOverlay').style.display = 'none';
    document.getElementById('discussionError').textContent = '';
  };

  window.doCreateDiscussion = async function() {
    var title = document.getElementById('discussionTitle').value.trim();
    var expiresAt = document.getElementById('discussionExpires').value || null;
    var errEl = document.getElementById('discussionError');
    if (!title) { errEl.textContent = '\u8BF7\u8F93\u5165\u8BDD\u9898\u6807\u9898'; return; }
    errEl.textContent = '';
    var btn = document.getElementById('discussionBtn');
    btn.disabled = true; btn.textContent = '\u521B\u5EFA\u4E2D\u2026';
    try {
      var token = localStorage.getItem(SC_TOKEN_KEY);
      var res = await fetch('/api/discussions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-sc-token': token || '' },
        body: JSON.stringify({ title: title, expiresAt: expiresAt })
      });
      var json = await res.json();
      if (json.ok) {
        showToast('\u2705 \u8BDD\u9898\u5DF2\u521B\u5EFA', 'success');
        closeDiscussionModal();
        loadDiscussions();
      } else {
        errEl.textContent = json.msg || '\u521B\u5EFA\u5931\u8D25';
      }
    } catch(e) { errEl.textContent = '\u7F51\u7EDC\u9519\u8BEF'; }
    finally { btn.disabled = false; btn.textContent = '\uD83D\uDCAC \u53D1\u8D77\u8BDD\u9898'; }
  };

  async function loadDiscussions() {
    try {
      var res = await fetch('/api/discussions');
      var json = await res.json();
      var list = document.getElementById('discussionList');
      if (!json.ok) { list.innerHTML = '<div class="empty-tip">\u52A0\u8F7D\u5931\u8D25</div>'; return; }
      var data = json.data || [];
      if (data.length === 0) {
        list.innerHTML = '<div class="empty-tip">\u6682\u65E0\u8BA8\u8BBA\u8BDD\u9898</div>';
        return;
      }
      var html = '';
      data.forEach(function(d) {
        var expiresText = d.expiresAt ? '\u5230 ' + new Date(d.expiresAt).toLocaleString('zh-CN', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }) : '\u65E0\u671F\u9650';
        var isExpired = d.expiresAt && new Date(d.expiresAt) < new Date();
        html += '<div class="discussion-item" style="display:flex;justify-content:space-between;align-items:center;padding:12px 14px;background:var(--card-bg);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;' + (isExpired ? 'opacity:0.6;' : '') + '">' +
          '<div style="flex:1;">' +
          '<div style="font-weight:600;font-size:14px;color:' + (isExpired ? '#9ca3af' : 'var(--text)') + ';">' + escHtml(d.title) + (isExpired ? ' <span style="font-size:11px;color:var(--text-sub);">(\u5DF2\u8FC7\u671F)</span>' : '') + '</div>' +
          '<div style="font-size:11px;color:var(--text-sub);margin-top:3px;">\uD83D\uDCC5 ' + expiresText + ' \u00B7 \uD83D\uDCAC ' + (d.commentCount || 0) + ' \u6761\u8BC4\u8BBA</div>' +
          '</div></div>';
      });
      list.innerHTML = html;
    } catch(e) {
      document.getElementById('discussionList').innerHTML = '<div class="empty-tip">\u7F51\u7EDC\u9519\u8BEF</div>';
    }
  }

  function showToast(msg, type) {
    var t = document.createElement('div');
    t.className = 'toast ' + type;
    t.innerHTML = msg;
    document.body.appendChild(t);
    setTimeout(function() { t.remove(); }, 2500);
  }

  // ===== 敏感词警告弹窗 =====
  function showSensitiveWarning(onEdit, onContinue) {
    var overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;inset:0;z-index:10001;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.45);backdrop-filter:blur(4px);';
    overlay.innerHTML = '<div style="background:#fffbe6;border:2px solid #f5c518;border-radius:16px;padding:28px 24px;max-width:420px;width:90%;text-align:center;box-shadow:0 12px 40px rgba(0,0,0,0.2);animation:modalIn 0.3s ease;">' +
      '<div style="font-size:40px;margin-bottom:8px;">⚠️</div>' +
      '<h3 style="margin:0 0 6px;font-size:17px;color:#5a3d00;">内容包含敏感词</h3>' +
      '<p style="font-size:13px;color:#7a5a2a;line-height:1.6;margin-bottom:20px;">检测到内容中包含敏感词，请修改后重新提交。<br>如果你确认内容合规，也可以选择继续发布。</p>' +
      '<div style="display:flex;gap:10px;justify-content:center;">' +
      '<button onclick="this.closest(\'[style*=\\"position:fixed\\"]\').remove()" style="padding:9px 20px;border:1px solid #e8c84a;border-radius:8px;background:#fff;color:#5a3d00;font-size:14px;cursor:pointer;font-family:inherit;">返回修改</button>' +
      '<button onclick="var o=this.closest(\'[style*=\\"position:fixed\\"]\');o.remove();(' + onContinue.toString() + ')()" style="padding:9px 20px;border:none;border-radius:8px;background:linear-gradient(135deg,#f5c518,#e0a800);color:#5a3d00;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;">继续发布</button>' +
      '</div></div>';
    document.body.appendChild(overlay);
  }

  // ===== 反霸凌警告弹窗（仅返回编辑，不可强制发送）=====
  function showBullyingWarning(onEdit) {
    var overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;inset:0;z-index:10001;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.45);backdrop-filter:blur(4px);';
    overlay.innerHTML = '<div style="background:#fef2f2;border:2px solid #ef4444;border-radius:16px;padding:28px 24px;max-width:420px;width:90%;text-align:center;box-shadow:0 12px 40px rgba(0,0,0,0.2);animation:modalIn 0.3s ease;">' +
      '<div style="font-size:40px;margin-bottom:8px;">🛡️</div>' +
      '<h3 style="margin:0 0 6px;font-size:17px;color:#991b1b;">内容涉及受保护人员</h3>' +
      '<p style="font-size:13px;color:#b91c1c;line-height:1.6;margin-bottom:20px;">检测到内容包含受霸凌保护的人员姓名，<br>此内容已被系统拦截，无法发布。</p>' +
      '<button onclick="this.closest(\'[style*=\\"position:fixed\\"]\').remove()" style="padding:9px 20px;border:none;border-radius:8px;background:#ef4444;color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;">知道了，返回修改</button></div>';
    document.body.appendChild(overlay);
  }

  // ===== #话题自动补全（notifContent / editContent 输入框）=====
  var _suggestTimer = null;
  function setupDiscussionSuggest(textareaId) {
    var ta = document.getElementById(textareaId);
    if (!ta) return;
    ta.addEventListener('input', function() {
      var val = this.value;
      var cursorPos = this.selectionStart;
      var textBefore = val.substring(0, cursorPos);
      var hashIdx = textBefore.lastIndexOf('#');
      if (hashIdx >= 0 && (hashIdx === 0 || /\s/.test(textBefore[hashIdx - 1]))) {
        var query = textBefore.substring(hashIdx + 1);
        if (query.length > 0 && !/\s/.test(query)) {
          if (_suggestTimer) clearTimeout(_suggestTimer);
          _suggestTimer = setTimeout(function() { fetchNotifSuggest(textareaId, query); }, 200);
          return;
        }
      }
      hideNotifSuggest();
    });
    ta.addEventListener('blur', function() { setTimeout(hideNotifSuggest, 300); });
    ta.addEventListener('scroll', repositionNotifSuggest);
  }
  window.addEventListener('resize', function() { if (document.getElementById('notifSuggestBox').style.display !== 'none') repositionNotifSuggest(); });

  function fetchNotifSuggest(textareaId, q) {
    fetch('/api/discussions?q=' + encodeURIComponent(q)).then(function(r) { return r.json(); }).then(function(j) {
      if (!j.ok || !j.data || j.data.length === 0) { hideNotifSuggest(); return; }
      var box = document.getElementById('notifSuggestBox');
      var ta = document.getElementById(textareaId);
      var rect = ta.getBoundingClientRect();
      box.style.top = (rect.top - 10) + 'px';
      box.style.left = rect.left + 'px';
      box.style.width = rect.width + 'px';
      box.innerHTML = j.data.map(function(d) {
        return '<div onclick="selectNotifSuggest(\'' + textareaId + '\',\'' + d.id + '\',\'' + escHtml(d.title.replace(/'/g,"\\'")) + '\')" style="padding:8px 12px;cursor:pointer;border-bottom:1px solid #f0e8a0;transition:background 0.1s;" onmouseover="this.style.background=\'#fef7d0\'" onmouseout="this.style.background=\'\'">\uD83D\uDCAC ' + escHtml(d.title) + '</div>';
      }).join('');
      box.style.display = 'block';
    }).catch(function() { hideNotifSuggest(); });
  }

  function hideNotifSuggest() {
    var box = document.getElementById('notifSuggestBox');
    if (box) box.style.display = 'none';
  }

  function repositionNotifSuggest() {
    var box = document.getElementById('notifSuggestBox');
    if (box.style.display === 'none') return;
    var ta = document.querySelector('textarea:focus');
    if (!ta) return;
    var rect = ta.getBoundingClientRect();
    box.style.top = (rect.top - 10) + 'px';
    box.style.left = rect.left + 'px';
  }

  window.selectNotifSuggest = function(textareaId, id, title) {
    var ta = document.getElementById(textareaId);
    if (!ta) return;
    var val = ta.value;
    var cursorPos = ta.selectionStart;
    var textBefore = val.substring(0, cursorPos);
    var hashIdx = textBefore.lastIndexOf('#');
    if (hashIdx >= 0) {
      var afterHash = textBefore.substring(hashIdx);
      var spaceIdx = afterHash.indexOf(' ');
      var replaceEnd = spaceIdx >= 0 ? hashIdx + spaceIdx : cursorPos;
      ta.value = val.substring(0, hashIdx) + '#' + title + ' ' + val.substring(cursorPos);
      ta.focus();
      var newPos = hashIdx + 1 + title.length + 1;
      ta.selectionStart = ta.selectionEnd = newPos;
    }
    hideNotifSuggest();
  };

  // ===== 投票功能 =====
  var _votes = [];

  async function loadVoteList() {
    var list = document.getElementById('voteList');
    if (!list) return;
    try {
      var res = await fetch('/api/votes');
      var json = await res.json();
      if (!json.ok) { list.innerHTML = '<div class="empty-tip">加载失败</div>'; return; }
      var data = json.data || [];
      _votes = data;
      _voteUserVotes = {};
      data.forEach(function(v) {
        if (v.userVoted && v.userVoted.length > 0) {
          _voteUserVotes[v.id] = v.userVoted;
        }
      });
      renderVoteList(data);
    } catch(e) {
      list.innerHTML = '<div class="empty-tip">加载失败</div>';
    }
  }

  function renderVoteList(voteList) {
    var list = document.getElementById('voteList');
    if (!list) return;
    if (!voteList || voteList.length === 0) {
      list.innerHTML = '<div class="empty-tip">暂无投票</div>';
      return;
    }
    var html = '';
    voteList.forEach(function(vote) {
      var isEnded = vote.endTime && new Date(vote.endTime) < new Date();
      var totalVotes = vote.totalVotes !== undefined
        ? vote.totalVotes
        : vote.options.reduce(function(sum, opt) { return sum + (opt.votes || 0); }, 0);

      html += '<div class="vote-card">';
      html += '<div class="vote-card-header">';
      html += '<div>';
      html += '<div class="vote-card-title">' + escHtml(vote.title) + '</div>';
      html += '<div class="vote-card-meta">';
      html += '<span>&#x1F5F3; ' + totalVotes + ' 人参与</span>';
      html += '<span>' + escHtml(vote.author || '') + '</span>';
      html += '<span>' + formatVoteDate(vote.createdAt) + '</span>';
      if (vote.endTime) {
        html += '<span>' + formatVoteDate(vote.endTime) + ' 截止</span>';
      }
      html += '</div>';
      html += '</div>';
      html += '<span class="vote-status ' + (isEnded ? 'vote-status-ended' : 'vote-status-active') + '">';
      html += isEnded ? '已结束' : '进行中';
      html += '</span>';
      if (!isEnded) {
        html += '<button class="vote-card-btn" style="background:#fef3c7;color:#92400e;border:1px solid #f59e0b;font-size:11px;padding:3px 8px;" onclick="endVote(\'' + vote.id + '\')">⏹ 截止</button>';
      }
      html += '<button class="vote-card-btn" style="background:#dbeafe;color:#1e40af;border:1px solid #60a5fa;font-size:11px;padding:3px 8px;" onclick="openEditNoticeVote(\'' + vote.id + '\')">✏️ 编辑</button>';
      html += '</div>';

      html += '<div class="vote-card-options">';
      vote.options.forEach(function(opt) {
        var percent = totalVotes > 0 ? Math.round((opt.votes / totalVotes) * 100) : 0;
        html += '<div class="vote-option" style="cursor:default;">';
        html += '<span class="vote-option-text">' + (opt.image ? '<img src="' + opt.image + '" style="width:20px;height:20px;border-radius:3px;object-fit:cover;vertical-align:middle;margin-right:4px;">' : '') + escHtml(opt.text) + '</span>';
        html += '<span class="vote-option-percent">' + percent + '% (' + (opt.votes || 0) + '票)</span>';
        html += '</div>';
        html += '<div class="vote-option-bar"><div class="vote-option-bar-fill" style="width:' + percent + '%"></div></div>';
      });
      html += '</div>';
      html += '</div>';
    });
    list.innerHTML = html;
  }

  window.endVote = async function(voteId) {
    if (!confirm('确认截止此投票？截止后用户无法继续投票。')) return;
    var token = localStorage.getItem(SC_TOKEN_KEY);
    try {
      var res = await fetch('/api/votes/' + voteId + '/end', {
        method: 'POST',
        headers: { 'x-sc-token': token || '' }
      });
      var json = await res.json();
      if (json.ok) {
        showToast('✅ 投票已截止', 'success');
        loadVoteList();
      } else {
        showToast('❌ ' + (json.msg || '操作失败'), 'error');
      }
    } catch(e) {
      showToast('❌ 网络错误', 'error');
    }
  };

  // ===== 工具函数 =====

  function formatVoteDate(isoStr) {
    if (!isoStr) return '';
    var d = new Date(isoStr);
    return (d.getMonth() + 1) + '月' + d.getDate() + '日 ' +
      d.getHours().toString().padStart(2, '0') + ':' +
      d.getMinutes().toString().padStart(2, '0');
  }

  // 为两个内容输入框启用 #话题自动补全
  setupDiscussionSuggest('notifContent');
  setupDiscussionSuggest('editContent');

  // ===== 启动 =====
  var savedToken = localStorage.getItem(SC_TOKEN_KEY);
  var savedName = localStorage.getItem('sc_name');
  if (savedToken) {
    fetch('/api/student-council/me', { headers: { 'x-sc-token': savedToken } })
      .then(function(r) { return r.json(); })
      .then(function(json) {
        if (json.ok) {
          currentUser = { token: savedToken, name: json.data.name };
          document.getElementById('mainApp').classList.add('show');
          document.getElementById('userName').textContent = json.data.name;
          loadNotices();
          loadDiscussions();
          loadVoteList();
        } else {
          localStorage.removeItem(SC_TOKEN_KEY);
          localStorage.removeItem('sc_name');
          refreshLoginCaptcha();
          checkInit();
        }
      })
      .catch(function() {
        refreshLoginCaptcha();
        checkInit();
      });
  } else {
    refreshLoginCaptcha();
    checkInit();
  }
})();
</script>
