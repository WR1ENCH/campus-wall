<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>学生会 · 通知公告</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #f0ebe3;
  --card: #ffffff;
  --text: #2d2a24;
  --text-sub: #8a8580;
  --accent: #b8860b;
  --accent-light: #daa520;
  --border: #e0dad0;
  --shadow: 0 2px 12px rgba(0,0,0,0.06);
  --radius: 12px;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, "Noto Sans SC", "PingFang SC", sans-serif;
  line-height: 1.7;
  min-height: 100vh;
}

/* ===== Login Screen ===== */
.login-screen {
  display: none;
  position: fixed; inset: 0; z-index: 100;
  background: linear-gradient(135deg, #2d2a24, #4a443c);
  align-items: center; justify-content: center;
}

.login-screen.show { display: flex; }

.login-box {
  background: var(--card); border-radius: 16px;
  width: min(90vw, 400px); padding: 36px 32px 32px;
  box-shadow: 0 12px 48px rgba(0,0,0,0.3);
  animation: fadeUp 0.4s ease;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.login-box h2 {
  text-align: center; font-size: 22px; font-weight: 700;
  margin-bottom: 4px; color: var(--text);
}

.login-box .login-sub {
  text-align: center; font-size: 13px; color: var(--text-sub);
  margin-bottom: 28px;
}

.login-field { margin-bottom: 16px; }

.login-field label {
  display: block; font-size: 13px; font-weight: 600;
  color: var(--text); margin-bottom: 6px;
}

.login-field input {
  width: 100%; padding: 10px 14px; border: 1.5px solid var(--border);
  border-radius: 8px; font-size: 14px; font-family: inherit;
  outline: none; transition: border-color 0.2s;
  box-sizing: border-box;
}

.login-field input:focus { border-color: var(--accent); }

.login-error {
  color: #dc2626; font-size: 13px; text-align: center;
  margin-bottom: 12px; min-height: 20px;
}

.login-btn {
  width: 100%; padding: 11px; border: none; border-radius: 8px;
  background: var(--accent); color: #fff;
  font-size: 15px; font-weight: 600; cursor: pointer;
  font-family: inherit; transition: background 0.2s;
}

.login-btn:hover { background: var(--accent-light); }
.login-btn:disabled { opacity: 0.6; cursor: not-allowed; }

/* ===== Main App ===== */
.main-app {
  display: none;
}

.main-app.show { display: block; }

/* ===== Header ===== */
.header {
  background: linear-gradient(135deg, #2d2a24, #4a443c);
  color: #f0ebe3;
  padding: 40px 24px 36px;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.header::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 4px;
  background: linear-gradient(90deg, var(--accent-light), var(--accent), var(--accent-light));
}

.header h1 { font-size: 26px; font-weight: 700; letter-spacing: 0.05em; margin-bottom: 6px; }
.header p { font-size: 14px; color: rgba(240,235,227,0.7); }
.header .subtitle { font-size: 12px; color: rgba(240,235,227,0.5); margin-top: 8px; letter-spacing: 0.08em; }

/* ===== Layout ===== */
.container { max-width: 800px; margin: 0 auto; padding: 24px 16px 60px; }

/* ===== Publish Bar ===== */
.publish-bar {
  display: flex; justify-content: flex-end; margin-bottom: 20px; gap: 10px;
}

.user-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 14px; background: var(--card); border-radius: 8px;
  font-size: 13px; color: var(--text-sub); box-shadow: var(--shadow);
}

.user-badge .logout-link {
  color: var(--accent); cursor: pointer; font-weight: 600;
  margin-left: 4px;
}
.user-badge .logout-link:hover { text-decoration: underline; }

.btn-publish {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 10px 20px; border: none; border-radius: 8px;
  background: var(--accent); color: #fff;
  font-size: 14px; font-weight: 600; cursor: pointer;
  font-family: inherit; transition: all 0.2s;
}

.btn-publish:hover { background: var(--accent-light); transform: translateY(-1px); }
.btn-publish:active { transform: scale(0.97); }

/* ===== Notice Card ===== */
.notice-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 24px;
  margin-bottom: 16px;
  box-shadow: var(--shadow);
  border-left: 4px solid var(--accent-light);
  transition: transform 0.2s;
}

.notice-card:hover { transform: translateY(-1px); }

.notice-card .notice-title {
  font-size: 18px; font-weight: 600; color: var(--text);
  margin-bottom: 10px; line-height: 1.4;
}

.notice-card .notice-content {
  font-size: 14px; color: var(--text);
  line-height: 1.8;
  margin-bottom: 14px;
}
.notice-card .notice-content p { margin: 6px 0; }
.notice-card .notice-content ul, .notice-card .notice-content ol { padding-left: 20px; margin: 6px 0; }
.notice-card .notice-content li { margin: 2px 0; }
.notice-card .notice-content code { background: #f3f4f6; padding: 1px 5px; border-radius: 4px; font-size: 13px; font-family: monospace; }
.notice-card .notice-content blockquote {
  margin: 8px 0; padding: 8px 14px; border-left: 3px solid var(--accent);
  background: rgba(0,0,0,0.02); border-radius: 0 6px 6px 0; color: var(--text-sub);
}
.notice-card .notice-content a { color: var(--accent); }
.notice-card .notice-content img { max-width: 100%; border-radius: 8px; margin: 6px 0; }
.notice-card .notice-content hr { border: none; border-top: 1px solid var(--border); margin: 12px 0; }
.notice-card .notice-content h1, .notice-card .notice-content h2, .notice-card .notice-content h3 { margin: 12px 0 6px; font-weight: 600; color: var(--text); }

.notice-card .notice-meta {
  display: flex; gap: 16px; font-size: 12px; color: var(--text-sub);
  padding-top: 12px; border-top: 1px solid var(--border);
}

.empty-tip {
  text-align: center; padding: 60px 20px;
  color: var(--text-sub); font-size: 15px;
}

.loading {
  text-align: center; padding: 40px; color: var(--text-sub);
}

/* Markdown 预览 */
.md-preview {
  background: var(--card-bg); border: 1.5px solid var(--border);
  border-radius: 8px; padding: 14px 16px; font-size: 14px;
  line-height: 1.8; color: var(--text); min-height: 80px;
  white-space: normal;
}
.md-preview strong { font-weight: 700; }
.md-preview em { font-style: italic; }
.md-preview code { background: #f3f4f6; padding: 2px 6px; border-radius: 4px; font-size: 13px; font-family: monospace; }
.md-preview a { color: var(--accent); }
.md-preview blockquote {
  margin: 10px 0; padding: 10px 14px; border-left: 3px solid var(--accent);
  background: rgba(0,0,0,0.02); border-radius: 0 6px 6px 0; color: var(--text-sub);
}
.md-preview ul, .md-preview ol { padding-left: 20px; margin: 8px 0; }
.md-preview hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
.md-preview h1, .md-preview h2, .md-preview h3 { margin: 14px 0 8px; font-weight: 600; color: var(--text); }

/* ===== Publish Modal ===== */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.4); z-index: 200;
  align-items: center; justify-content: center;
  backdrop-filter: blur(4px);
}

.modal { /* same as above but reusing */ }

.modal-overlay.show { display: flex; }

.modal-box {
  background: var(--card); border-radius: 16px;
  width: min(92vw, 520px); max-height: 90vh;
  box-shadow: 0 8px 40px rgba(0,0,0,0.15);
  animation: modalIn 0.3s ease;
  overflow: hidden;
}

@keyframes modalIn {
  from { opacity: 0; transform: scale(0.95) translateY(10px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}

.modal-header { display: flex; align-items: center; justify-content: space-between; padding: 18px 24px; border-bottom: 1px solid var(--border); }
.modal-header h3 { font-size: 17px; font-weight: 600; }
.modal-close { background: none; border: none; font-size: 22px; cursor: pointer; color: var(--text-sub); padding: 0; line-height: 1; }
.modal-close:hover { color: var(--text); }
.modal-body { padding: 20px 24px; }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
.form-input { width: 100%; padding: 10px 14px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 14px; font-family: inherit; outline: none; transition: border-color 0.2s; box-sizing: border-box; }
.form-input:focus { border-color: var(--accent); }
.form-textarea { min-height: 120px; resize: vertical; }
.form-error { color: #dc2626; font-size: 13px; margin-top: 4px; }
.form-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 4px; }
.btn-cancel { padding: 9px 18px; border: 1px solid var(--border); border-radius: 8px; background: transparent; color: var(--text-sub); font-size: 14px; cursor: pointer; font-family: inherit; }
.btn-submit { padding: 9px 20px; border: none; border-radius: 8px; background: var(--accent); color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; }
.btn-submit:hover { background: var(--accent-light); }
.btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }

/* ===== Toast ===== */
.toast {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
  padding: 10px 24px; border-radius: 8px; color: #fff;
  font-size: 14px; font-weight: 500; z-index: 999;
  animation: toastIn 0.3s ease;
  pointer-events: none;
}
.toast.success { background: #16a34a; }
.toast.error { background: #dc2626; }
@keyframes toastIn {
  from { opacity: 0; transform: translateX(-50%) translateY(-10px); }
  to { opacity: 1; transform: translateX(-50%) translateY(0); }
}

@media (max-width: 600px) {
  .header { padding: 28px 16px 24px; }
  .header h1 { font-size: 22px; }
  .notice-card { padding: 18px; }
  .notice-card .notice-title { font-size: 16px; }
  .modal-box { width: 96vw; }
  .modal-body { padding: 16px; }
  .login-box { padding: 28px 20px; }
}
</style>
</head>
<body>

<!-- ===== Login Screen ===== -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <h2 id="loginTitle">&#x1F4E2; 学生会登录</h2>
    <div class="login-sub" id="loginSub">登录后即可发布通知</div>
    <div class="login-error" id="loginError"></div>

    <!-- Init form (首次设置) -->
    <div id="initForm">
      <div class="login-field">
        <label for="initId">账号</label>
        <input id="initId" maxlength="20" placeholder="3-20位字母、数字、下划线">
      </div>
      <div class="login-field">
        <label for="initName">名称</label>
        <input id="initName" maxlength="20" placeholder="例如：学生会宣传部">
      </div>
      <div class="login-field">
        <label for="initPwd">密码</label>
        <input id="initPwd" type="password" maxlength="50" placeholder="至少6位">
      </div>
      <div class="login-field">
        <label for="initPwd2">确认密码</label>
        <input id="initPwd2" type="password" maxlength="50" placeholder="再次输入密码">
      </div>
      <button class="login-btn" id="initBtn" onclick="doInit()">&#x1F4E2; 创建账号</button>
    </div>

    <!-- Login form -->
    <div id="loginForm" style="display:none;">
      <div class="login-field">
        <label for="loginId">昵称 / 账号</label>
        <input id="loginId" maxlength="20" placeholder="校园墙昵称或学生会账号">
      </div>
      <div class="login-field">
        <label for="loginPwd">密码</label>
        <input id="loginPwd" type="password" maxlength="50" placeholder="输入密码"
               onkeydown="if(event.key==='Enter') doLogin()">
      </div>
      <!-- 验证码 -->
      <div class="login-field">
        <label>验证码</label>
        <div style="display:flex;gap:8px;align-items:stretch;">
          <input id="loginCaptchaInput" maxlength="6" placeholder="输入验证码"
            style="flex:1;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;outline:none;background:#fff;letter-spacing:3px;text-transform:uppercase;box-sizing:border-box;">
          <div id="loginCaptchaWrap" style="cursor:pointer;border-radius:8px;overflow:hidden;flex-shrink:0;line-height:0;border:1.5px solid var(--border);"
               onclick="refreshLoginCaptcha()" title="点击刷新">
            <img id="loginCaptchaImg" src="" alt="验证码" style="height:44px;display:block;">
          </div>
        </div>
        <div style="font-size:11px;color:var(--text-sub);margin-top:4px;">&#x1F4A1; 点击图片刷新验证码</div>
      </div>
      <button class="login-btn" id="loginBtn" onclick="doLogin()">登 录</button>
    </div>
  </div>
</div>

<!-- ===== Main App ===== -->
<div class="main-app" id="mainApp">
  <div class="header">
    <h1>&#x1F4E2; 校园通知发布</h1>
    <p>Campus Announcements</p>
  </div>

  <div class="container">
    <div class="publish-bar">
      <div class="user-badge" id="userBadge" style="display:none;">
        &#x1F464; <span id="userName"></span>
        <span class="logout-link" onclick="openSettingsModal()" style="margin-left:2px;">&#x2699;&#xFE0F;</span>
        <span class="logout-link" onclick="doLogout()">退出</span>
      </div>
      <button class="btn-publish" onclick="checkAndPublish()">&#x270F;&#xFE0F; 发布通知</button>
    </div>
    <div id="noticeList">
      <div class="loading">加载中&#x2026;</div>
    </div>
  </div>
</div>

<!-- ===== Publish Modal ===== -->
<div class="modal-overlay" id="publishOverlay" onclick="if(event.target===this)closePublishModal()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h3>&#x270F;&#xFE0F; 发布通知</h3>
      <button class="modal-close" onclick="closePublishModal()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label for="notifTitle">标题</label>
        <input class="form-input" id="notifTitle" maxlength="100" placeholder="通知标题">
      </div>
      <div class="form-group">
        <label for="notifContent">内容 <span style="font-weight:400;color:var(--text-sub);">（支持 Markdown）</span></label>
        <!-- Markdown 工具栏 -->
        <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px;padding:6px 8px;background:var(--bg-main);border:1.5px solid var(--border);border-radius:8px 8px 0 0;border-bottom:none;">
          <button type="button" onclick="insertMd('notifContent','**','**')" style="padding:3px 10px;border:1px solid var(--border);border-radius:4px;background:#fff;cursor:pointer;font-size:13px;font-weight:700;" title="加粗">B</button>
          <button type="button" onclick="insertMd('notifContent','__','__')" style="padding:3px 10px;border:1px solid var(--border);border-radius:4px;background:#fff;cursor:pointer;font-size:13px;text-decoration:underline;" title="下划线">U</button>
          <button type="button" onclick="insertMd('notifContent','*','*')" style="padding:3px 10px;border:1px solid var(--border);border-radius:4px;background:#fff;cursor:pointer;font-size:13px;font-style:italic;" title="斜体">I</button>
          <button type="button" onclick="insertMd('notifContent','~~','~~')" style="padding:3px 10px;border:1px solid var(--border);border-radius:4px;background:#fff;cursor:pointer;font-size:13px;text-decoration:line-through;" title="删除线">S</button>
          <button type="button" onclick="insertMd('notifContent','\n# ','')" style="padding:3px 10px;border:1px solid var(--border);border-radius:4px;background:#fff;cursor:pointer;font-size:13px;font-weight:700;" title="标题">H</button>
          <button type="button" onclick="insertMd('notifContent','~','~')" style="padding:3px 10px;border:1px solid var(--border);border-radius:4px;background:#fff;cursor:pointer;font-size:11px;" title="下标">x₂</button>
          <button type="button" onclick="insertMd('notifContent','^','^')" style="padding:3px 10px;border:1px solid var(--border);border-radius:4px;background:#fff;cursor:pointer;font-size:11px;" title="上标">x²</button>
          <button type="button" onclick="insertMd('notifContent','\n- ','')" style="padding:3px 10px;border:1px solid var(--border);border-radius:4px;background:#fff;cursor:pointer;font-size:13px;" title="无序列表">•</button>
          <button type="button" onclick="insertMd('notifContent','\n1. ','')" style="padding:3px 10px;border:1px solid var(--border);border-radius:4px;background:#fff;cursor:pointer;font-size:13px;" title="有序列表">1.</button>
          <button type="button" onclick="insertMd('notifContent','`','`')" style="padding:3px 10px;border:1px solid var(--border);border-radius:4px;background:#fff;cursor:pointer;font-size:12px;font-family:monospace;" title="代码">{__code__}</button>
          <button type="button" onclick="insertMd('notifContent','\n> ','')" style="padding:3px 10px;border:1px solid var(--border);border-radius:4px;background:#fff;cursor:pointer;font-size:13px;" title="引用">❝</button>
          <button type="button" onclick="insertMd('notifContent','[','](url)')" style="padding:3px 10px;border:1px solid var(--border);border-radius:4px;background:#fff;cursor:pointer;font-size:13px;" title="链接">🔗</button>
          <button type="button" onclick="insertMd('notifContent','![](',')')" style="padding:3px 10px;border:1px solid var(--border);border-radius:4px;background:#fff;cursor:pointer;font-size:13px;" title="图片">🖼</button>
          <button type="button" onclick="insertMd('notifContent','\n| 列1 | 列2 |\n| --- | --- |\n| 内容 | 内容 |','')" style="padding:3px 10px;border:1px solid var(--border);border-radius:4px;background:#fff;cursor:pointer;font-size:13px;" title="表格">⊞</button>
          <button type="button" onclick="insertMd('notifContent','\n---\n','')" style="padding:3px 10px;border:1px solid var(--border);border-radius:4px;background:#fff;cursor:pointer;font-size:13px;" title="分割线">—</button>
          <button type="button" onclick="togglePreview('notifContent')" id="previewBtn" style="padding:3px 10px;border:1px solid var(--border);border-radius:4px;background:#fff;cursor:pointer;font-size:12px;margin-left:auto;" title="预览">👁️ 预览</button>
        </div>
        <textarea class="form-input form-textarea" id="notifContent" maxlength="5000" placeholder="输入通知内容&#x2026;（支持 Markdown 格式）"></textarea>
        <div id="notifContentPreview" class="md-preview" style="display:none;"></div>
      </div>
      <div class="form-group">
        <label>图片 <span style="font-weight:400;color:var(--text-sub);">（选填，每张≤10MB）</span></label>
        <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:4px;" id="publishImagePreview"></div>
        <label style="display:inline-flex;align-items:center;gap:6px;margin-top:8px;padding:8px 16px;border:1.5px dashed var(--border);border-radius:8px;cursor:pointer;font-size:13px;color:var(--text-sub);transition:all 0.2s;">
          &#x1F5BC;&#xFE0F; 选择图片
          <input type="file" accept="image/*" multiple style="display:none;" onchange="handlePublishImages(this)">
        </label>
      </div>
      <div class="form-group">
        <label for="notifAuthor">发布人 <span style="font-weight:400;color:var(--text-sub);">（选填，默认使用账号名称）</span></label>
        <input class="form-input" id="notifAuthor" maxlength="30" placeholder="例如：宣传部">
      </div>
      <div class="form-group">
        <label>通知等级</label>
        <div style="display:flex;gap:10px;">
          <label style="display:flex;align-items:center;gap:6px;cursor:pointer;padding:8px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;flex:1;transition:all 0.2s;" id="levelT1Label" onclick="selectNotifLevel('T1')">
            <input type="radio" name="notifLevel" value="T1" checked style="accent-color:var(--accent);">
            <span>📋 T1 · 普通</span>
          </label>
          <label style="display:flex;align-items:center;gap:6px;cursor:pointer;padding:8px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;flex:1;transition:all 0.2s;" id="levelT0Label" onclick="selectNotifLevel('T0')">
            <input type="radio" name="notifLevel" value="T0">
            <span>🔴 T0 · 重要</span>
          </label>
        </div>
      </div>
      <div class="form-error" id="publishError"></div>
      <div class="form-actions">
        <button class="btn-cancel" onclick="closePublishModal()">取消</button>
        <button class="btn-submit" id="publishBtn" onclick="doPublish()">&#x1F4E2; 发布</button>
      </div>
    </div>
  </div>
</div>

<!-- ===== Settings Modal ===== -->
<div class="modal-overlay" id="settingsOverlay" onclick="if(event.target===this)closeSettingsModal()">
  <div class="modal-box" onclick="event.stopPropagation()" style="max-width:400px;">
    <div class="modal-header">
      <h3>&#x2699;&#xFE0F; 账号设置</h3>
      <button class="modal-close" onclick="closeSettingsModal()">&times;</button>
    </div>
    <div class="modal-body">
      <!-- 修改昵称 -->
      <div style="margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid var(--border);">
        <div class="form-group">
          <label for="settingsName">昵称</label>
          <input class="form-input" id="settingsName" maxlength="20" placeholder="输入新昵称">
        </div>
        <div class="form-error" id="nameError"></div>
        <button class="btn-submit" style="margin-top:8px;" onclick="doChangeName()">&#x270F;&#xFE0F; 修改昵称</button>
      </div>
      <!-- 修改密码 -->
      <div>
        <div class="form-group">

<script>
(function() {
  var currentUser = null;
  var SC_TOKEN_KEY = 'sc_token';

  // ===== 初始化检测 =====
  async function checkInit() {
    try {
      var res = await fetch('/api/student-council/check-init');
      var json = await res.json();
      if (json.ok && json.data.needInit) {
        // 显示首次设置
        document.getElementById('loginTitle').textContent = '\uD83D\uDCE2 设置学生会账号';
        document.getElementById('loginSub').textContent = '首次使用，请创建学生会账号';
        document.getElementById('initForm').style.display = '';
        document.getElementById('loginForm').style.display = 'none';
      } else {
        document.getElementById('initForm').style.display = 'none';
        document.getElementById('loginForm').style.display = '';
      }
      document.getElementById('loginScreen').classList.add('show');
    } catch(e) {
      showToast('\u274C 网络错误', 'error');
    }
  }

  // ===== 首次设置 =====
  window.doInit = async function() {
    var id = document.getElementById('initId').value.trim();
    var name = document.getElementById('initName').value.trim();
    var pwd = document.getElementById('initPwd').value;
    var pwd2 = document.getElementById('initPwd2').value;

    var errEl = document.getElementById('loginError');
    if (!id) { errEl.textContent = '\u8BF7\u586B\u5199\u8D26\u53F7'; return; }
    if (!name) { errEl.textContent = '\u8BF7\u586B\u5199\u540D\u79F0'; return; }
    if (pwd.length < 6) { errEl.textContent = '\u5BC6\u7801\u81F3\u5C116\u4F4D'; return; }
    if (pwd !== pwd2) { errEl.textContent = '\u4E24\u6B21\u5BC6\u7801\u4E0D\u4E00\u81F4'; return; }

    var btn = document.getElementById('initBtn');
    btn.disabled = true; btn.textContent = '\u521B\u5EFA\u4E2D\u2026';
    errEl.textContent = '';
    try {
      var res = await fetch('/api/student-council/init', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: id, name: name, password: pwd })
      });
      var json = await res.json();
      if (json.ok) {
        showToast('\u2705 ' + json.msg, 'success');
        // 创建成功后自动切换到登录
        document.getElementById('initForm').style.display = 'none';
        document.getElementById('loginForm').style.display = '';
        document.getElementById('loginTitle').textContent = '\uD83D\uDCE2 学生会登录';
        document.getElementById('loginSub').textContent = '登录后即可发布通知';
        document.getElementById('loginError').textContent = '';
      } else {
        errEl.textContent = json.msg || '\u521B\u5EFA\u5931\u8D25';
      }
    } catch(e) { errEl.textContent = '\u7F51\u7EDC\u9519\u8BEF'; }
    finally { btn.disabled = false; btn.textContent = '\uD83D\uDCE2 创建账号'; }
  };

  var _loginCaptchaId = null;

  async function refreshLoginCaptcha() {
    try {
      var resp = await fetch('/api/captcha');
      var json = await resp.json();
      if (json.ok) {
        _loginCaptchaId = json.data.id;
        document.getElementById('loginCaptchaImg').src = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(json.data.svg)));
      }
    } catch(e) {}
  }
  window.refreshLoginCaptcha = refreshLoginCaptcha;

  // ===== 登录 =====
  window.doLogin = async function() {
    var id = document.getElementById('loginId').value.trim();
    var pwd = document.getElementById('loginPwd').value;
    var captchaText = document.getElementById('loginCaptchaInput').value.trim();
    var errEl = document.getElementById('loginError');
    if (!id || !pwd) { errEl.textContent = '\u8BF7\u8F93\u5165\u8D26\u53F7\u548C\u5BC6\u7801'; return; }
    if (!_loginCaptchaId || !captchaText) { errEl.textContent = '\u8BF7\u8F93\u5165\u9A8C\u8BC1\u7801'; return; }
    errEl.textContent = '';
    var btn = document.getElementById('loginBtn');
    btn.disabled = true; btn.textContent = '\u767B\u5F55\u4E2D\u2026';
    try {
      var res = await fetch('/api/student-council/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: id, password: pwd, captchaId: _loginCaptchaId, captchaText: captchaText })
      });
      var json = await res.json();
      if (json.ok) {
        currentUser = json.data;
        localStorage.setItem(SC_TOKEN_KEY, currentUser.token);
        localStorage.setItem('sc_name', currentUser.name);        localStorage.setItem('sc_name', currentUser.name);
        document.getElementById('loginScreen').classList.remove('show');
        document.getElementById('mainApp').classList.add('show');
        document.getElementById('userBadge').style.display = 'inline-flex';
        document.getElementById('userName').textContent = currentUser.name;
        loadNotices();
      } else {
        errEl.textContent = json.msg || '\u767B\u5F55\u5931\u8D25';
        if (json.msg && json.msg.indexOf('验证码') >= 0) {
          refreshLoginCaptcha();
          document.getElementById('loginCaptchaInput').value = '';
        }
      }
    } catch(e) { errEl.textContent = '\u7F51\u7EDC\u9519\u8BEF'; }
    finally { btn.disabled = false; btn.textContent = '\u767B \u5F55'; }
  };

  // ===== 退出 =====
  window.doLogout = function() {
    currentUser = null;
    localStorage.removeItem(SC_TOKEN_KEY);
    localStorage.removeItem('sc_name');
    document.getElementById('mainApp').classList.remove('show');
    document.getElementById('loginScreen').classList.add('show');
    document.getElementById('loginId').value = '';
    document.getElementById('loginPwd').value = '';
    document.getElementById('loginError').textContent = '';
    document.getElementById('loginCaptchaInput').value = '';
    checkInit();
    refreshLoginCaptcha();
  };

  // ===== 账号设置 =====
  window.openSettingsModal = function() {
    document.getElementById('settingsName').value = currentUser ? currentUser.name : '';
    document.getElementById('settingsOldPwd').value = '';
    document.getElementById('settingsNewPwd').value = '';
    document.getElementById('nameError').textContent = '';
    document.getElementById('pwdError').textContent = '';
    document.getElementById('settingsOverlay').style.display = 'flex';
  };

  window.closeSettingsModal = function() {
    document.getElementById('settingsOverlay').style.display = 'none';
  };

  window.doChangeName = async function() {
    var name = document.getElementById('settingsName').value.trim();
    var errEl = document.getElementById('nameError');
    if (!name) { errEl.textContent = '\u8BF7\u8F93\u5165\u6635\u79F0'; return; }
    errEl.textContent = '';
    try {
      var token = localStorage.getItem(SC_TOKEN_KEY);
      var res = await fetch('/api/student-council/change-name', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-sc-token': token || '' },
        body: JSON.stringify({ name: name })
      });
      var json = await res.json();
      if (json.ok) {
        currentUser = json.data;
        localStorage.setItem(SC_TOKEN_KEY, currentUser.token);
        localStorage.setItem('sc_name', currentUser.name);        document.getElementById('userName').textContent = currentUser.name;
        showToast('\u2705 \u6635\u79F0\u5DF2\u4FEE\u6539', 'success');
        closeSettingsModal();
      } else {
        errEl.textContent = json.msg || '\u4FEE\u6539\u5931\u8D25';
      }
    } catch(e) { errEl.textContent = '\u7F51\u7EDC\u9519\u8BEF'; }
  };

  window.doChangePwd = async function() {
    var oldPwd = document.getElementById('settingsOldPwd').value;
    var newPwd = document.getElementById('settingsNewPwd').value;
    var errEl = document.getElementById('pwdError');
    if (!oldPwd || !newPwd) { errEl.textContent = '\u8BF7\u586B\u5199\u5BC6\u7801'; return; }
    if (newPwd.length < 6) { errEl.textContent = '\u65B0\u5BC6\u7801\u81F3\u5C116\u4F4D'; return; }
    errEl.textContent = '';
    try {
      var token = localStorage.getItem(SC_TOKEN_KEY);
      var res = await fetch('/api/student-council/change-pwd', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-sc-token': token || '' },
        body: JSON.stringify({ oldPwd: oldPwd, newPwd: newPwd })
      });
      var json = await res.json();
      if (json.ok) {
        showToast('\u2705 \u5BC6\u7801\u5DF2\u4FEE\u6539', 'success');
        document.getElementById('settingsOldPwd').value = '';
        document.getElementById('settingsNewPwd').value = '';
      } else {
        errEl.textContent = json.msg || '\u4FEE\u6539\u5931\u8D25';
      }
    } catch(e) { errEl.textContent = '\u7F51\u7EDC\u9519\u8BEF'; }
  };

  // ===== 发布通知 =====
  window.checkAndPublish = function() {
    if (!currentUser) {
      showToast('\u8BF7\u5148\u767B\u5F55', 'error');
      return;
    }
    openPublishModal();
  };

  window.openPublishModal = function() {
    document.getElementById('publishOverlay').style.display = 'flex';
    document.getElementById('publishError').textContent = '';
  };

  window.closePublishModal = function() {
    document.getElementById('publishOverlay').style.display = 'none';
    document.getElementById('publishError').textContent = '';
  };

  var _selectedNotifLevel = 'T1';
  var _publishImages = [];

// ===== Markdown 工具 =====
  function renderMarkdown(text) {
    if (!text) return '';
    var html = text
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      // 删除线 ~~text~~
      .replace(/~~([^~]+)~~/g, '<del>$1</del>')
      // 下划线 __text__（不能包含空格，避免与加粗混淆）
      .replace(/__([^_]+)__/g, '<u>$1</u>')
      // 加粗 **text**
      .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
      // 斜体 *text*
      .replace(/\*([^*]+)\*/g, '<em>$1</em>')
      // 上标 ^text^
      .replace(/\^([^^]+)\^/g, '<sup>$1</sup>')
      // 下标 ~text~
      .replace(/~([^~]+)~/g, '<sub>$1</sub>')
      // 列表项
      .replace(/^[\*\-\+] (.+)$/gm, '<li>$1</li>')
      .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')
      // 标题
      .replace(/^### (.+)$/gm, '<h3>$1</h3>')
      .replace(/^## (.+)$/gm, '<h2>$1</h2>')
      .replace(/^# (.+)$/gm, '<h1>$1</h1>')
      // 分隔线
      .replace(/^---+\s*$/gm, '<hr>')
      // 引用
      .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
      // 代码
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      // 表格
      .replace(/^\|(.+)\|$/gm, function(m, content) {
        var cells = content.split('|').map(function(c) { return c.trim(); });
        // 如果是分隔行（|---|），跳过
        if (cells.length > 0 && /^[-:\s]+$/.test(cells[0])) return '';
        return '<tr><td>' + cells.join('</td><td>') + '</td></tr>';
      })
      // 将连续的 <tr> 包裹在 <table> 中
      .replace(/((?:<tr>.*?<\/tr>\s*)+)/g, '<table style="border-collapse:collapse;width:100%;margin:8px 0;"><tbody>$1</tbody></table>')
      // 给 <td> 加边框
      .replace(/<td>/g, '<td style="border:1px solid var(--border);padding:8px 10px;">')
      // 图片和链接
      .replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1" style="max-width:100%;border-radius:8px;margin:6px 0;">')
      .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="nofollow">$1</a>')
      // 换行
      .replace(/\n\n/g, '</p><p>')
      .replace(/\n/g, '<br>');
    // Wrap consecutive <li> in <ul>
    html = html.replace(/((?:<li>.*?<\/li>)+)/g, '<ul>$1</ul>');
    // Wrap standalone <blockquote> in proper block
    html = html.replace(/<blockquote>/g, '<blockquote style="margin:10px 0;padding:10px 14px;border-left:3px solid var(--accent);background:rgba(0,0,0,0.02);border-radius:0 6px 6px 0;color:var(--text-sub);">');
    return '<p>' + html + '</p>';
  }
  window.insertMd = function(textareaId, before, after) {
    var ta = document.getElementById(textareaId);
    var start = ta.selectionStart, end = ta.selectionEnd;
    var text = ta.value;
    ta.value = text.substring(0, start) + before + text.substring(start, end) + after + text.substring(end);
    ta.focus();
    ta.selectionStart = start + before.length;
    ta.selectionEnd = start + before.length + (end - start);
  };

  window.togglePreview = function(textareaId) {
    var ta = document.getElementById(textareaId);
    var preview = document.getElementById(textareaId + 'Preview');
    var btn = document.getElementById((textareaId === 'notifContent' ? '' : 'edit') + 'previewBtn');
    if (preview.style.display === 'none') {
      preview.innerHTML = renderMarkdown(ta.value);
      preview.style.display = '';
      ta.style.display = 'none';
      btn.textContent = '✏️ 编辑';
    } else {
      preview.style.display = 'none';
      ta.style.display = '';
      btn.textContent = '👁️ 预览';
    }
  };

  window.selectNotifLevel = function(level) {
    _selectedNotifLevel = level;
    document.getElementById('levelT1Label').style.borderColor = level === 'T1' ? 'var(--accent)' : 'var(--border)';
    document.getElementById('levelT0Label').style.borderColor = level === 'T0' ? 'var(--accent)' : 'var(--border)';
    document.querySelector('input[name="notifLevel"][value="' + level + '"]').checked = true;
  };

  window.handlePublishImages = function(input) {
    var files = input.files;
    var maxBytes = 10 * 1024 * 1024;
    for (var i = 0; i < files.length; i++) {
      if (files[i].size > maxBytes) {
        showToast('\u274C ' + files[i].name + ' \u8D85\u8FC710MB', 'error');
        continue;
      }
      (function(file) {
        var reader = new FileReader();
        reader.onload = function(e) {
          _publishImages.push(e.target.result);
          renderPublishPreview();
        };
        reader.readAsDataURL(file);
      })(files[i]);
    }
    input.value = '';
  };

  function renderPublishPreview() {
    var container = document.getElementById('publishImagePreview');
    var html = '';
    _publishImages.forEach(function(src, idx) {
      html += '<div style=\"position:relative;display:inline-block;\">' +
        '<img src=\"' + src + '\" style=\"height:80px;width:80px;object-fit:cover;border-radius:8px;border:1.5px solid var(--border);\">' +
        '<button onclick=\"removePublishImage(' + idx + ')\" style=\"position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;border:none;background:#ef4444;color:#fff;font-size:12px;cursor:pointer;line-height:20px;text-align:center;\">&times;</button></div>';
    });
    container.innerHTML = html;
  }

  window.removePublishImage = function(idx) {
    _publishImages.splice(idx, 1);
    renderPublishPreview();
  };

  window.doPublish = async function() {
    var title = document.getElementById('notifTitle').value.trim();
    var content = document.getElementById('notifContent').value.trim();
    var author = document.getElementById('notifAuthor').value.trim();

    var errEl = document.getElementById('publishError');
    if (!title) { errEl.textContent = '\u8BF7\u586B\u5199\u6807\u9898'; return; }
    if (!content) { errEl.textContent = '\u8BF7\u586B\u5199\u5185\u5BB9'; return; }

    var btn = document.getElementById('publishBtn');
    btn.disabled = true; btn.textContent = '\u53D1\u5E03\u4E2D\u2026';
    errEl.textContent = '';
    try {
      var token = localStorage.getItem(SC_TOKEN_KEY);
      var res = await fetch('/api/notices', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-sc-token': token || '' },
        body: JSON.stringify({ title: title, content: content, author: author, level: _selectedNotifLevel, images: _publishImages })
      });
      var json = await res.json();
      if (json.ok) {
        showToast('\u2705 \u901A\u77E5\u5DF2\u53D1\u5E03', 'success');
        closePublishModal();
        document.getElementById('notifTitle').value = '';
        document.getElementById('notifContent').value = '';
        document.getElementById('notifAuthor').value = '';
        _publishImages = [];
        renderPublishPreview();
        loadNotices();
      } else {
        errEl.textContent = json.msg || '\u53D1\u5E03\u5931\u8D25';
        if (json.code === 'NOT_LOGIN') {
          showToast('\u767B\u5F55\u5DF2\u8FC7\u671F\uFF0C\u8BF7\u91CD\u65B0\u767B\u5F55', 'error');
          doLogout();
        }
      }
    } catch(e) { errEl.textContent = '\u7F51\u7EDC\u9519\u8BEF'; }
    finally { btn.disabled = false; btn.textContent = '\uD83D\uDCE2 \u53D1\u5E03'; }
  };

  // ===== 删除通知 =====
  window.deleteNotice = async function(id) {
    if (!confirm('\u786E\u5B9A\u8981\u5220\u9664\u8FD9\u6761\u901A\u77E5\u5417\uFF1F')) return;
    try {
      var token = localStorage.getItem(SC_TOKEN_KEY);
      var res = await fetch('/api/notices/' + id, {
        method: 'DELETE',
        headers: { 'x-sc-token': token || '' }
      });
      var json = await res.json();
      if (json.ok) {
        showToast('\u2705 ' + json.msg, 'success');
        loadNotices();
      } else {
        showToast('\u274C ' + (json.msg || '\u5220\u9664\u5931\u8D25'), 'error');
      }
    } catch(e) {
      showToast('\u274C \u7F51\u7EDC\u9519\u8BEF', 'error');
    }
  };

  // ===== 修改通知 =====
  var _editNotifId = null;
  var _editSelectedLevel = 'T1';

  window.selectEditLevel = function(level) {
    _editSelectedLevel = level;
    document.getElementById('editLevelT1Label').style.borderColor = level === 'T1' ? 'var(--accent)' : 'var(--border)';
    document.getElementById('editLevelT0Label').style.borderColor = level === 'T0' ? 'var(--accent)' : 'var(--border)';
    document.querySelector('input[name="editLevel"][value="' + level + '"]').checked = true;
  };

  window.openEditModal = async function(id) {
    _editNotifId = id;
    _editSelectedLevel = 'T1';
    document.getElementById('editError').textContent = '';
    document.getElementById('editOverlay').style.display = 'flex';
    document.getElementById('editSubmitBtn').disabled = false;
    document.getElementById('editSubmitBtn').textContent = '\u270F\uFE0F \u4FDD\u5B58\u4FEE\u6539';

    // 重置功能按钮状态
    var pinBtn = document.getElementById('pinBtn');
    var syncBtn = document.getElementById('syncBtn');
    var deleteBtn = document.getElementById('deleteNoticeBtn');
    if (pinBtn) { pinBtn.disabled = false; pinBtn.innerHTML = '\uD83D\uDCCC \u7F6E\u9876'; }
    if (syncBtn) { syncBtn.disabled = false; syncBtn.innerHTML = '\uD83D\uDD04 \u540C\u6B65'; }
    if (deleteBtn) { deleteBtn.disabled = false; }

    // 预填当前数据
    try {
      var res = await fetch('/api/notices');
      var json = await res.json();
      if (json.ok && json.data) {
        var n = json.data.find(function(item) { return item.id === id; });
        if (n) {
          document.getElementById('editTitle').value = n.title || '';
          document.getElementById('editContent').value = n.content || '';
          document.getElementById('editAuthor').value = n.author || '';
          var lvl = n.level === 'T0' ? 'T0' : 'T1';
          selectEditLevel(lvl);
          // 更新置顶按钮状态
          if (pinBtn && n.pinned) {
            pinBtn.innerHTML = '\uD83D\uDCCC \u53D6\u6D88\u7F6E\u9876';
          }
        }
      }
    } catch(e) {}
  };

  window.closeEditModal = function() {
    document.getElementById('editOverlay').style.display = 'none';
    document.getElementById('editError').textContent = '';
  };

  window.doEditNotice = async function() {
    var title = document.getElementById('editTitle').value.trim();
    var content = document.getElementById('editContent').value.trim();
    var author = document.getElementById('editAuthor').value.trim();
    var errEl = document.getElementById('editError');

    if (!title) { errEl.textContent = '\u8BF7\u586B\u5199\u6807\u9898'; return; }
    if (!content) { errEl.textContent = '\u8BF7\u586B\u5199\u5185\u5BB9'; return; }
    errEl.textContent = '';

    var btn = document.getElementById('editSubmitBtn');
    btn.disabled = true; btn.textContent = '\u4FDD\u5B58\u4E2D\u2026';
    try {
      var token = localStorage.getItem(SC_TOKEN_KEY);
      var res = await fetch('/api/notices/' + _editNotifId, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'x-sc-token': token || '' },
        body: JSON.stringify({ title: title, content: content, author: author, level: _editSelectedLevel })
      });
      var json = await res.json();
      if (json.ok) {
        showToast('\u2705 ' + json.msg, 'success');
        closeEditModal();
        loadNotices();
      } else {
        errEl.textContent = json.msg || '\u4FEE\u6539\u5931\u8D25';
        if (json.code === 'NOT_LOGIN') { showToast('\u767B\u5F55\u5DF2\u8FC7\u671F', 'error'); doLogout(); }
      }
    } catch(e) { errEl.textContent = '\u7F51\u7EDC\u9519\u8BEF'; }
    finally { btn.disabled = false; btn.textContent = '\u270F\uFE0F \u4FDD\u5B58\u4FEE\u6539'; }
  };

  // ===== 同步通知 =====
  window.doSyncNotice = async function() {
    var btn = document.getElementById('syncBtn');
    if (!btn || btn.disabled) return;
    btn.disabled = true; btn.textContent = '\u540C\u6B65\u4E2D\u2026';
    try {
      var token = localStorage.getItem(SC_TOKEN_KEY);
      var res = await fetch('/api/notices/' + _editNotifId + '/sync', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-sc-token': token || '' }
      });
      var json = await res.json();
      if (json.ok) {
        showToast('\u2705 ' + json.msg, 'success');
      } else {
        showToast('\u274C ' + json.msg, 'error');
      }
    } catch(e) { showToast('\u7F51\u7EDC\u9519\u8BEF', 'error'); }
    finally { btn.disabled = false; btn.innerHTML = '\uD83D\uDD04 \u540C\u6B65'; }
  };

  // ===== 置顶通知 =====
  window.doPinNotice = async function() {
    var btn = document.getElementById('pinBtn');
    if (!btn || btn.disabled) return;
    btn.disabled = true;
    try {
      var token = localStorage.getItem(SC_TOKEN_KEY);
      var res = await fetch('/api/notices/' + _editNotifId + '/pin', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-sc-token': token || '' }
      });
      var json = await res.json();
      if (json.ok) {
        showToast('\u2705 ' + json.msg, 'success');
        loadNotices();
        btn.innerHTML = json.pinned ? '\uD83D\uDCCC \u53D6\u6D88\u7F6E\u9876' : '\uD83D\uDCCC \u7F6E\u9876';
      } else {
        showToast('\u274C ' + json.msg, 'error');
      }
    } catch(e) { showToast('\u7F51\u7EDC\u9519\u8BEF', 'error'); }
    finally { btn.disabled = false; }
  };

  // ===== 删除通知 =====
  window.doDeleteNotice = async function() {
    if (!confirm('\u786E\u5B9A\u8981\u5220\u9664\u6B64\u901A\u77E9\u5417\uFF1F')) return;
    var btn = document.getElementById('deleteNoticeBtn');
    if (!btn || btn.disabled) return;
    btn.disabled = true;
    try {
      var token = localStorage.getItem(SC_TOKEN_KEY);
      var res = await fetch('/api/notices/' + _editNotifId, {
        method: 'DELETE',
        headers: { 'Content-Type': 'application/json', 'x-sc-token': token || '' }
      });
      var json = await res.json();
      if (json.ok) {
        showToast('\u2705 ' + json.msg, 'success');
        closeEditModal();
        loadNotices();
      } else {
        showToast('\u274C ' + json.msg, 'error');
        if (json.code === 'NOT_LOGIN') { showToast('\u767B\u5F55\u5DF2\u8FC7\u671F', 'error'); doLogout(); }
      }
    } catch(e) { showToast('\u7F51\u7EDC\u9519\u8BEF', 'error'); }
    finally { btn.disabled = false; }
  };

  // ===== 加载通知列表 =====
  async function loadNotices() {
    try {
      var res = await fetch('/api/notices');
      var json = await res.json();
      var list = document.getElementById('noticeList');
      if (!json.ok) { list.innerHTML = '<div class="empty-tip">\u52A0\u8F7D\u5931\u8D25</div>'; return; }
      var data = json.data || [];
      if (data.length === 0) {
        list.innerHTML = '<div class="empty-tip">\u6682\u65E0\u901A\u77E5</div>';
        return;
      }
      var html = '';
      data.forEach(function(n) {
        var time = n.createdAt ? new Date(n.createdAt).toLocaleString('zh-CN', {
          year: 'numeric', month: 'long', day: 'numeric',
          hour: '2-digit', minute: '2-digit'
        }) : '';
        html += '<div class="notice-card">' +
          '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;">' +
          '<div style="flex:1;">' +
          '<div class="notice-title">' + escHtml(n.title) + '</div>' +
          '<div class="notice-content">' + renderMarkdown(n.content) + '</div>' +
          (n.images && n.images.length > 0 ? '<div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;margin-bottom:4px;">' +
            n.images.map(function(src) {
              return '<img src="' + src + '" style="max-width:100%;max-height:300px;border-radius:8px;border:1px solid var(--border);object-fit:contain;cursor:pointer;" onclick="window.open(this.src)" onerror="this.style.display=\'none\'">';
            }).join('') +
          '</div>' : '') +
          '</div>' +
          (currentUser ? '<div style="display:flex;gap:2px;flex-shrink:0;">' +
            '<button onclick="openEditModal(\'' + n.id + '\')" style="background:none;border:none;cursor:pointer;font-size:14px;color:#9ca3af;padding:2px 5px;line-height:1;border-radius:4px;" title="修改通知" onmouseover="this.style.background=\'#dbeafe\';this.style.color=\'#2563eb\'" onmouseout="this.style.background=\'transparent\';this.style.color=\'#9ca3af\'">✏️</button>' +
            '<button onclick="deleteNotice(\'' + n.id + '\')" style="background:none;border:none;cursor:pointer;font-size:16px;color:#9ca3af;padding:2px 4px;line-height:1;border-radius:4px;" title="删除通知" onmouseover="this.style.background=\'#fee2e2\';this.style.color=\'#dc2626\'" onmouseout="this.style.background=\'transparent\';this.style.color=\'#9ca3af\'">✕</button>' +
            '</div>' : '') +
          '</div>' +
          '<div class="notice-meta">' +
          '<span>\uD83D\uDC64 ' + escHtml(n.author || '\u5B66\u751F\u4F1A') + '</span>' +
          '<span>\uD83D\uDCC5 ' + time + '</span>' +
          '</div></div>';
      });
      list.innerHTML = html;
    } catch(e) {
      document.getElementById('noticeList').innerHTML = '<div class="empty-tip">\u7F51\u7EDC\u9519\u8BEF</div>';
    }
  }

  function escHtml(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function showToast(msg, type) {
    var t = document.createElement('div');
    t.className = 'toast ' + type;
    t.innerHTML = msg;
    document.body.appendChild(t);
    setTimeout(function() { t.remove(); }, 2500);
  }

  // ===== 启动 =====
  var savedToken = localStorage.getItem(SC_TOKEN_KEY);
  var savedName = localStorage.getItem('sc_name');
  if (savedToken) {
    currentUser = { token: savedToken, name: savedName || '学生会' };
    document.getElementById('mainApp').classList.add('show');
    document.getElementById('userBadge').style.display = 'inline-flex';
    document.getElementById('userName').textContent = savedName || '学生会';
    loadNotices();
  } else {
    refreshLoginCaptcha();
    checkInit();
  }
})();
</script>
</body>
</html>
